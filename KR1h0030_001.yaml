body:
  text: 欽定四庫全書論語集注考證卷一前元金履祥撰序說史記漢太史令司馬談所作子遷嗣成之世家史記有天下者為本紀有國統者為世家其餘為列傳惟於孔子不敢入列傳而次之世家以其盛德且子孫世有哲人也朱子欲學者知夫子始末故節其事文大略入序說疑者不入丘史記曰性而墟頂故名丘本姓解曰顔氏禱於尼丘之山生孔子故名丘字仲尼此非大義所關故朱子不載其先宋人宋殷後子姓自微子微仲五傳而至哀公熙生弗父何及厲公方祀弗父何以有宋授厲公而世為宋卿何生宋父周周生勝勝生正考甫考甫生孔父嘉别為公族以孔為氏一曰孔父者生時所賜號也子孫遂為氏孔父生金父金父生睪夷睪夷生防叔自孔父為華氏所殺子孫避禍奔魯防叔生伯夏伯夏生叔梁紇為鄒大夫追封齊國公母顔氏名徵在顔父生三女追贈齊國夫人魯襄公二十二年庚戌之嵗十一月庚子公羊穀梁二傳皆謂魯襄公二十一年孔子生或謂史記用秦法穀梁用夏正然不可考昌平鄉陬邑陬論語作鄹側留反在今兗州仙源縣叔梁紇為陬邑大夫故生於陬委烏僞反周禮有委人掌斂野之賦斂薪芻凡疏材木材凡蓄聚之物以稍聚待賓客以甸聚待羈旅餘聚待頒賜共祭祀之薪蒸賓客之芻薪喪紀之薪材軍旅之委積館軍旅之賓客其聚散之多如此所以貴於㑹計之當也又遺人三十里有路室路室有委委吏掌之史記季氏史及下文司職吏皆當以孟子為正司職吏作樴周禮牛人讀為樴義與杙同適周南宮敬叔與孔子俱適周歷郊社之所考明堂之則察朝廟之度問禮於老子既反而弟子益進昭公二十五年甲申孔子年三十五嵗而昭公奔齊春秋傳昭公攻季孫意如不克遜於齊魯亂適齊景公封以尼溪之田晏嬰不可晏嬰字仲嬰以賢聞於諸侯孔子亦賢之景公欲封孔子而嬰不可此必有說史記載其言朱子削之以其未可信也至夾谷之會史記亦言其與謀朱子亦削之晏子墨者或道不同夫子雖嘗病其隘而未嘗不以為賢與彼子西不同則論晏子者當以夫子之言為正故史記二說朱子皆不取陽虎作亂専政論語作陽貨虎貨聲通定公五年季氏家臣陽虎執季桓子囚之專魯政定公以孔子為中都宰為司空又為司冦十年辛丑相定公會齊侯于夾谷齊人歸魯侵地定公十年公㑹齊侯于祝其實夾谷孔丘相牟彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉從之孔丘以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德為愆義於人為失禮君必不然齊侯聞之遽辟之將盟齊人加於載書曰齊師出境而不以甲車三百乘從我者有如此盟孔丘使茲無還揖對曰而不反我汶陽之田吾以共命者亦如之齊人來歸鄆歡龜陰之田十二年癸卯墮三都收其甲兵孟氏不肯墮成圍之不克魯自三家四分公室魯公無民久矣孔子雖為大司冦為其議政交鄰可爾土地甲兵皆三家有也縱墮三都三都之人民財賦豈遽為公室有哉去其城郭差可防三家之叛亂耳幸而公山不狃以費畔侯犯以郈叛二子自以為患故墮之易為勢至孟氏不肯墮成則成固未易墮矣當時家臣知有其家而不知有公室類如此然成終不可墮乎曰使孔子而久於其位安知其不墮使孔子别有所為則雖不墮成亦可蓋孟氏不如季氏之强而成亦邊齊之城也孔子用於魯於今一年墮三都而不盡則期月而可之說無乃已虛乎孔子固曰如有用我者此為授之以國家言也攝行相事三家者於孔子豈有土地甲兵為之用哉其明年始攝相事與聞國政將朞年而始曰攝曰與則前乎此年其權可知矣孟子謂孔子於此為見行可之仕蓋謂其或可以行耳而不行而後去然則謂孔子得用於魯則未也學者忿聖人之失職幸聖人之見用方且以反侵地誅正卯墮三都為誇皆未為知孔子亦非知事勢者詳又見第十八篇誅少正卯荀子曰孔子為魯相攝朝七日誅少正卯門人進問曰少正卯魯之閒人也夫子為政而始誅之得無失乎孔子曰人有惡者五而盜竊不與焉心達而險行辟而堅言僞而辨記醜而博順非而滓此五者有一於人則不得免於君子之誅而少正卯兼有之故居處足以聚徒成羣言談足以飾榮褒衆彊禦足以反是獨立此小人之奸雄也不可以不誅也朱子曰少正卯之事豫竊疑之蓋論語所不載子思孟子所不言雖以左氏春秋內外傳之誣且駁而猶不道也乃獨荀况言之是必魯齊陋儒憤聖人之失職故為此說以夸其權爾安敢輕信其言而遽稽以為決乎按朱子之言如此而於此存誅少正卯四字蓋存疑爾齊人歸女樂說見第十八篇匡人以為陽虎而拘之史記孔子去衛將適陳過匡顔刻為僕以其策指之曰昔吾入此由彼缺也匡人聞之以為魯之陽虎陽虎嘗暴匡人又孔子狀類陽虎拘焉五日乃解司馬云陽虎暴於匡顔刻時與虎俱至是刻為孔子御匡人識之又孔子貌似陽虎故匡人共圍之莊子云孔子絃歌不輟圍者進曰昔以為陽虎也而今非也請辭而退桓魋見第七篇集注中牟詳見第十七篇趙簡子名鞅季桓子卒遺言謂康子必召孔子其臣止之史記季桓子病草輦而見魯城喟然嘆曰昔此國幾興以吾獲罪於孔子故不興顧謂其嗣康子曰我即死若必相魯相魯必召仲尼桓子卒已葬康子欲召仲尼公之魚曰昔吾先君用之不終為諸侯笑今又用之不能終再為諸侯笑康子曰誰召而可曰必召冉求於是使召冉求孔子如蔡按孔子稱危邦不入亂邦不居夫子既去魯矣以衛靈公之無道也而居衛以陳國之小嵗有吳師而在陳以蔡侯死於盜國遷於吳民分於楚而如蔡不幾乎居亂而入危與曰前日之言君子守身之常法今日之事夫子行道之大權也夫以聖人盛德固無施不可使夫二三君者能用孔子委國而聽之則衛可正陳可彊蔡可守也而皆不能惜夫雖然夫子既知其不能用矣其時楚昭之賢聞於天下夫子固將如楚也當在衛也特以衛靈公致粟有際可之禮而再主蘧伯玉之家當去陳也又以司城貞子為之主而陳侯亦有言議之適故為二國留行然其如蔡蓋為如楚也何以知之有子曰夫子失魯司冦將之荆先之以子夏又申之以冉有則知孔子去魯則將之楚矣聖人無固無必故為二國留行爾然而適楚又卒為子西所阻愚以為此皆非聖人意也令尹子西不可史記楚令尹子西曰王之使諸侯有如子貢者乎曰無有王之輔相有如顔回者乎曰無有王之將帥有如子路者乎曰無有王之官尹有如宰豫者乎曰無有且楚之祖封於周號為子男五十里今孔子述三王之法明周召之業王若用之則楚安得世世堂堂方數千里乎夫文王在豐武王在鎬百里之君卒王天下今孔子得據土壤賢弟子為佐非楚之福也昭王乃止又反乎衛按朱子有言當衛輒之時父爭於外子拒於內不知其國何以度日是謂君子於此不可一日處也孔子世家稱孔子自楚反衛在哀公六年其後自衛反魯首尾又六年矣以衛父子之亂而夫子久於其國何耶豈居亂邦見惡人在聖人則可或時其得政而將借是以正名義也及考陳世家則楚昭卒之年孔子在陳非反衛也考之衛世家則齊弒悼公之年孔子始自陳至衛明年反魯則非久於衛也然猶在衛何也孔子在陳曰盍歸乎來蓋思魯之狂士則自陳至衛蓋過衛耳意則主乎歸魯也以夫子門人如子夏子羔子貢之徒亦多衛人者孔子於魯為父母之邦其出也既以司冦去國則其反也不可以無故而復國故明年召之即歸矣經世於丙辰書孔子自陳至衛於丁巳書自衛反魯可以訂世家之謬而孔子久速之可於此見矣冉求為季氏將與齊戰有功左氏哀公十一年齊國書帥師伐魯冉求帥左師季氏之甲七千冉有以武城人三百為己徒卒戰於郊冉有用矛於齊師故能入其軍獲甲首八十齊人不能師不求仕王文憲曰非所以言聖人敘書傳禮記王文憲曰傳禮記三字可疑履祥按史記謂孔子序書編次其事夫書序非孔子作而周書諸篇多失其次愚於武王武成之編皆嘗考正之矣計古者事時前後已具編年之史而書則每事自為首尾固未必諸篇相為次第也然或諸篇本有次第而孔安國伏生時失之前漢書言張霸作書首尾後漢書言衛宏作詩序書訓義自前儒以詩書之序皆出孔氏朱子嘗引後漢書以證詩序之僞矣獨書序疑而未斷方漢初時泰誓且有僞書何况書序且孔傳古文其出最後則附會之作有所不免若書序果出壁中亦不可謂非附會者蓋孔鮒兄弟藏書之時上距孔子殁二百六七十年其同藏者論語孝經論語既有子曾子門人所集孝經又後人雜引詩書旁取傳記之語附會成書何獨古書首尾尚是夫子舊本則其為齊魯諸儒次序附會而作序亦可知也子曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也文獻不足故也足則吾能徴之矣聖人於夏殷之禮不曰吾能知之而曰吾能言之此記禮之時語也聖人生知之資其於禮之義理則知之素矣此其所言蓋謂其器度文物之詳爾雖當時二代之禮失亡將盡而聖人之資觸類旁通皆能歷歷言之但其謹重之意必欲得文獻以證成之足則吾能證成其書矣而卒不可得故終於從周而幽厲傷之又終於從魯而郊禘又非禮後世訖不得見其成書之盛其間見於禮記之所傳者又多雜以門人經師之說惜哉删詩王文憲嘗謂今之三百篇非盡夫子之三百篇也夫子刪繁蕪之三千取雅正者三百而三千之中豈無播傳於世俗之口者夫子之詩既燬於秦火矣漢興管絃之聲未衰諸儒傳夫子之詩不全得見世俗之流傳管絃之濫在者皆以為古詩取以足夫子三百之數而不辨其非也不然若孔門之誦詠如素絢唐棣諸詩經書之所傳如貍首轡柔先正繁渠諸詩何以皆不與於今之三百而夫子已放之鄭聲何為尚存而不削耶序易彖繫象說卦文言彖繫象說卦文言魏伯陽顔師古所謂十翼者此則夫子之意而門人述以成書謂皆夫子所筆則亦非也彖傳例有發明中間豈無未盡之意象傳句多重復中間寧無填足之詞蓋門人得夫子之說而欲足成其書不得不爾何以知之以繫辭傳知之也十翼莫粹於繫辭傳或不以子曰起文或以子曰起文或引子曰以答問或中引子曰以為證或末引子曰以為斷王文憲謂與子思作中庸同體蓋繫辭傳門人以夫子之意發明非夫子之親筆也果夫子之親筆則章首之子曰何以或有或無或問或答篇中之子曰何以或引或斷耶然則繫辭傳之成文且非夫子之全筆則彖傳之具體小象之比辭安得為夫子之全筆耶獨大象乃夫子之筆辭簡義精體用明切三聖所作之外此自為夫子之一經而門人得夫子之言獨文言無所附㑹夫子文言最為明白乾卦文言各以子曰答問深密明暢其後申述卦爻之義不以子曰起文者意便不及如所謂故或之或之者疑之也故無咎逈與前章不同其於六十四卦之中發明爻義者亦文言之體間舉數爻辭義俱明門人不敢足成三百八十四首故於乾坤二卦文言之外餘卦文言雜諸繫辭傳是為得之後之學者於繫辭十翼但欲見夫子著述之多而不敢别其為門人發明之辭與其足成之體今姑論其梗概如此又當别為讀經者言之七十二人顔回閔損冉耕冉雍宰豫端木賜冉求仲由言偃卜商顓孫師曾㸃曾參淡臺滅明高柴宓不齊樊須有若公西赤原憲公冶長南宫縚公析哀顔由商瞿漆雕開公良孺秦商顔刻司馬耕巫馬期梁鱣琴牢冉孺顔幸伯䖍公孫龍曹恤陳亢叔仲㑹秦祖奚蒧公祖兹亷潔蘧瑗宰父黑公西蒧穰駟赤冉季石處左郢狄黑商澤任不齊榮旗顔噲秦冉秦非漆雕從燕伋林放申黨步叔欒石子蜀施之常鄭國樂欣顔之㒒孔忠漆雕哆容蒧顔相史記家語所載間冇不同凡七十七人今依文翁石室圖七十二人之數作春秋春秋者魯史記之舊名周公之封於魯祝史與冊皆備故魯國之史謂之春秋韓宣子適魯觀書於太史見魯春秋深歎周公之德與周之所以王則春秋之史書一國之事及諸侯赴告者本自有禮法制度東遷以後王法不行而諸侯放恣伯政迭興諸所赴告關係既大而春秋舊法又失是非不明善惡差謬故夫子晚年道不行遂因魯史起隱公元年止哀公十四年獲麟改正其失以明王法於是褒貶既彰善惡難掩亂賊知懼遂為百王不易之大法子路死於衛事見哀公十五年及檀弓葬魯城北泗上水經泗水徑魯縣北注泗水南有孔子冡在魯城北六里史記注孔子冡塋百畞冡南北廣十步東西十三步高一丈二尺冡前以瓴甓為祠壇方六尺塋中樹以百數皆異種又無能名其樹者塋中不生荆棘及刺人草弟子皆服心喪孟子曰三年之外門人治任將歸入揖於子貢相向而哭皆失聲然後歸子貢反築室於場獨居三年然後歸孟子受業子思之門人受業於門人此史記孟子本傳之說朱子謂孟子親受業子思之門人字疑衍而此存之蓋未及改去何氏晏字平叔魏人此段進論語集解之疏文也朱子節入然魯論齊論至張禹始合至鄭康成則以魯論考之齊論古論為之注三論始合為今定本程子伯子成於有子曾子之門人唐栁子厚亦謂成於曾子之門人而謂有若以似夫子故尊之程子此論為定程子三條叔子已上二條言論語本末已下三條言讀論語之法論語集注考證卷一前
