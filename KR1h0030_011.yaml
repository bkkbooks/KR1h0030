body:
  text: 欽定四庫全書論語集注考證卷十元金履祥撰子張有所得而守之太狹則德孤德孤出易坤文言敬義立而德不孤謂敬義並立而德不孤單也小道如農圃醫卜之屬農如楚之許行為神農之言漢書藝文志農家者流諸書圃如種樹之書畜牧之方醫如方脈諸書卜則龜書周禮三兆今亡史記龜策傳略存一二楊氏曰百家衆技猶耳目口鼻皆有所明而不能相通莊子天下篇曰天下大亂聖賢不明道德不一天下多得一察焉以自好譬如耳目口鼻皆有所明不能相通猶百家衆技也皆有所長時有所用雖然不該不遍一曲之士也四者皆學問思辨之事耳未及乎力行而為仁也然從事於此則心不外馳而所存自熟故曰仁在其中矣集注前篇凡言在其中者皆不求而自至之辭以此例之則仁在其中者亦是此章言學問思辨之事而仁在其中蓋謂從事四者則心不外馳而所存自熟也中庸安行為仁力行近乎仁而孔門問仁者夫子皆於行上告之如答顔冉樊遲可知大德小德猶言大節小節間闌也所以止物之出入謂如以木闌遮防人出入也律闌入法漢書內之間中間若今勾闌也子遊譏子夏弟子於威儀容節之間則可矣灑掃凡曲禮所載糞之禮與少儀弟子職所載灑掃布席之節皆是應對凡曲禮所載名稱辭令及儀禮少儀所載禮辭皆是應假借去聲進退儀禮曲禮少儀所載升降上下揖遜拜跪之儀皆是倦如誨人不倦之倦區猶類也區字從品猶言品類也如區分區畫皆是言君子之道非以其末為先而傳之非以其本為後而倦教古書於怠惰等字皆從心獨倦字從人蓋指及人之怠而言也故論語曰誨人不倦孟子云教不倦則倦字指怠於教人而言所以集注正作倦説集注先後指本之深淺而言程子先後指教者之次第而言灑掃應對便是形而上者理無大小故也故君子只在謹獨王文憲曰謹獨二字最密至微處照對不到理便間斷程子數條程子此章發明聖賢閫奧集注先後指本末深淺言程子先後指教者次第言前一條釋子夏正意四條辨子遊本末之説明子夏始卒之意優有餘力也此章先言仕蓋本為仕而不學者設當時多是世族子弟未學而仕者亦有學未成為貧而仕者如所謂抱關委吏之類優謂盡其事而有餘暇也下句因上句而交發集注下文資驗二字最妙孟莊子左氏所載及夫子所言加於人一等大學傳所引孟子所引其賢可知集注指獻子賢德二句而後不改者可以為孝哀矜勿喜喜者得獄之情快巳之察也哀矜則生寬慈喜則生深刻夫子不可及章夫子之不可及一節言聖德之體高妙也夫子之得邦家至其可及也一節言聖德之用神速也體人所難知故又指其用言之然得邦家為其得天下國家而用之也惜乎夫子未嘗得邦家而用之而神化之功不見於斯世然雖窮而在下而一二用處亦可以窺見矣堯曰堯曰咨章咨嗟歎聲咨古文尚書並作資用資命之意如所謂咨十有二牧曰則咨非嗟也所以集注總作咨命之辭中者無過不及之名執其中此授以治天下之要訣也聖人治天下惟執此無過不及之準爾然此章不見於書王文憲謂此尚書之脫簡當在舜讓於德弗嗣之下子張問於孔子子張問古論語分此下自為一篇題曰子張問君子無衆寡無小大無敢慢斯不亦泰而不驕乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎君子不畏衆而弱寡不重大而輕小視之如一無一敢慢者是不驕也君子臨民以莊蓋以嚴敬持己非以此加人也故威而不猛出納之際乃或吝而不果則是有司之事而非為政之體有司掌財之官收支俟命不敢自專者此有司之職非為人上之體也遲疑靳吝致誤非小此段説政令刑賞此一句是説賞不知命章論語二十篇格言多矣至此篇言帝王相傳與為政之略而又以此三言結之蓋切要丁寧之語中庸之篇始言一理中散萬事言至誠之道至聖之德可謂詳矣而末章復自下學立心之始言之以推至其極亦是如此又論語起止都説君子語録亦每拈起並説愚謂篇首君子是盡其在我聽其在人篇末君子是盡其在我聽其在天篇首君子之量篇末君子之守人而知不得命分則無以為君子矣論語集注考證卷十
