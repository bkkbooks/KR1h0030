body:
  text: 欽定四庫全書論語集註攷證卷四元金履祥撰述而老彭商大夫此古註之說然雜書本云彭祖商賢大夫恐古註之說或出於彼見大戴禮按大戴禮戴德所編戴聖取其前三十餘篇併他書為禮記其後者為大戴禮記今按虞戴德第七十篇曰公曰善哉子之察敎我也子曰丘於君唯無言言必盡於他人則否公曰敎他人則如何子曰否丘則不能昔商老彭及仲傀政之敎大夫官之敎士技之敎庶人揚則抑抑則揚綴以德行不任以言又按仲傀即仲虺仲虺為左相而云老彭及又云敎大夫則老彭不止於大夫矣此雖不可攷然云大夫則恐古註誤認為彭祖爾按述而不作信而好古此二句乃老彭之規模見趣夫子引而自比之也黙識章朱子曰此必因人稱聖人有此故聖人謙辭以答之後來記者失其上文但作聖人自言耳黙識是得之於心學不厭則更加講貫誨不倦是施之於人德修章此章亦必有上文蓋因學者有不切已之憂而言也德指行學指知義善指事下二句猶言遷善改過朱子謂有淺深聞義則遷就合冝耳不善則是過失矣燕居章程子叔子甚矣吾衰也句久矣吾不復夢見周公句從致堂胡氏程子叔子志道章添入知此二字蓋須有知之在前得其道於心而不失之謂舊本作行道而有得於心後改定從此第二篇德字雖改作得之於心而不失不如此章之密按此章上三句一節密於一節下一句雖寛而實密文中子曰志道據德依仁而後藝可游朱子亦稱之王文憲曰此句尤要細玩六藝於小學中已習元在志道之先至是方可游而後二字不在藝字却在游字上觀朝夕二字藝實游於志據依之間所以為重諸說皆說游藝輕了稱不得上三句惟朱子說得停當曰朝夕游焉曰動息有養曰内外交養曰無少間隙曰心無所放此皆游藝之功雖通釋亦失之舉一隅石經下有而示之三字程子二條叔子行藏章番陽語録周謨録内有一條曰用之則行舍之則藏此八字極要玩味若他人用之則無可行舍之則無可藏唯孔子與顔淵先有此事業在已分内若用之則見成將出來行舍之則藏了他人豈有是哉故下文云唯我與爾有是夫有是二字當如此看婺本劉砥所録意亦同此今按集註不明說此意然意已在内蓋行藏字與仕隠字不同謂之行必有所施行之事謂之藏必有所留藏之具孔顔有此不在言者但孔子聖之時故用之則行舍之則藏可仕止久速無意必固我若伊尹則聖之任未免必於行伯夷聖之清未免必於藏爾至於所以行藏之具蓋不在言者下此則可言仕隠不可言行藏矣子路見夫子許顔子謂惟我與爾有此行藏之具故自許以有將帥之具而以行三軍誰與為問若上文但是說用舎無固必則下文所問不相類矣惟兼看語録之說則相應暴虎徒博馮河徒渉本爾雅文通釋謂暴馮皆有慢侮欺陵之意富求章此章上増入一二虛字則不待說而明曰使富而可求也雖執鞭之士吾亦為之矣其如不可求何豈若從吾所好語錄引伊川之說謂君子嬴得為君子小人枉了做小人所慎聖人無所不謹俱從容中道人不覺其謹爾然於是三者尤加重故門人覺而記之齊音齊齊不齊以致齊禮記語並如字子在齊聞韶儀禮通解曰孔子至齊郭門之外遇嬰兒挈壺俱行其視精其心正其行端孔子謂御曰趣驅之韶樂方作孔子至彼而聞韶學之三月不知肉味履祥按視精行端之說亦見漢書註朱子謂此說差異亦有此理漢志曰至春秋時陳公子完犇齊陳舜之後韶樂存焉故孔子適齊聞韶朱子謂此亦無據何文定謂齊大國有此事力故能備此履祥按齊之有韶非敬仲所能致也敬仲亡公子豈能以韶樂奔齊哉古者天子賜諸侯樂安知非周以之賜太公耶故魯亦有韶箾然孔子不於魯聞之蓋是時孔子年三十五魯亂適齊而適聞之也其後晚年歸而正魯樂豈韶之遺音齊人識之不失其舊即三月朱子自作一句㸃史記謂學之三月程子謂三月當作音字蓋誤寫也程子之意蓋謂一聞之三月不知肉味聖人之心不應如此固滯此可謂知聖人之心朱子謂史記三月上有學之二字程子適不攷爾蓋聖人聞韶則必學學之亦必數月始熟方聖人之學之也以夫子之誠與大舜之德妙感契悟自忘肉味此正可見聖人之樂與聖人之心為如何三月蓋謂學之三月爾非三月之久不知肉味也曰不圖為樂之至於斯也為字平聲謂舜之作樂何其情文善美之盡如此近有北士因漢志陳敬仲以韶奔齊之說遂謂夫子在齊聞韶三月忘味傷之至也曰韶乃陳樂何為而至於齊蓋傷陳氏之必篡齊也其後陳成子果弑簡公夫子請討之此乃證古集之說路史意亦然大為躁妄且感韶之盛而三月忘味程子猶以為非聖人之心故集註取史記學之三月以證之豈有陳氏専齊而夫子一聞樂聲三月忘味聖人之心乃傷忿固滯如此聖人之怒在物不在己何為忿忿悒悒一病三月也學者不知守文公之說求聖人之心而好為新竒何所不至可憂甚矣晉納蒯聵而輙拒之事附十三篇内伯夷叔齊見前篇此註事在史記伯夷傳中子中去聲一音仲伯夷長子叔齊第三子故二子既逃國人遂立其中子中子不知其名其墓漢靈帝光和元年淪於海不斥衞君而以夷齊為問子貢在言語之科其善問如此怨或問云出於激發過中之行不能無感慨不平之心子貢善問莫精在怨乎一問蓋伯夷叔齊固以事言而怨乎一問又以心言事可勉而心不可掩夫言夷齊則不為衛君已可知矣然使伯夷逃國而其心猶曰我固常立特以父命不得不逃叔齊逃國而其心猶曰父命立我特以凡在不得不逃即此不得不然之心則怨矣其與衛輙惟恐失國之心何逺哉此子貢所以再有此問也惟伯夷以不違父命為安叔齊以不躐天倫為正脫然惟恐有國之為累而曽無幾㣲不得已之心此其所以為賢而孟子直以聖之清許之緬想此心而下視衛輙之心真天淵之不相近矣而謂夫子為輙乎或問於此極為詳明惜不約入集註學者不可不參看然不獨以此論古人心跡之辨又當以此自察於心術幾㣲之間也程子叔子程子曰非樂疏食飲水也叔子也此句設辭但此章與顔樂章不同前章但言顔子不以貧賤改其樂耳此章則以貧賤與不義富貴對言之大抵道義所在雖疏食飲水樂亦在其中若不義而富且貴則大為身心之累矣故寧以䟽食飲水為樂而視不義富貴漢然不與己相干也此在聖人不足言但此篇多聖人之謙辭故其言云爾雖䟽食飲水不能改其樂也王文憲曰或問既以不改其樂與樂在其中為㣲有間矣而程子乃以不改釋在中宜思之履祥謹按程子之說在圈外者多是收入語錄其與本註襯貼文意者不同然此言亦是有間前章顔子不改其樂乃是不移於外物此程子言䟽食飲水不能改其樂乃是外物不能移也外物不能移故雖䟽食飲水曲肱而枕之樂亦在其中矣又曰未詳劉聘君說見前篇元城劉忠定公名安世字器之官至待制他論舊來經書無印本太學博士兼立諸家之本學者所在傳冩自五代長興以來國子監始有版本然與開元本已㣲有不同開元本明皇所定有司所寫已與古文不同自來民間傳冩本猶有存者故劉忠定尚得見他論今書皆以監本為定更不參攷然此五十字其來久矣五十作卒篆文五字與卒字其中皆有交互之形以故致誤史記此章作假我數年如是我於易則彬彬矣玩其辭意則五十字當是吾字是時孔子年已幾七十史記假我數年之語乃是夫子讃易之時其時年幾七十易象與春秋藏於魯太史孔子魯人少而好學固無所不學但其敎人惟以詩書執禮為重而尤重於禮其觀周其之杞之宋皆為說禮計晚年反魯知道不行始為述作垂世訃以天地陰陽之道備於易故讚易以善惡賞罰之事備於春秋故又修春秋史謂晚而好易讀之韋編三絶謂尤加精審爾非至此始學易也語錄曰此章大㫖在無大過不在五十上吉凶消長之理進退存亡之道此用程子易傳序句吉凶者陰陽之應消長者陰陽之機進退則體消長之實存亡則積吉凶之極人之體易稍不中節㑹即為差失聖人安得有差失且無㣲差安得冇大過言無大過者謙辭爾又按史記此句作我於易則彬彬似謂讚翼無所差失集註首存此說學者當兼思之易而學易以䜴反雅言章程子伯子葉葉在樊鄧之間本姬姓所封之國楚滅之以為縣僭稱公楚自熊通以來僣稱王故為其縣尹者亦僭稱公沈諸梁本沈國之後已姓以國為氏至諸梁為楚葉縣尹也發憤忘食憤如不憤不啟之憤忘食如學韶不知肉味之意發憤忘食謂求之也樂以忘憂謂得之也集註後篇以克己復禮為乾道發憤忘食乃乾道也漢書董仲舒下帷發憤亦用此意未得已得所以發憤者為未得也所以樂者為得之也故集註補此四字句中所自有之字也俛焉日有孶孶不知年數之不足本禮記文全體至極純亦不已聖人無所不致其極發憤忘食則無理之不可得樂以忘憂亦無入而不自得矣故集註曰全體至極聖人於學求之得之常常如此不知老之將至此所謂純亦不已也桓魋註避廟諱作威蓋宋桓公之後别為向氏又世為司馬故又以司馬為氏司馬牛其弟也必不能違天害已史記孔子去曹適宋與弟子習禮大樹下宋司馬桓魋欲殺孔子伐其樹孔子去弟子曰可以速矣孔子曰云云按此事在敬王二十五年蓋魯定公薨之年或問於此章發明詳盡學者所當參看隱門人以言語求聖人故疑聖人為隠行聖人以行示學者葢未嘗隠也是丘也謂我無一動之間不示二三子以義理者此乃丘之所以無隠於二三子也程子叔子四敎程子曰叔子也按文行忠信此夫子敎人先後淺深之序也文者詩書六藝之文所以攷聖賢之成法識事理之當然蓋先敎以知之也知而後能行知之固將以行之也故進之於行既知之又能行之矣然存心之未實則知或務於誇博而行或出於矯偽安保其久而不變故又進之以忠信忠信皆實也分而言之則忠發於心而信周於外程子謂發已自盡為忠循物無違謂信夫下同有存心忠實而於事物未能盡循而無違者故又以信終之至於信則事事皆得其實而用無不當矣此夫子敎人先後淺深之序有此四節也或疑首篇言行有餘力則以學文而此章以文為先何也曰首篇言弟子居家之職此章則夫子設敎之序也朱子嘗論知行二字論先後則知為先論輕重則行為重知為先此章是也行為重首篇之言是也然首篇雖以學文為後乃所以審其行而進於實也或又疑四敎與四科如何曰四敎以先後淺深言四科以成德達才言夫固各有攸當也不知而作章王文憲曰集註無所不知在我無是也之中多聞多見若作兩下說恐非夫子意細玩集註當自見文憲之意欲以多聞擇其善者從之作一截多見而識之知之次也自作一截文定未以為然按班固溝洫志贊引此下二句亦自作一截此章聞與見未易分明語録亦不分曉今以實事證之多聞擇其善者而從若夫子說夏殷周之禮有善殷者有從周者又如夏時殷輅周冕及刪詩之類此多聞三代之事所以不可不擇也多見而識之若夫子修春秋即多見當時之事記則善惡皆當存之者也知之次也蓋謙辭互鄉寰宇記徐州沛縣合鄉故城古互鄉之地蓋孔子云難與言者童子或云當是互鄉難與言之童子蓋夫子與其潔進不與其退保其往其字是但指童子非指互鄉也若互鄉之人皆難與言則夫子當曰與其進也不與其地也與其潔也不保其習也今存此說以備參攷程子叔子仁逺章程子叔子魯與呉皆姬姓魯周公之後出自文王呉太伯之後出自太王魯之娶呉亦齊景公女於吳之意而魯尤為失禮未嘗顯言顯言則夫子必不答也子與人歌而善論語前章子於是日哭則不歌則非喪非弔之日固未嘗不歌也此章與人歌後篇取瑟而歌歌之一字凡數見於書所歌何辭所和何曲初學者亦不可不知蓋古人為學無日不在禮樂之中無故不徹琴瑟喪復常讀樂章爾雅徒歌曰謡蓋古人不徒歌必合琴瑟而謂之歌口舉其辭而琴瑟以詠之猶作樂者升歌而琴瑟八音從之也子與人歌而善蓋其人或傳古調或得新操辭理俱善必使反復唱奏而後從而和之和之者述其音節而歌之也孔子少時學樂於萇𢎞學琴於師襄習韶於齊大意可想此章則聖人不忽小物不掩人善之至也一事之㣲而衆善之集門人可謂善於記聖人朱子亦可謂善於觀聖人矣聖仁章王文憲曰學不厭誨不倦前章方言何有於我此章乃曰則可謂云爾學者當思語録曰不居仁聖已為謙矣以不厭不倦為無有又謙之謙也至於事父兄見公卿勉喪不為酒困一節則又謙之謙也蓋聖人但見義理無窮而已有未盡是以其言毎下而益見其高也履祥按前章自省之辭此章必因人之問子貢問夫子聖矣乎其下答辭與此章類故晁氏之說以為有稱夫子聖且仁者而夫子辭之如此但集註語録於博施章既辨聖乃仁之極而此章又云為是為仁聖之事亦以此仁聖誨人則又似聖與仁為對按此亦因人之問聖言其德仁言其及物夫子雖不敢自聖而所言為之不厭即作聖之事誨人不倦即及人之仁所以公西華曰正唯弟子不能學也可謂得之矣為之不厭即學不厭之意學不厭敎不倦前章與子貢章凡兩出似不必異說有諸博物志曰之乎為諸誄哀死述行之辭古本論語元作讄說文引論語云讄曰禱爾於上下神祗亦作譟禱也纍其事以求禱也其作誄者則哀死而述行以謚之之辭同是力軌反而義不同必開元長興吏書之誤集註偶未之攷爾其稱讄曰必自有一書若周禮太祝所掌六祝六祈六辭之類是也子路引之以證其有禱之禮夫子心行與天地神明一久矣豈待今日之禱哉故又借其禱字以曉之士喪禮疾病行禱五祀五祀中霤竈户門行家所得祀也程子上條叔子下條伯子君子循理循理所以坦平也君子固有憂時然憂道耳憂道故循理所以心廣體胖而未嘗不蕩蕩小人亦有樂時然縱欲耳縱欲則役於物所以患失行險未嘗不戚戚也聖人全體渾然王文憲曰指德性陰陽合德指氣質中和之氣氣即性語録曰聖人固是自然學者便須舉偏補弊蓋自舜之命夔已如此而臯陶陳九德亦然程子叔子泰伯三讓謂固遜也語録徐寓問三以天下讓程言不立一也逃之二也文身三也不知是否曰據前輩說亦難攷當時或有此三節亦未可知但古人辭讓必至再三想此只是固讓履祥按禮書初讓曰禮讓再讓曰固讓三讓曰終讓或問亦嘗引之則此固遜字當改為終遜則貼本文作終以天下遜於事理為通蓋遜王季及文王至武王而終有天下也番饒伯輿謂古公年壽甚高末年武王已生其祖子孫皆有聖德而泰伯遜之蓋一遜王季二遜文王三遜武王也王文憲取之又羅氏路史註謂初遜與王季王季以與文王文王以與武王而有天下故曰三以天下讓亦為得之大王之時商道浸衰而周日彊大季歴又生子昌有聖德大王因有翦商之志而泰伯不從按詩稱大王實始翦商不過謂周家翦商之業自大王始基之爾而後世稱大王有翦商之志不惟誤認詩意其失大王本意甚矣且大王遷岐在小乙之世至丁巳而高宗立殷道中興者六十年歴祖庚祖甲祖甲二十八祀而生文王其時商未衰也大王亦安得有翦商之志哉况大王前日猶能棄國於狄人侵豳之時而今日乃欲取天下於商家未亂之日大王之心決不若此其悖也夫以泰伯之德當商周之際固足以朝諸侯有天下泰伯採藥荆蠻而人心翕然歸之遂成吳國夫以一亡公子而創興一國使其襲周邦之盛而為之豈不足以有天下故夫子斷之曰以天下遜也且泰伯之遜人知其遜國耳而豈知其遜天下哉故曰民無得而稱焉泰伯不從事見春秋傳左傳僖五年宫之竒曰泰伯虞仲大王之昭也泰伯不從是以不嗣按傳但稱泰伯不從其父而遜國適呉是以不嗣周耳初不言所以不從者何事也史記周本紀呉世家皆不言翦商之意節文節則限制可守文則儀度可觀恭謹者有所持循勇直者有所撙節故無過不及之弊然非講學則亦不知禮之所在也免夫句小子句昔初見子何子問為學之要子何子曰立志以定其本居敬以持其志又問敬之工夫何子曰黄先生謂畏之一字最切自古聖賢只是一敬畏之心曽子曰詩云戰戰兢兢曾子終身是如此自古聖賢皆然但曾子臨終又說出以示學者耳程子叔子孟敬子章孟敬子獻子之孫修身之要原作驗字蓋本程子後改從要字操存動正出之前省察動正出之際若夫籩豆之事朱子語録疑孟敬子平日必加詳於器數之末者故曾子勉其以敬身為木履祥攷之檀弓則孟敬子本直情徑行之人其後必因曾子將死丁寧之意而後改爾悼公之喪季昭子問於孟敬子曰為君何食敬子曰食粥天下之達禮也吾三臣者之不能居公室四方莫不聞矣勉而為瘠毋乃使人疑夫不以情居瘠者乎我則食食其任情棄禮如此生不能事死又薄之宜曾子諄諄有鄙倍之戒也蓋籩豆之事則有司存曾子謂其百乘之家禮器有司俱備但暴慢鄙倍之氣不除則非行禮之人爾其後敬子卒諡為敬其因曾子之言而改者歟程子曰伯子尹氏意同伯子添養字按程子上重道字君子所貴乎道者惟有道則動正出之間斯能如此朱子下該籩豆二句謂本末精粗道固無所不在而君子所重則在此三者蓋修身乃道之本而籩豆則其末耳末則有司存焉朱子初從程子以三者為修身之驗後改竹修身之要則前後工夫極為詳密操存二字上該程子之意省察二字下示學者之方可謂備矣蓋無平時涵養之功而但為臨事著力之計固是不可然如程子之言則惟聖賢故能如此恐非所以望敬子者而况可以望學者乎大抵孔門論學未嘗懸空說存養况容貌言色無時不然豈必黙坐存想而後為存養然只黙坐存想已是正顔色矣故此動正出之間即存養之地頭而暴慢信鄙倍即省察之條件逺近二字即是所貴乎道之工夫斯字矣字又為快當朱子語録論此三句工夫却在下面如非禮勿視聽言動工夫却在勿字上則此章工夫全在逺近字上也自孟敬子以下學者多少病病在正當察其孰為暴孰為慢孰信孰偽孰鄙孰倍而即逺之近之若夫周旋中禮正由中出則異時成德之事也以能問於不能或問辨論已詳但經文於能字下添者字則不待辨說而明不知二字得之唯知義理之無窮二句該盡一章意犯而不校語録所存者廣大故小小觸犯自不覺也何暇與之校友馬氏以為顔淵馬氏馬融注也曽顔之在孔門不同時但此章所言非顔子不能而知顔子者亦無如曾子託孤章王文憲曰可以二字猶以才言不可奪處乃見其節門人有曰不可奪也貫上二句朱子然之故取程子之言則才輕節重攝國政寄百里之命謂遺命託國也才節如此豈不足以任天下之重而止言寄百里之命古者封建故此但指一國而言天下亦自一國而推爾程子叔子毅彊忍也堅彊忍耐無規矩黄文肅曰此三字說得寛是就嚴毅上說如說寛嚴相似此毅是耐𢎞是包得寛闊毅是守得堅固一字似橫看一字似直看履祥按程伯子此條凡兩出其一止云𢎞而不殺則難立毅而不𢎞則無以居之工夫互相資不可偏無無規矩三字恐止是無骨筋三字之意洛中方言如此曽子本意止是言士不可不𢎞毅為擔子重而道路逺也下文開說任重是仁以為已任道逺是死而後已惟𢎞則能任此擔惟毅則能到得逺集註本註及第二條程叔子之言止說此意無規矩隘陋乃取伯子之言増入反說以盡工夫交進之詳爾詩有邪有正此據今毛氏詩為言也古之敎者工以納言時而颺之謂采詩以為樂歌也而納言則謂之五言以其言合於五常之理五聲之節也其在周則二南之風為房中之樂用之鄉人邦國大小雅用之邦國朝廷頌用之宗廟其後世道非古而變風變雅始作夫子删詩又取其粹然一出於正者凡此所以能興起也自夫子三百之詩不存而漢儒始以刪去之詩足其數則邪詩始復見如溱洧丘麻鄭風月出諸篇凡三十餘首皆邪詩也朱子固嘗疑桑中溱洧諸篇用之祀何鬼神享何賓客何詞之諷而何禮義之止矣則亦何興起之有乎故王文憲決然以為今之三百篇非盡夫子之三百也諸儒多然之若集註止曰詩本性情其言既易知云云亦無不可者興起其好善惡惡之心上文有雅有正故此言有好善惡惡然詩固有譏刺者此所以能興起人惡惡之心也非若丘中溱洧鄭聲月出諸篇自為邪之詩也自為邪之詩幾於勸矣何興起之有乎固人肌膚之會筋骸之束此禮記語人無禮則肢體散漫都無収束雖欲收束亦無所持循五聲五聲宫商角徵羽聲之清濁高下也十二律黄鐘太簇姑洗蕤賓夷則無射為六律大吕夾鐘仲吕林鐘南吕應鐘為六吕黄鐘為律元三分損一下生吕吕三分益一上生律是為十二律每律五聲共六十律又兩變聲共八十四調歌樂章之音調作樂則以人聲為貴也舞以樂音之輕重疾徐為舞節以象其形容也八音金石絲竹匏土革木也金大鐘編鐘石玉特磬編磬也絲琴瑟也竹簫管也匏笙也土塤也革鼔鼗鼙也木柷敔也謂以十二律卟五聲而柙詩歌以入八音之器而為樂也邪穢人欲之未盡浄者查滓氣質之未盡化者非小學傳授之次乃大學終身所得語録曰先王敎人之法以樂官為學校之長便是敎人之本末都在此履祥按興詩是感發立禮是持守成於樂則是融化矣程子叔子不可使知之王文憲曰蓋欲使之知而不可得非不使之知也集註能字善融化程子叔子朝四暮三之術出莊子齊物論篇狙公賦芧曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆悅釋文狙獮猴狙公飬狙官芧橡子程子二條叔子驕吝盈歉本支此章甚言驕吝之害大雖有周公之才且不可况常人而可有此乎程子章指己為周密盈歉之說亦見世人之病多是志不能帥氣而動於氣氣盈時即驕歉時即吝朱子又細觀人之情多相因而為病之由故又發明以補程子之意學者不知體認省察紛紛以為問語録詳之至疑當作志或疑至者當訓及朱子不與其說然圏外取楊氏之說似亦不及於禄之意蓋守死者篤信之效王文憲曰北山得朱子舊本此句之上有能篤信好學然後能守死善道二句尤簡潔四者更相為用缺一不可逐句互說入居去就見隱出處貧賤無學富貴無守晁氏互說已上並王文憲語不在章程子叔子亂樂之卒章語録曰楚辭有亂曰是也又曰關雎謂之亂則前面須更有樂關雎詩乃其卒章耳舊註訓亂為終或問亂何以訓終曰既奏以文復亂以武履祥按辭以卒章為亂樂以終為亂此綂謂周南之樂自闗雎而終於麟趾者也史記曰孔子世家古詩三千餘篇孔子去其重取其可施於禮義始於袵席故曰闗雎之亂以為風始鹿鳴為小雅始文王為大雅始清廟為頌始不及章程子叔子則集註作準則之則猶所謂易與天地準之準也易本義作與之齊準下文尹氏曰則之以治天下則又作法則之則其實自堯言之則法則乎天自人觀堯則與天齊準也禹為司空平水土稷名棄為田正后稷敎民稼穯民是以不飢契音泄契為司徒民是以有敎他書並作禼臯陶音遥為士師民是以不犯他書或作咎繇咎音臯伯益一作伯翳為虞官掌山澤是以鳥獸魚鼈民不可勝食材木不可勝用而惡物不為民害亂臣十人吕成公曰陸氏經典釋文無臣字文母太姒劉侍讀名敞字原父作七經小傳邑姜武王妃太公望女也亂本作乿古治字按諸註疏皆作治亂曰亂夫能治亂即謂之亂則能去惡即謂之惡能去害即謂之害乎此甚不通之說而諸書解亂字皆云然其失久矣今按古文尚書德惟乿否德􅜆二字正與集註合治字從爪從糸從乚取以手理糸而有條理也後人􅜆字加乚與乿字相似故遂誤以乿為亂字書家以􅜆訓治其加乚者為煩亂與古文不合當以亂訓治而􅜆為煩亂乃通六州三代名州各不同夏見於禹貢商見於爾雅周具於職方此特據禹貢為言耳或曰三分以下别以孔子曰起之自為一章朱子舊以夫子述武王之言而及此但以周為言故綂為一章而或問遂收胡氏之說後以事勢言之遂以此段為専言文王其實文王終武王立十三年而始伐紂則十二年之間紂勢猶熾而惡未稔未即傲然與之並立也以三分有二之勢而猶事之則不謂之周家忠厚不可也故曰至德至德之言亦聖人衰世之意蓋自春秋以來諸大國於周室何有前楚後秦虎視耽耽羣䧺垂涎未敢先發蓋欲取而不能非可取而不取也况於服事之乎以此言之則武王謂之非至德不可斯言也亦聖人衰世之意也黻蔽滕也先言黻而後言冕恐舉言黻黼之服皆祭服致美黻冕恐是五服五章以命有德之謂黻冕朝服非獨祭服也詩赤黻㑹同可見先鬼神次尊賢次民事亦立言之序田間水道周制十夫有溝溝廣四尺深四尺百夫有洫洫廣八尺深八尺早則儲水潦則泄水不私其已而致重乎鬼神賢德民利此有天下而已不與焉者論語集註攷證卷四
