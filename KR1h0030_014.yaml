body:
  text: 欽定四庫全書孟子集註攷證巻二元金履祥撰公孫丑上管仲管仲名夷吾字敬仲相齊桓公霸諸侯晏子名嬰萊之夷維人索隱云字仲謚平事齊靈公莊公景公以節儉力行重於齊曾西曾子之孫楊氏曰云云楊氏之說未盡此章之意夫曾西言子路則曰吾先子所畏至論管仲則曰得君如彼其專行政如彼其久功烈如彼其卑此正以作用優劣言也以作用之優劣言則管仲功業逺不可望子路何者管仲之所以霸不過富國彊兵而已夫子之許子路也曰千乘之國可使治其賦而子路自許亦曰千乘之國攝乎大國之間加以師旅因以饑饉由也為之比及三年可使有勇且知方也夫治千乘之賦夫子以為由所優為則與子路所自許無異也且千乘之國小國也又攝乎大國之間師旅饑饉可謂貧弱遂亡矣子路一起而為之比及三年僅邇兩載而能使之有勇則其於富國彊兵乎何有且知方也則加於富强一等矣使子路而得千里全齊之地為之何待三年何止有勇其視管仲乘全齊之力專國四十年之久而僅僅乃爾真不足道矣大抵聖賢作用自是殊絶決非常情所可測度世衰道微不幸聖賢而不獲用天下世人但見霸者君臣小小功業即以為大競慕效之至論孔明諸子則或但以為循良自守者而已此真世道之不幸也管仲晏子猶不足公孫丑兼問管晏孟子但卑管仲而不言晏子由湯至武丁賢聖之君六七作見於書者湯太甲太戊河亶甲祖乙盤庚祖甲他書有孔甲王文憲曰孟子言文王之所以難時難勢難今日之所以易勢易時易鎡基田器爾雅釋名大鋤也此章自首至為我願之乎入要畧四之二恐懼疑惑而動其心下文作疑懼二字尤簡孟子所以不動心者養氣則不恐懼知言則不疑惑王文憲曰疑懼二字包一章大意而直字貫乎其中孟賁勇士史記范睢傳及淮南子註皆云衛人文選註引史記疏賁齊人歸秦武王說苑曰孟賁水行不避蛟龍陸行不避虎狼發怒吐氣聲音動天吕氏春秋曰孟賁過於河先其伍船人怒以楫虓其頭中河孟賁瞑目視船人髪豎目裂舟中人盡播入河帝皇世說云孟賁生拔牛角北宫黝孟施舍不知何國人孟子因公孫丑以孟賁喻其勇因借勇士為喻必勝為主無懼為主心有所主則不動二子之勇亦是其心各有所主故能不動爾王文憲曰黝之養勇是不疑舍之養勇是不懼氣象各有所似氣象者形似彷彿之意爾便以二子直比曽子子夏則不可勇即下文浩然之氣縮即下文直養王文憲曰朱子謂孟子養氣之論夫子已道了曰内省不疚夫何憂何懼與此正相表裏目反即内省也直則不疚矣雖千萬人吾往不憂不懼也無暴其氣暴字集註不訓而以致養體之按後篇自暴章集註曰害也無暴其氣即下文以直養而無害之意也王文憲曰此節論告子及論志氣告子是死底不動心孟子是活㡳不動心程子曰志動氣者什九伯子之說也上文一條下文二條皆是孟子雖對言氣動志程子則謂志是氣帥終是志動氣處分數多氣動志處分數少我知言我善養吾浩然之氣朱子曰孟子之不動心知言以開其前故無所疑養氣以培其後故無所懾今按孟子之不動心本是於心上用工知言是其要養氣是其助養氣之本依然是從心上生如行惬於中自反常直集義是也葢心無愧怍自然氣壯氣壯則又能配此心之道義而助其行然集義工夫又自知言來使其不知義理之所在何以能事皆合義此等工夫循環並進知言者盡心知性知言是知道之效不曰知道而曰知言葢因告子不得於言勿求於心之失而反之也盡心知性集註是自知言之本說來則凡天下之言其得失是非毫釐疑似之間無不有以照之而天下之事無可疑者矣告子之學王文憲曰孟子是自然不疑不懼告子是硬要不疑不懼敢問何謂浩然之氣公孫丑兼問孟子與告子不動心之異孟子言告子之失而丑又專問孟子不動心之法孟子即以知言養氣告之丑當首問知言而乃首問養氣雖因論氣而遽及亦是丑之學未能知所先後也及其問氣又止問何謂浩然之氣而孟子告之即直養而無害之說與夫養之之本與其所以飬而無害之節度此是孟子切於敎人傾倒無餘也其為氣也至大至剛氣之體配義於道氣之用以直養氣本大而剛順是直道而行以養之勿令有所屈曲愧怍以害之餒前餒字無是氣則道理餒後餒字無是道義則氣餒集義集義亦是心通乎道使事皆合義自愜於中無所愧怍自生浩然之氣非是義本在外從外假義事為名以虚張其氣而强得其浩然也朱子曰孟子之學蓋以窮理集義為始不動心為效惟窮理為能知言惟集義為能養氣理明而無所疑氣充而無所懼故能當大事而不動心王文憲曰論其用道義非氣無以行論其體氣非道義無以生是非兩字對生襲兩字對氣乃集義而自生於中非行義而襲取於外必有事焉勿正是集義工夫正而助長是要義襲而取集義義襲是養氣一節大㫖助長助長是虚張其氣非惟不久消歇而狂妄自大之病自此生為害大矣程子以七字為句叔子戰不正勝春秋公羊傳曰師不正反戰不正勝何謂知言知言即是物格知至之效緬想孟子格致之初亦是從言語用工本自聖賢之言格來以知其原又是天下之言格去以要其流章内四日似指異端葢天下之言足以惑人最難察識者惟異端為甚其粗淺者固易見也然天下之言不間淺深亦不出此數端此章雖不及所以知言之方然知其所以病即知言之方也葢以此理之正辨其於此理之差其於是非毫釐之間如匠石斵鼻端之堊不容絲髮淺深也大抵人於心中見得有差決是害事葢其心術識見議論一向如此為害不細小差則小害大差則大害所謂生於其心害於其政人見聖賢之闢異端則曰衛道爾言論之末爾殊不知其為救世之大功如老子之言其害實則為申韓虚則西晉佛氏之言其害淺則為梁為南唐深則真是無父無君率獸食人詖淫邪遁四者相因其言既有所偏則必就其中發明其說而說始放說既放則背理愈其故邪邪不勝正而又不能自克故必逃遁其說愈逃遁則愈偏矣又展轉相因也蔽䧟離窮四者亦相因其心既有所隔不見正理故其陷溺必日深心既陷溺則去道愈逺去道愈逺則終必困屈矣然愈困屈則愈隔亦展轉相因也王文憲曰此範要看四個所字詖淫邪遁是病證蔽陷離窮是病原能去其蔽則無下三件蔽之原不一有氣稟之蔽有物欲之蔽有習俗之蔽有學術之蔽夫蔽在乎好學心通乎道程子是發明知言之要然惟好學而後能心通乎道程子曰叔子又曰伯子此一節王文憲曰自此而下文勢抑揚起伏若散漫而無収拾徐而玩之前後相應極為縝密林氏之竒字少頴官至宗丞號拙齋吕成公之師也程子伯子曰伯夷伊尹何如王文憲曰此下說開去孔子也王文憲曰本問伯夷伊尹而帶言孔子者以願學者學孔子則上文六子伯仲也乃所願則學孔子也王文憲曰後面四段盡總在此一句孟子所以自任可知矣是則同王文憲曰言三子德之盛君百里足以朝諸侯有天下應前齊之卿相不足道也言行一不義殺一不辜依舊是自反而不縮所以不為其同者固如此其異者又非伯夷伊尹所及也汙以文勢言當是決字之誤程子叔子麒麟毛蟲之長曾子書陰陽篇曰西方毛蟲三百有六十麟為之長南方羽蟲三百有六十鳯為之長程子叔子此章擴前聖所未發入要畧五之九前聖所未發葢知言養氣之㫖前聖未如此詳明也又自公孫丑再問夫子既聖一段以後所問較寛孟子随答皆𦂳問六子則姑舍是而不敢答問尹夷則吾未能有行焉乃所願則學孔子則意可見矣夫夷惠君子不由此章併伊尹亦不學而止願孔子葢孟子氣浩而逹權其於伊尹固不待學而能但難到夫子地位爾及論孔子則但舉三子之言證夫子之所以異葢聖人妙處亦自難言其實亦自知言養氣之極熟而化爾知言之極耳順是也集義養氣之極從心所欲不踰矩是也王文憲曰學至聖人則浩然之氣不足言矣七十子孔門高弟弟子也史記冇七十子列傳家語有七十子解本七十二人舉全數爾鄒氏道鄉先生鄒侍郎名浩字志完此章入要畧四之三豳風豳周之舊邑公劉所治七月篇豳之舊詩周公陳其詩以為曚瞽諷誦之詩用其籥以為迎寒暑勞農之樂而凡周公所作之詩與為周公而作者編詩者皆係之豳葢豳岐之地乃周公之采邑云鴟鴞之篇周公所作以貽成王鴟鴞指武庚也言既誘管蔡又將毁王室也故周公託為鳥言以詆鴟鴞言以創造之艱難固密也牖户巢之通氣出入處今鵲巢逐年隨大嵗所向即所謂戸也活書作逭古書皆口傳授故字文或不一然古人方言多以四聲通讀尊賢章張子横渠先生助而不税井田之制一井九百畞八家各耕百畞而助耕公田春秋初稅畞則公田之外又稅其私田是為十取其二以孟子之言觀之則是時諸侯皆然不獨魯也周禮詳見載師屋不毛者出里布田不耕者出屋粟民無職事者出夫家之征王文憲曰夫征粟米之征百畞之租也家征力役之征今之徭役也里布布縷之征五畞之稅也信能行此五者此章宜補首篇發政施仁章内吕氏大臨與叔不忍人之心不忍人三字註無訓詁但自天地生物之心說來則不忍人之心乃人稟天地生生之心以為心所以無傷害人之心此一説也下文乍見孺子入井皆有怵惕惻隱之心非内交非要譽非惡聲而然則是怵惕惻隱之心自忍耐不住故爾是所謂不忍人之心者乃忍不住痛傷人之意此又一說也不忍見孺子之入井即不忍見人之顛連無告皆是此又一説文意為順在人聽認惻傷之切隱痛之深因上文怵惕惻隠以為訓葢怵是驚惕是動則惻隱作痛傷之深切若以下文三端例之則羞是耻己之不善惡是憎人之不善辭是解使去已讓是推以與人是知其善非知其惡皆是兩面獨惻隠是痛傷一面但稍有淺深耳按仁貫四性則惻隠貫四端但曰傷痛不見貫四端之意昔謝上蔡以該洽自多程子責之曰可謂玩物喪志謝子面熱發赤程子曰此惻隱之心也夫面熱發赤者羞惡之心爾而以為惻隱葢四端皆從動處發惻隠之心兼怵惕而言則惻惕為驚動但舉惻隠而言則惻為動隠為痛惻是惻然而動隠是隠然而痛惻者感於外而動於中隠者痛於中而發於外惻則專言之仁之端也隠則偏言之仁之端也此心本静有感而動則痛傷羞惡辭遜是非之念發焉此惻之所以貫四端而隠之所以為爱也以此觀之庻得其立言之例於人心為真切又智之為性亦是兩節知與藏也論其端則但以知是非而言此章之説是也論其全體則當以知與藏而言離婁上篇之末所謂知斯二者弗去是也王文憲曰四個界限自分明亦有隨事相連而見程子叔子腔體骼也心綂性情張子語心者身之神明天所賦之理具於其中為性自是而發於外為情充滿也問推與充文公曰推字推將去充字填得滿日新又新王文憲曰新字釋始字程子二條並叔子四端不言信四端之發皆是真實有是四者如此則信便在四者之中矣水火金木待是以生四行皆生於土試反諸身腎屬水心屬火肝屬木肺屬全脾屬土然脾受飲食而四藏皆食於脾於四時則寄王四時每季月以十八日為土位而季夏十八日乃火王之後生土故又為最王遂為中央土位此陰陽家者之説然土氣無不在四時之内此章入要畧一之六王文憲曰此註信貫四端後章仁貫四端函甲也周禮函人為甲音含本註擇所以自處論語集註作擇里此作擇所以自處古人引詩斷章取義古語亦然彼以擇里言冐上文也此以自處言引下文也然此説可兼彼義此章入要畧一之二十五子路章程子伯子耕於歴山歴山在今河中府濟南府亦有歴山陶於河濱禹貢陶丘在今曹州濟陰縣地志云舜陶處疑此陶丘乃濟濱非河濱也當别有處漁於雷澤河中府有雷首山雷水所出入河古傳舜漁處但雷澤今在濮州雷澤縣禹貢所謂雷夏也而歴山陶濮州亦冇之據孟子舜東夷之人則濟濮之間此似為近此章入要畧五之八不隱賢不枉道也本文進不隠賢必以其道謂雖不隱其才能而出仕然必以其道而不苟此是其和中之介今註文似以其道解進不隱賢按此二句或問不隠賢而亦不枉道文公云如此看亦得又語録以不隱賢為讀必以其道為句爾焉能凂我哉列女傳曰柳下惠處魯三黜而不去憂民救亂妻曰無乃瀆乎君子有二耻國無道而貴耻也國有道而賤耻也今當亂世三黜而不去亦近耻也柳下惠曰然油油之民將陷於害吾能以乎且彼為彼我為我彼雖祼裎安能汚我油油然與之處仕於下位栁下既死門人將誄之妻曰將誄夫子之徳耶則二三子不如妾知之也乃誄曰夫子之不伐兮夫子之不竭兮夫子之信誠而與人無害兮屈柔從容不強察兮䝉恥救民徳彌大兮雖遇三黜紂不蔽兮愷悌君子永能厲兮嗟呼惜哉乃下世兮庶㡬遐年今遂逝兮嗚呼哀哉魂神泄兮夫子之諡宜為恵兮門人從之以為誄莫能竄一字君子謂栁下惠妻能光其夫矣詩曰人知其一莫知其他此之謂也莫能相尚韓文公引此語作今之諸侯無以大相過者右此章初看疑孟子與齊宣交際之間殊不快人意及觀戰國䇿齊宣王呼顔斶前而不前使謁者延王斗入而不入彼二士一時風聲氣習尚能如此况孟子伊尹之才孔子之亞宜其不可召也七十鎰按前篇註二十兩為鎰則一鎰已是一斤四兩七十鎰則是八十七斤半古者以黄金為上幣白金為中幣青金為下幣此不知何金然宋次國耳一餽之金已八十七斤孟子之受亦幾於泰按古今稱輕重不同且以漢稱較之漢之一斤當今四兩三錢强以此為度則亦未為泰也平陸今平原郡士戰士去之殺之此依古註按持㦸止是階前庭下執㦸之人庶人之在官者去之止是廢棄之邑有先君之廟曰都此出左氏語録謂古者嘗為都處便自有廟如岐有太王之廟豐有文王之廟曲沃有桓叔以至武公之廟按如此則以都名者當不多今曰為都者五人則已有五都矣而五都之外又非一也故語録又曰恐是周禮所謂都鄙之都按如此則都是大邑爾孟子為卿於齊或問孟子賓師之禮如何文公曰當時有所謂客卿者是也大概尊禮之而不居職任事召之則不往又却為之出弔於滕履祥按客卿不治國事若禮文之事則亦皆與又禮記仕而未有禄者使焉曰寡君違而君薨弗為服也未有禄謂未有常職然出使則以君臣之禮行古自有此禮但此章曰為卿於齊後曰致為臣而歸似孟子嘗以為卿道不行致為臣而去爾使虞敦匠事王文憲作句以註曰董治作棺之事者嬴闕古者棺槨無度古者謂夏商以上未有厚薄之等葢民淳材盛但亦以厚為尚中古棺七寸恐亦虞商以下然亦近古古尚以七寸為度古尺一尺當今浙尺八寸是七寸省今五寸六分也孔子為中都宰制四寸之棺五寸之橔則因時之宜使人皆可為爾自天子達於庻人句連下文得之為當作一讀謂禮制所得為也集註作而恐不必改夫禮制所得為者如棺橔衣衾之美也所不得為者如棺橔重數置翣明器多少之數丘封之度此不可踰越而為者也史記亦謂孟子勸齊伐燕語見燕世家史記葢為戰國策所誤戰國策則傳聞之誤也武王勝殷殺紂立紂子武庚而使管叔與弟蔡叔霍叔監其國此補本文之未辨葢武王使之監殷其出周公之意則未可知然孟子書論及古事者多不辨其事之有無但即此以明聖賢之心無其處事之冝耳然謂之殺紂而立其子則亦未審葢武王入殷而紂已自焚死故武王封其子示不絶也殺父立子於事情不然管叔名鮮蔡叔名度霍叔名處前章沈同以其私問曰燕可伐與孟子曰可子噲不得與人燕子之不得受燕於子噲有仕於此而子悅之不告於王而私與之吾子之禄爵夫士也亦無王命而私受之於子則可乎何以異於是齊人伐燕或問曰勸齊伐燕有諸曰末也沈同問燕可伐與吾應之曰可彼然而伐之也彼如曰孰可以伐之則將應之曰為天吏則可以伐之今有殺人者或問之曰人可殺與則將應之曰可彼如曰孰可以殺之則將應之曰為士師則可以殺之今以燕伐燕何為勸之哉第二篇十章齊人伐燕勝之宣王問曰或謂寡人勿取或謂寡人取之以萬乘之國伐萬乘之國五旬而舉之人力不至於此不取必有天殃取之何如孟子對曰取之而燕民悅則取之古之人有行之者武王是也取之而燕民不悅則勿取古之人有行之者文王是也以萬乘之國伐萬乘之國簞食壺漿以迎王師豈有他哉避水火也如水益深如火益熱亦運而已矣十一章齊人伐燕取之諸侯將謀救燕宣王問曰諸侯多謀伐寡人者何以待之孟子對曰臣聞七十里為政於天下者湯是也未聞以千里畏人者也書曰湯一征自葛始天下信之東面而征西夷怨南面而征北狄怨曰奚為後我民望之若大旱之望雲霓也歸市者不止耕者不變誅其君而弔其民若時雨降民大悅書曰徯我后后來其蘇今燕虐其民王往而征之民以為將拯已於水火之中也簞食壺漿以迎王師若殺其父兄係累其子弟毁其宗廟遷其重器如之何其可也天下固畏齊之强也今又倍地而不行仁政是動天下之兵也王速出令反其旄倪止其重器謀於燕衆置君而後去之則猶可及止也此章燕人畔王曰吾甚慙於孟子陳賈曰王無患焉王自以為與周公孰仁且智王曰惡是何言也曰周公使管叔監殷管叔以殷畔知而使之是不仁也不知而使之是不知也仁知周公未之盡也而况於王乎賈請見而解之見孟子問曰周公何人也曰古聖人也曰使管叔監殷管叔以殷畔也有諸曰然曰周公知其將畔而使之與曰不知也然則聖人且有過與曰周公弟也管叔兄也周公之過不亦宜乎且古之君子過則改之今之君子過則順之古之君子其過也如日月之食民皆見之及其更也民皆仰之今之君子豈徒順之又從為之辭孟子致為臣而歸孟子致為臣而歸諸章在於燕人畔陳賈解慙之後似為此後去齊通鑑細目大事記齊伐燕孟子去齊齊宣王薨並在赧王元年中國而授孟子室史記齊宣王喜文學游說之士皆賜列第為上大夫不治而議論是以齊稷下學士復盛且數百千人按如此則是宣王亦欲以此處孟子宜孟子之不受也吕成公曰齊王之意以為孟子止可為國人矜式未必可以為政鍾受六斛四斗四升為豆四豆為區四區為釡釡十為鍾孟子嘗曰萬鍾不辨禮義而受之萬鍾於我何加焉而齊王欲以此留孟子正犯其所不屑宜孟子之去也季孫子叔疑不知何時人季孫即魯季孫子叔疑不知何人當在春秋後近世有立孟子廟者以門人從享而子叔疑與一人之數可謂謬誤程子叔子晝史記有晝邑音晝語録謂齊地有晝邑又有畫邑路史畫邑在西安城晝邑在臨淄魯繆公史並作穆魯元公之子名顯以周威烈王十七年立為諸侯尊事孔伋以公儀休為相以泄栁申詳為臣泄柳後篇作子柳必其字也禮記檀弓篇屢言子柳事未知是否雜記篇作世柳世泄古語四聲之訛也註云魯繆公時賢人申詳名見檀弓李氏昭武人名郁字光祖號西山學於龜山楊公為其壻舉遺逸官至福建帥機有論孟遺秉文公作墓表二句不怨天不尤人見論語孟子稱之君子指孔子此章入要畧三之十六前段憂世後段樂天孔氏頴達孟子集註攷證卷二
