body:
  text: 欽定四庫全書論語集注考證卷一元金履祥撰學而學之為言效也此張宣公語四聲取訓於義為切又古文學通作斆易傳曰比而效之之謂體則效者體倣之謂也王文憲曰學之為言效也此字義正訓人性皆善而覺有先後此原其所當學後覺者必效先覺之所為指學者之方也明善復初則學之效驗第一句訓下三句義此看集注凡例也效先覺之所為古人為學是先從事上學所謂先覺之所為是其行事踐履文辭制度凡詩書六藝之文皆先覺之所為也朱子於或問中論學分知能二字集注蓋合言之覺知也為能也明善知也復初能也其間語意並合二意而效先覺所為一句尤明備夫聖賢先覺之人知而能之知行合一後覺所以效之者必自其所為而效之蓋於其言行制作而體認之也段內皆合知能意下文引程子曰一條是知上習説其二條及謝氏語是行上習説習鳥數飛數色角反此許氏説文語從羽從白於六書屬諧聲謂形聲合也又月令鷹乃學習朱子欲入此而不及或問引之程子叔子又曰程氏遺書前十卷不分二先生語外書亦多有不分者今但曰未詳坐時習謂坐而時習立而時習舉此二句為例教學者習行之方程子二條叔子説在心樂主發散在外説樂皆喜也而學習言説朋來言樂故程子分內外言之説悅同悅從心則在內之樂而樂乃説之發於外者語録悅感於外而發於中樂充於中而溢於外愠含怒意何文定曰有一朋友言愠作含怒意固下得輕然終有怒字在不見君子氣象惟訓悶字為是如南風之詩曰南風之薰兮可以解吾民之愠兮暑氣何可怒但令人悶耳薰風則能解人之愠悶也下文程子不見是而無悶正此意程子二條叔子惟成德者能之黃文肅疑其略倒蓋不愠乃所以為君子王文憲曰朱子是接程子之意樂由説而後得非樂不足以語君子學至於説則其進不已其應不窮其教不困故及人而樂則其心不私其量能大所以進於君子此各舉效驗字言之謂有自得之説則有及人之樂有及人之樂則有君子之成德本注逆而難進步言學之正推本言程子此條順進而言也有子曰門人尊之不以字行而稱有子後人遂不知其字雖孟子亦名之冝史記弟子傳不傳其字也有子此章分為二節前節以質言後節以學言中二句泛言承上生下以凡人資質言則孝弟者無犯上作亂之事以學者務本言則孝弟者為行仁之本親親仁民愛物皆從此出而仁不可勝用何止不犯上作亂而已哉為仁為字重讀朱子恐人不曉為仁是行仁之義而倒看性情體用故圜外收程子辨論之説過詳仁者愛之理心之德何文定曰愛之理是偏言之仁心之德是專言之仁孟子首章是専言之仁故曰心之德愛之理此章孝弟是偏言之仁故曰愛之理心之德其先後各有當也王文憲曰有子言仁之事集注言仁之性仁字訓詁發例於此詳見第五篇第十二篇程子二條叔子性中至孝弟來此洛中方言來字猶許蔡間裏字謂性中只有仁義禮智何嘗有孝弟事行在裏猶言倉中只有穀粟何嘗有秧禾在裏仁發出方為孝弟穀粟發出方為秧禾一時記録者欠修似覺語險須通上下文看則反覆開闔方見意暢鮮矣仁本文言鮮程子言非集注因之言絶無謂其心皆務在外則內亡矣此仁字言心之德王文憲曰此言仁之德程子叔子曾子名參所金反字子輿本史記弟子傳然孟子又字子輿蓋軻車軻也若曾子而字子輿則參乃服參之參七南反矣家語作子輿蜀本坊本並同博物志字敬伯三省集注不訓詁語録謂即宫省之省按字從少從目蓋宫庭之門視察出入不令泛入故謂之省所耿反借作省察之省悉井反盡己之謂忠以實之謂信忠信字義發例於此程伯子曰發己自盡為忠循物無違謂信表裏之謂也程叔子曰盡己之謂忠以實之謂信忠信內外也朱子謂明道之語周於事物之理如此圓轉伊川之語嚴故截然方正傳謂受之於師程伯子作傳之於人按傳字是前傳後上傳下之辭若是師傳當云受業不當云傳也兼曾子於師傳之事冝無不習不待每日與為人交友同省矣以上二事例之為人交友俱為及人之事則此傳當從程子之説乃傳業與人者傳業與人而不習於己正鄭氏所謂講時為學者誦之師不心解者不習而傳寧不誤人故必省而習之然則曾子篤學其所自省冝無一不至何獨此三事蓋此三事乃及人之事常情所易忽故曾子於此三事日省吾身恐以為不切己而有所不盡也其事雖屬及人而不忠不信不習則其失實為切己故日省吾身而尹氏亦謂動必求諸身謝氏謂專用心於內蓋事雖及人而在我之心則必忠必信必習也此三言日用交際所必有故忠信習隨事而必省所以曰日省集注倒訓傳字而語録謂亦尋常學業不為要緊者不要緊者如曾子問篇諸變禮曲折亦細細叩問而習知之然朱子此語似已疑傳之於師若太重矣兼又謂此曾子晚年之説昔者孔子殁曾子年最少若晚年則每日非有師傳常業矣但學者欠於問辨故集注欠於修改今存程子之説以待學者諸子之學皆出於聖人按韓文子夏之後有田子方子方之後流而為莊周又商瞿及馯臂子弓其後為荀卿敬者主一無適之謂何文定曰主一者指示所以持敬之要若止曰整齊嚴肅則難捉模惟曰主一則用力之方昭然易見然所謂主一者靜固要一動亦要一朱子所謂身在是則心在是而無一息之離此靜中之主一也所謂事在是則心在是而無一念之離此動中之主一也若無適二字則又是為主一兩字再下注腳謂如心在東而復移之西又移之南之北則是靜不主一他有所適而非敬矣又如本是一事而復二以二又參以三則是動不主一他有所適而非敬矣主一自然無適無適方為主一此兩語只是展轉相解只觀程子主一之謂敬無適之謂一二語敬之為敬可得而持矣朱子曰敬者主一無適之謂其言尤約而明若此章所謂敬事者凡施之政事之間皆以是心應之如為一事則専一此事謹之重之察其表裏慮其終始審而後發發而必行堅執如金石不移如四時不朝令而暮改不輕動而易搖此皆敬事之謂而信在其中矣履祥按敬其事便足信於民而分為二事者蓋敬主行信主言事屬政信屬令也程子未詳楊氏曰名時字中立諡文靖朱子謂楊氏説此處極好看此特論其所存未及為政意本程張程子曰敬事而信以下論其所存未及治具故不及禮樂刑政張子曰道千乘之國不及禮樂刑政而云是者言能如是則法行不能如是則法不能行禮樂刑政亦制數而已履祥按敬信節愛是其所存至於政則必有法制禁令紀網文章夫子答問政者亦多從身心説蓋其時先王之制數尚多無恙但治國者無是心故其政不行爾至孟子時先王制數廢改殆盡故孟子之論治國往往兼制數言之五者反復相因此補胡氏之意胡氏以敬為主固是本原然又須節節加意論有本則一節自生一節是下因乎上論全備則一步須進一步是上因乎下通釋詳之餘力猶言暇日或問作餘暇之力為是程子叔子也行重尹氏次第洪氏雙重朱子學重尹氏名焞字彥明號和靖處士洪氏名興祖丹陽人何文定曰文滅其質者虛文勝而實德亡也質勝而野者有實行而無節文也聖賢有見成之條法不考之則無以為入道之方事物有當然之至理不窮之則無以為明善之要故雖盡力於孝弟謹信待人接物之間而不知毫釐之差千里之謬或以善為之而未必合天理之正而不出乎人欲之私甚則陷父為孝誤兄為悌無禮之謹復言之信泛愛而失於無擇親仁而未必識仁其弊有不可勝言者是則無餘力而急於學文者其害固大矣有餘力而不肯學文者其病亦豈小哉竭其力王文憲曰蜀士趙子寅曰有問於㬊亞夫曰事父母能竭其力是心力是事力亞夫曰也要心力也要事力曰心力可竭也事力不到則何如亞夫曰有心力必有事力人只是辦不得此一片心爾此心果到雖園中之冬筍可生冰下之寒魚可出也况可得之物乎言而有信舊説易色是變易顔色朱子謂竭力致身太重若變易顔色則太輕故從易其好色之心方見是誠然言而有信似亦稍輕劉器之問於司馬公道自何入曰自誠入誠自何先曰自不妄語始劉公初甚易之及退而櫽括其日之所行與凡所言自相矛盾者多矣力行七年而後言行一致以此觀之只此一句不可謂不重况朋友之交其常有平生久要之義其變有相許以死之節則言而有信與竭力致身其重一爾四者人倫賢賢與朋友交若共是一倫然不以事父母為首而以賢賢為首蓋下三言所以能致其極者專在此一言爾賢賢易色好善之誠也大學誠意章所謂如好好色是也人惟有誠切好善之心故於孝悌忠信之事無所不用其極所以賢賢易色居首君子不重則不威重直用反語録此君子是大概説君子之道或問此章先威重而後忠信何也朱子曰聖賢言學之序例如此須先是外面分明有形象處抱捉豎起來然後漸及其內主忠信何文定曰主者謂凡事必靠這忠信為本而不容他有所之之謂也夫忠者發於心之實也信者見於事之實也專以為主則其一言一動一謀一為其始終表裏無一不出於實而虛偽之妄念出而無所施於外入而無所藏於中自將消磨泯滅而無妄之真體由是可以漸復是乃思誠之機要而作聖之階梯也程子曰不誠則無物伯子也何文定曰物事物也惟誠則以實心見之實事方可謂之有這物若無這誠則其所為皆不出於中心之實然謾試為之恰與不曽做一般故曰不誠則無物也且出入無時云云豈復有物乎者此申解上文不誠則無物之語也蓋人心不測乘乎氣而出入其或存或亡又無形影可以捉摸惟主乎忠信則此心便存而事皆自此實心中發出便是有物若不主乎忠信則方應此事而心已他之不主乎此事而無復有其事矣故曰豈復有物乎然則主忠信者非特為善之本實亦存心之要程子二條叔子慎終追逺程叔子謂不止為喪祭推而至天下事皆能謹其終不忘於逺朱子語録然之而集注止以喪祭為言通釋加詳今又因通釋之言而文之曰親之終也悲痛之情固厚而倉卒之際必誠必信之事薄親之逺也恭敬之意固厚而嵗月之久思慕如存之念薄於常情所易薄者不薄馬則已德可謂厚矣民德安得不趨於厚哉子貢禮記史記作贛過化存神之妙詳見孟子注及此章通釋何文定於通釋之上記録勉齋答問之語問曰朱先生解經只就句裏轉今過化存神何故突入外來一句於此章是説那裏或曰若論聖人過化存神之妙能使人樂告以政者固不待見其容貌而自如此矣先生久之曰看來也是不足於子貢之所云故如此説亦引而不發之意且如溫良恭儉讓若無聖人之德而見者每每如此便是個世間大不好人子貢只説得禮恭處不説得德盛處是他只見得到此若聖人之在當時能使所至之邦莫不樂告以政者其過化存神之妙恐非子貢所知也又問如此則潛心勉學之語如何曰必竟五者是個好德履祥按第十九篇子貢所言夫子綏來動和之化則過化存神之妙非其知不能知此但此章緣子禽求之之問甚低故且就其接人處言之以反其求字之意而其言遂欠內一層爾故集注曰盛德曰過化存神曰德盛皆補其內而本注亦字及謝氏三亦字蓋但指其外也私欲害之是以終不能用委國而授聖人以政則已不得以行其欲故終不能也然私欲各不同如季桓子則始欲振其弱終又恐失其柄如楚子西又疑夫子之得國以正其僭齊景公衛靈公則苟且自適其欲而已爾三年無改此章為觀人而發三年無改又為觀行而發聖人之言一條自是一條事理凡例如此章者亦必有為而言之也其意主於觀人其事蓋主於改而觀三年無改可以謂孝亦如觀過可以知仁可亦僅辭事亦常事耳非謂善惡之相懸者若夫不善不可以不改則夫子於仲弓嘗言其騂且角矣善不可不繼則夫子於孟莊子嘗稱其難能矣此又各一凡例也此義不明於天下而元祐紹聖遂成天下之大禍道學可不明哉道謂其行事也以父言故曰道天理節文人事儀則何文定曰勉齋語録謂一句作體看一句作用看然又須參錯看蓋天理節文是體中之用在體中固有自然之節然不因發見於外之文則何以見其有節故言節而併及於文故曰體中之用人事儀則是用中之體就用上看固有燦然之儀然所以有是條理者皆原於自然之品節故舉儀而必本乎則故曰用中之體蓋節與則俱體上字文與儀皆用上字此所謂參錯看程子曰禮勝則離叔子也程子禮樂之説所該甚大樂記天高地下萬物散殊而禮制行矣流而不息合同而化而樂興焉此章所謂禮蓋高下散殊之分也其所謂和則合同交通之意也先王制禮其尊卑貴賤上下之體截然甚嚴然其用則常有交通和同之意行其間如宗廟之禮至嚴也而旅酬逮下獻享之禮多儀也而燕示慈惠尊卑上下至辨也而燦然有文之中每有歡然相愛之意此皆禮之用有和而小大事皆由之又如飲食合歡也而籩豆有數延祭有儀臣侍君燕不過三爵夫婦和好也而內外有辨衣服異藏湢浴異處此類非一或但知和洽之意而略上下名分尊卑降殺男女內外之節此所以流而生禍而亦不可行也集注但見行禮不拘迫之意似不見交際和洽之意但説君子行禮之意不推先王制禮之意然於其首取程子之説末有嚴泰和節之説則該之矣嚴而泰和而節有子指事而言禮與和相對則禮是嚴敬之禮朱子本理而言和在禮之中則禮是全體之禮嚴而泰説上截和而節説下截該盡章指信近信約信也如左傳所謂五會之信近朱子曰近只是合古人下字寬按近字去聲乃比近之近猶云義之與比故朱子經以合中二字補之復左氏欲復言好復言謂既言而再行其言也亦上二節各只一事因與宗則又有近久淺深輕重故以亦字遞過君子食無求飽不求安飽與吾嘗終日不食終夜不寢以思同意謂心在勤學不暇求安飽又能敏於事謹於言非不好學也然惟就有道之人而取正乃可謂之好學苟自是而不取正於有道之人則所好何學所學何道乎學而非道之正雖勤安得謂之好學凡言道者道字訓詁發例於此然既在此章發例則當繼之曰有道者知此理而能由之者也子貢曰貧而無諂有無諂無驕之節而後可語樂而好禮之意凡學皆然觀書者見夫子之言而遂輕子貢之説此非善學者也正如玉未脫璞而遽求光瑩之器木未嘗斫而遽求繩墨之中可乎所以朱子章末之言切實周備學者不可不審所已言樂與好禮所未言義禮無窮未可遽足學而一篇記夫子之言為書之首而弟子之言凡四人惟曾子之言直而簡有子之言曲而中子夏言激而易廢學子貢言外而不由內此曾子所以傳道而有子之言所以似夫子也末章子貢之言其進宜未易量為政為政首章不曰以德為政而曰為政以德此為為政者言之也居為政之地者固不無法制禁令凡百施為而夫子則言為政若能以德則心得躬行無非道理以是率先之人心自感動興起而向慕之不待他有作為故曰無為而天下歸之德本譬以下效德之為言得也得於心而不失也德字訓詁發例於此集注初本因第七篇志道章解德字曰行道而有得於心其後改從此蓋道固人心所同有而人鮮可謂之有德者或暫悟而不能存之於心或徒知而不能體之於身是又皆失之矣所以不足謂之德也北極天之樞樞如樞軸謂天體斜倚而左旋北極乃其樞軸衆星皆隨天體旋轉惟北極不動也北極無星故謂之北辰辰者北極之舍也其旁四輔星環之其前直四星後宫庶子帝星太子也程子曰叔子也為政以德然後無為若以才智苛察術數勇功則不能無為矣范氏曰王文憲曰不動而化不言而信無為而成此言感通之妙也不動不言無為也化而信者成也簡以理言靜以心言寡以身言也煩以事言動以物言衆以民言也此言統理之要也合二説盡無為之義履祥按至簡者惟循一理自可以御事物之繁至靜者惟正一心自足以制天下之動至寡者惟修一身自可以服人心之衆思無邪程子曰誠也朱子謂世人固有修飾於外而其中未必純正者故言無邪行無邪亦未見得誠惟是思無邪則合內外之道表裏如一方可謂之誠程子之言不可不深思惡者可以懲創人之逸志王文憲有詩辨今不泛入因嘗考之秦火之後書失幾半禮失幾亡而詩三百篇何以皆無恙雖云詩託於聲音之流傳然今之三百篇豈盡夫子之三百篇乎禮記左氏荀子所引之詩多有善者而今詩多無之此猶可也如素絢唐棣孔門嘗舉之而今不見於詩鄭聲之淫夫子嘗欲放之而今鄭詩具在雖序者巧以為他事及刺人然其淫醜之態不可掩也漢劉歆謂詩出非一人諸儒各以所能記或風或雅或頌會合而足三百篇之數則其所記聞或有出於夫子所刪去者矣蓋漢興鄭衛之樂尚在而管絃之聲未衰也以此觀之其間淫詩固夫子之所去而世俗之所傳者諸儒得之例以為古詩而不察也不然則若溱洧桑中諸詩幾於勸矣而何懲創之有哉程子未詳德禮上章為政以德至此章意方備緇衣篇曰夫民教之以德齊之以禮則民有格心教之以政齊之以刑則民有遁心一説朱子集注凡例二説皆通故併存之必有一説得聖人之意大率二説前一説勝志學章矩法度之器王文憲曰矩雖器心之天則也程子二條皆聖人為學者設胡氏一條發明從心不踰矩朱子極以為好二條即程子勉進及成章二意張思誠以為意周履祥按朱子於本文之下但隨文解義而其終總説處最盡蓋聖人固自有聖人之資然聖人又自有聖人之學又自有聖人之進但非常情所可窺測爾蓋天下之理無窮而聖人之心純亦不已已則非聖人矣其實三十而立聖人之為聖人者已成此後但愈妙愈熟所謂借其近似以自名猶夫子一貫而曾子借忠恕以名之也學是聖人之學立則聖人之成不惑可以想見聖人之貫知天命可以想見聖人之一知字如知天地之化育不惑者小德之川流是於萬殊處看一本知天命者大德之敦化是於一本處觀萬殊耳順可以想聖人之化從心不踰矩可以想聖人之神此亦因聖人借近似以自名者而倣佛之在於心體難以言語形容王文憲曰自聖人生知之稟而言固未必冇等級自聖人體道之心而言初不妨冇等級二説非不同也程子二條叔子孟懿子章魯大夫仲孫氏魯三家本出桓公慶父之後為仲孫氏叔牙之後為叔孫氏季友之後為季孫氏仲孫而謂之孟者禮疏古者適長謂之伯庶長謂之孟仲孫於莊公為大夫不敢宗諸侯而於三家為庶長三家所宗故謂之孟三家僣禮檀弓曰三家視桓楹三臣猶設撥是葬之僭禮也三家以雍徹是祭之僭禮也僭禮以處其親將以尊親而不知陷親於不義得為而不為分所得為者多有當為之事特恐不能盡爾不必求越於分之外也孟武伯章集注前説發父母之至愛警人子之守身懇切深長所該甚大舊説亦在其中然普為衆人言之誠善矣若為武伯言則恐舊説為切故程子止依舊説而集注兩存之也朱子始疑舊説不正言而為是迂昧不了之語爾然須究武伯之為人與當時之辭氣左氏云哀公與三家始有惡遇武伯於塗問之曰吾得死乎而曰豫不知其傲暴之氣如此於君猶然况他事乎觀其諡為武則為人可知矣程子嘗言人有四百四病皆不由自家只是身與心不可不由自家疾病聖賢所不免但為人子者父母唯憂其病而他無憂焉則其為人可謂能守身而不遺親憂矣今有人焉非子弟求益之素而其傲暴可憂不可縷數卒然有問何以為孝夫子答之曰使父母但以其疾為憂焉斯亦孝矣其辭氣之間自有餘味所謂舉一隅之教初非不了之語使其惕然收斂不為不義為父母者唯憂其疾病之不由己者而不必憂其事為之由己者則其為人豈非天下之孝子哉集注於舊説始去而終存之殆有意矣能養去聲有養上聲至於犬馬皆能有養作一句讀至於二字其上所該亦多謂自骨肉子弟奴僕以下至犬馬也子思曰今而後知君之犬馬畜伋孟子曰食而弗愛豕交之也愛而弗敬獸畜之也大抵辭氣不以貴賤尊卑懸絶者為言則無以見其不敬之罪重以不敬為無别蓋充類至義之盡也有一老人見籠養者朝夕飼直心力備至因嘆曰若養父母如此豈非至孝一學者聞之遂悟此章之旨蓋彼嘆小人不能養而養鳥此責學者但能養而不能敬也色難何文定曰服勞饌食養口體者也柔順顔色養志者也不曰養志而曰色難者蓋愈色婉容皆誠實之發見於外者決非聲音笑貌之所能為必其愛之積於中者深然後見於容色者始無一毫之不順苟所以愛其親者有纎悉之未至則形於外者決無愈婉之色則事親者其色豈非難乎能盡此者其於養志固有餘裕矣聖人所謂色難者惟體之而後知為不易也服勞奉養固非愛親者不能然愈色婉容則尤其愛之深者服勞奉養或可以勉而為之愈色婉容則無所不順而心與父母為一矣豈得不謂之難哉曾朱子曰論語除曽姓外皆作在登反程子未詳告衆人以其所該者廣也然孟氏僣禮武伯多可憂之事故夫子所以告之者且正其大病遊夏孝養服勞己無不至但意色幾微之間有所不足蓋狎恩恃愛者漸流於不足而嚴威儼恪者非所以事親故夫子告之深戒子遊之漸流於不敬為大不孝不許子夏之疏節而以服勞奉養不足為孝皆所以責其盡善也王文憲曰告門人皆切直告餘人皆深婉各有當也吾與回言終日六字為句與言終日固無所不言矣惜不盡傳於世也私亦私是人所易忽之地而亦足以發其餘可知顔子是從謹獨下工夫聖人是於此處見顔子聞之師曰朱子師延平李先生名侗字願中諡文靖此段延平全語具在師友問答顔子深潛淳粹顔氏本出邾登孔子門者八人回為最賢回字象水之洄故字子淵何文定曰深潛淳粹此四字只是形容顔子資稟氣象如此蓋雖一般聖賢各自有資稟氣象如湯武自有湯武氣象文王又自有文王氣象且以此深潛淳粹四字著在孟子身上固不得便著在曾子身上亦不得惟顔子便有此資稟氣象也程子亦曰顔孟於孔子其知之淺深同只是顔子尤溫淳淵懿近聖人氣象延平之語與此大概相類今且以顔子平日觀之如不違如愚於吾言無所不説冇若無實若虛此亦可以見他深潛處如三月不違仁不遷怒不二過又如程子言其如和風慶雲此亦可見他淳粹處下面體段字粗説如骨骼字相似猶兩人相比甲人骨骼比乙人差小些子此即孟子具體而微之語體段已具猶曰骨骼四肢已圓全但未與那人一般爾又曰深潛淳粹四字若分開看深潛兩字便帶了知見意淳粹兩字便帶了踐行意劉頡曰深潛淳粹文公師友模寫顔子資稟氣象可謂體貼然集注語意多在經文之內非自外來如此四字亦在此章之內深潛是於不違如愚見之淳粹是於私亦足發見之深潛知上氣象後篇所謂於吾言無所不説者也淳粹行上氣象後篇所謂三月不違仁者也視所以章王文憲曰既分君子小人此下只觀君子程子伯子也何文定曰語録謂既以此觀人亦當以此自考此意亦緊切溫故章可者僅可之辭此師講授之師時每二字所進尤活記問之學鄭氏注云豫誦雜難雜説至講時為學者誦之師不心解詳見或問王文憲曰溫故所學在我記問無得於心知新其應不窮記問所知有限只死活二字先行章程子以先行為句朱子以先行其言為句語意宜從朱子緇衣篇曰言從而行之則言不可飾也行從而言之則行不可飾也王文憲曰君子所言皆平日所行之事周比章王文憲曰周比從接物上見和同從共事上見驕泰從處己上見語録學者於幾微之際不可不辨學思章王文憲曰論語舉其略中庸舉其詳劉頡曰博學篤行皆學上字審問謹思明辨皆思上事語録學與行是學之始終問思辨是思之始終又一云學不専指行程子叔子異端章何文定曰異端之害云云人之攻治其説者其蔽固之深者固無足論其間有高明賢智之過而亦學之者不過謂彼冇所短亦有所長吾但取其所長而去其所短而不知本領既非所謂善者非真善攻而治之陷溺益深為害滋甚故夫子斷以一言曰斯害也已而程子又謂其近理者為害益甚尤當逺之是皆聖賢推救焚拯溺之心援學者於顛冥之地其為人切矣程子伯子也王文憲曰范氏條指害道而言程子條指害心術而言駸音侵詩載驟駸駸干祿章程子曰前條叔子後條兼取伯子章內兩梬三截程子喫緊為人故又添一問答蓋唯聖門弟子則能言下領會世人之心汲汲利祿無所不至必又謂雖能多聞見闕疑殆謹言行亦有不得祿者則又如之何程子引耕餒之説以曉之謂縱外是而他求所以干祿亦未必能得也亦唯道理所當為者自為之而已外此不惟非所當為為之亦非可以必得也哀公問章程子叔子大居敬用春秋傳大居正句法謝氏此章親切明備聖賢為學之要法不但施之此章也王文憲於上蔡書堂開講舉此為上蔡第一義何文定曰居敬則無私心而枉直無所蔽窮理則有真見而枉直不難知此合內外之道又辨枉直之要法也敬忠朱子曰孝是以身率之慈是以恩結之兼此二者能使民忠張敬夫集注於周程張稱子諸儒稱氏不名字者稱官時人稱字何文定曰夫子本言教化必自己出語勢不得不然張子恐觀者失聖人之旨故發明無所為之説以曉之王文憲曰季氏意在使字上聖人意在則字上康子之問為欲使民如此而夫子之答皆欲其於己求之盡其在己則民自化若為欲使民如此而為之則為之必不實亦不足以有感矣故集注取張敬夫之説以明之然無所為而為有所為而為善利之分此自張宣公法門要語或謂為政須上之人用之非所可必為也而或人之問如此蓋定公初年陽虎執國每有用孔子之意而孔子不仕也信輗軏是車與馬牛交接處信是己與人交接處交接處無輗軏則車不能行交際處無信則事不能行十世集注取馬氏之説而詳之本欲分明而觀者易離為二故通釋辨之然集注取胡氏之説己自明備三綱出白虎通又有六紀三統本漢志詳見問為邦章王文憲曰所因者亘古及今之常然損益者隨時處事之當然繼周損益其答顔子為邦之問乎論語集注考證卷一
