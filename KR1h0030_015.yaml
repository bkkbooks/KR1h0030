body:
  text: 欽定四庫全書孟子集註攷證卷三元金履祥撰滕文公上滕姬姓之國今徐州北一百九十里滕縣有古滕城過宋吕成公大事記周赧王元年孟軻致為臣於齊而歸二年孟軻自齊之宋自宋適滕按孟子致為臣於齊歸鄒而即如宋與宋勾踐戴不勝等答問則滕世子過宋而見孟子當在此時自滕而西南過宋三百五十餘里道性善王文憲曰此孟子大㫖稱堯舜以實之性善無形影然凡聖人之所為皆自性分中出則堯舜即性善之形象也性既人所同有則堯舜人皆可為程子曰叔子王文憲曰孟子之後無人敢如此說公明儀曰初註二句皆公明儀之言李閑祖問以為上句周公之言公明儀舉之而曰周公豈欺我哉朱子因之遂改集註周公於文王為親父子親承文王而學之文王雖大聖而事事皆可學而為之不必別師古聖則此言容或有之若如初說則文王聖人事事我皆可學周公聖人言之我皆可信信受奉行非欺我也亦通魯賢人自公明宣學於曾子而公明高公明儀皆見稱於孟子高曾子門人儀與孟子年輩相及可以為善國天下無性外之物古人為學即見之行事滕文公是有國之人故孟子即令其就為國上致力書曰引書意尤𦂳切人性固皆可為聖賢學者固當以聖賢自勉然非可以安坐而進也亦湏有刻苦之實功去切身之實病方可與造聖賢之道爾不能自充四字切中常人之病人性本皆可以為聖賢其不能為者葢茍且以卑近為安不能自充至若為不善之人亦豈能昧其本心之善亦以一向放縱不能自充以至此爾首章入要畧一巻之一以世子之天性非不能為善以滕國之地位亦自可以為善但人之患在於不立志故舉三子之言於前人之患在於不去病故又舉商書之說於後人能立廣大之志以充吾本善之量又必能致刻苦之工以去吾本身之病則所謂堯舜人皆可為者真可為矣齊䟽之服按禮為父斬衰為母齊衰至若䟽衰則又次於此如雜記云三年之喪廬堊室之中下文曰䟽衰皆居堊室不廬又曰䟽衰之喪人請見之則見唯父母之喪不辟涕泣而見人則䟽衰又斬齊之次也今滕定公薨文公當為斬衰之服而云齊䟽似亦可疑豈古者天下諸侯斬衰之布升數多於常人止用䟽布為之歟又按上文曰吾嘗聞之矣則此三句亦古語昔魯繆公之卒使人問於曾子對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子達此數句與此正同葢古語傳誦之訛孟子引之爾當作齊斬之服宗國魯宗法諸侯之公子葢先君之子今君之昆弟不敢以君為宗而君為公子之庻者使宗其公子之適者葢使諸庻弟以一適弟為宗天子亦然武王為天子則諸弟不敢以武王為宗而以周公為宗故凡文王之子有國者管蔡郕霍邢衞毛聃郜雍曹滕畢原酆邭皆謂魯為宗國也深墨甚黒色也禮居喪垢面傳曰肉食者無墨今呉王墨國勝乎太子死乎葢憂慼則色墨而居喪不肉食是以深墨也倚廬以本倚堂側而苫葢以為廬也天子則加梁楣謂之梁閽孟子至滕大事記在周赧王之二年恭儉恭禮下世禄也儉取民有制助法也夏后氏五十而貢殷人七十而助集註之説雖明而語録亦自疑之古者田制遂徑溝畛洫塗澮道凡水陸封樹自禹濬畎澮距川以來積世累代而後成若商又變為六百三十畞之區周又變為九百畞之井則一時徑遂改易固不甚難而溝畛洫塗例須改作大費民力久而不定何異王莾之改制聖人作事因民之利必不如此按古者以平地為田其同溝共井者無甚疆界但各以畞數為計而古所謂畞者又與今尖斜折方不同古者六尺為步步百為畞所謂畞者闊一步長百步古人重黍稷粱菽其所謂畞即若今種豆麥者作田疄也詩所謂南東其畞謂田間作疄向南向東視水土之利也古者中土既是平田但止以田疄為計夏后氏之時田未盡關又去古未逺雖士大夫無不躬稼穯受田者多故每夫受田五十疄比周一井則十八家受之而自貢其什一至殷人則田巳開闢一夫受田七十疄比周一井則十二家受之而助耕公田六十疄至周則土田盡闢而君子小人又分在官者食公田之禄工商不盡受田惟農受田故得以百畞為限鄉遂用貢法十夫有溝都鄙用助法八家同井而一夫各受田百疄其廬舍則撥田之外又共撥若干疄三代可以例推也徹者徹也下徹字讀作澈經書凡以本字解本字者上字是古書下字是當時俗語然又有一例如親之也者親之也上字平聲活字也下字去聲定字也以此例推之助者藉也子夜反當讀為借去聲北音皆然但二字各有二音如天子諸侯藉田雖音集而解謂借民力以終畝則借字又本音子亦反入聲以從人從昔諧聲也今俗讀作去聲誤爾龍子古賢人不知其世故但曰古賢人孟子書兩舉其辭惜其言論風㫖不盡傳於世也莫不善於貢貢法之弊亦夏之末造聖人視時上下而取諸民必不至此盻從日從兮者氣出貌葢日有恨氣也五禮反說文作胡計反玉篇吾計反則讀如睨矣俗誤作普莧反者非葢盼字不從兮而從分謂日黑白分明也說文亦怍雨我公田周制鄉逐用貢法都鄙用助法孟子不見典藉但以詩推之序以習射為義鄉射禮行於鄉序葢以射名其學為序射者升序之堂立於堂之序謂當棟處也向外而射序射諧聲故曰序者射也古者射以習容正志直體觀德故教法以射為先於旅也語就敎以人倫之道為王者師孟子嘗以王道告齊粱之君如滕文公為井地可謂能行王政矣孟子不許之以王而以王者師許之葢齊梁之君皆萬乘之國行王道而王也易滕文公五十里之國則雖行王道而其王也難但示王道之兆為王者之法可耳此聖賢至公之心亦審時勢之論也自此後又二十六年周赧王之二十八年而桀宋滅滕齊魏楚又㓕宋矣文公之賢可以為王者師頼孟子書而傳爾又滕文公之時所憂者在齊楚則桀宋來㓕非文公之世也周雖后稷以來舊為諸侯周自后稷始封於邰字亦作斄傳其子斄蠒至不窋遷於戎至公劉避桀遷邠至古公又遷岐至文王而三分天下有其二故曰其命維新孟子雖引文王之詩而止曰亦以新子之國以滕之褊小僅可自新其國而已又井田乃周室舊制而此方新子之國葢井法積壊已非一日至此始復其舊乃所以新之也壤地褊小上文令滕絶長補短將五十里則是除山川林麓城郭而以田計也以五十里之田而分君子公田小人私田君子又有圭田小人又有餘夫似為難給然以方田法計之方十里者為方一里者百則是百井九百夫矣方五十里者為方十里者二十五則是二千五百井二萬二千五百夫矣亦自不患於不給也以此知戰國之時諸大國若能修復井田不為園囿宫室汚池以廢地能行仁政以聚民則田野不至於不給人衆地大不患於不可以行王政也野九一而助國中什一使自賦孟子雖不見載籍之詳而此二句與周制鄉遂用貢都鄙用助之法合國中自賦則民無逺輸之勞野九一而助則卿大夫食邑無過取之失程子未詳公事畢然後敢治私事先公後私即詩之雨公及私之意春秋傳曰公田不善則非民私田不善則非吏葢民惟當先公而吏則當恤民之私也反是則公議非之潤澤就中活法制宜使行之優游甚便不使有蹇澀難行之患也史遷所謂農家者流大史公六家指要無農家至班固藝文志分九流始有農家者流此集註未及改程子曰許行所謂神農之言乃後世稱述上古之事失其義理者叔子也按漢書藝文志神農二十篇六國時諸子託之神農劉向云疑李悝商君所説班固曰農家者流葢出於農稷之官播百穀勤耕桑以足衣食及鄙者為之以為無所事聖王欲使君臣並耕誖上下之序陰陽醫方稱黃帝之說黃帝使大撓作甲子始迎日推筴故陰陽家者説時日吉凶多推言黄帝醫家亦推本黄帝岐伯設為問答之辭傳述古語雜以附㑹然比之諸家號為精深賢者與民並耕而食儀禮經傳通解載神農之法曰丈夫丁壮而不耕天下有受其飢者婦人當年而不織天下有受其寒者故身自耕妻親識以為天下先履祥按神農之説不過躬耕以先天下耳而為其言者遂有與民並耕饔飱而治之説此集註所謂傳述而失其義理者又按路史亦戴神農之言曰士丁壮而不耕則受其飢女當年而不織則當其寒有餘不足各歸其身士力耕而女力織力歸於上而功被於下嵗餘十三三年而成嵗三十年而國有十嵗之儲有以利下而不足以傷民故天毁地凶旱泆並作而無入於溝壑乞丐者時其時以待天權也是以年穀順成衣食足而禮義興姦邪不作無制令而人從大畧如此路史又曰唐堯冇言朕之比神農猶昬之比朝旦也而説者猶以為夫負妻戴以有天下是相率而為偽者惡足以言人道耶五榖稻黍稷麥菽此用周禮九榖之數而五之也舊說黍稷稻粱秫夫四榖皆有秫安得獨出一榖然古人重黍次亦重粱粱今粟也其種亦多當曰黍稷稻粱麥爾益即伯翳也青冀間以入為去則曰翳秦隴間以去為入則曰益史記引書孟子作益而秦紀又出伯翳者誤也九河名見爾雅今滄州畧有一二遺迹然皆淪為小海不可一二復攷矣詳見禹貢地理古今註濟字當作泲出王屋山崖下伏流地中至孟州温縣湧出二源是謂泲源入河復南出為滎澤自為一瀆以東北入海至王莾末不復南出而諸儒考之謂伏流地中隠見不常今清河行其故道漯史記禹釃二渠以殺河流一謂泲一謂漯也古河北行至今開徳府漯受河流入海西漢河徙併行漯川其後又徙而漯亦涸矣汝出今河南梁縣天息山至蔡州下入淮漢出今漢中利路之間西縣嶓冡山東南流二千四百二十里至漢陽軍大别山入江淮出唐州桐柏山千七百里至海州入海泗出襲慶府泰山陪尾有泗源南至下邳入淮記者之誤當是䟽九河瀹濟漯排淮江而注之海決汝泗而注之淮決漢而注之江放上聲則作倣謂倣是道而為功非有所作為也亦有作去聲者則訓至訓大則法也論語集註曰則猶準也惟天為大而堯之功徳與之相準據此註則堯法天之大當以註為是而此未及改有若似聖人史記孔子既沒弟子思慕有若状似孔子弟子相與共立為師師之如夫子時也事亦見家語但二書所載下文猥瑣類小數末術前儒常非之當以孟子所引曽子之言為正暴說文從日從出從大從米晞也然說文作蒲報反葢古字四聲隨方言而讀或去或入今以去聲者為暴烈以入聲者為暴晞義亦相通鴂博勞食母之惡鳥此詩為僖公之頌孟子以周公言王文憲常言閟宫之詩葢有錯簡當從孟子為正葢第一節説姜嫄后稷第二節說太王文武第三節當説周公之功而今詩但説成王封周公之子似逸一節下文公車千乘戎狄是膺荆舒是懲則莫我敢承當是第三節言周公四征弗庭伐淮踐奄之功周無徐州故淮夷為荆州之界而舒在今淮西也第四節始及王曰叔父至乃命魯公第五節方説周公之孫莊公之子方頌僖公第六節説饗祀降福而俾爾之祝以類相從已後皆祝頌之辭如此則孟子之時詩未錯簡而孟子所引正是周公也不論精粗使之同價周官肆長陳其貨賄名相近者相逺也實相近者相邇也正欲精粗異價不以大小同價滕文公下招虞人以旌周禮折羽曰旌古者無紙札文字之繁但以所持之物為信漢初尚然古禮招大夫以旌虞人以皮冠不至將殺之古者田獵所以講武以軍法治之不見皮冠則失符驗之實從大夫之旌則為犯分軍中有令而不至則不恭命犯律尤重此所以欲殺之也虞人豈不知拒命必死而非其招不往既自守法亦以正君故夫子以志士不忘在溝壑勇士不忘䘮其元二句取之此事孟子書凡兩出又見左氏傳及家語然二書記孔子取之之言則曰守道不如守官葢守官即所以守道今曰守道不如守官則是道外有官而官不必道也此豈夫子之言故此事只當以孟子之言為正大抵聖人之言非智足以知聖人鮮有傳之不差者不待其招而往語録曰答陳代曰不待招而往何哉此以在他國而言答景丑及答萬章曰天子不召師而况諸侯此以在其國而言如以利利之一事門不可啟漸不可長一以利而枉小其弊必至於以利而枉大孟子此語亦是拔本塞源王良善御馬者趙簡子之御也左傳作郵良一名無恤天駟星旁有王良星其占王良策馬車騎滿野世以郵良善御故自謂王良範我馳驅古之善御者御驅逆之車則挾轡使射者中禽之左脅以達右腢是為上殺以供祭祀所謂逐禽左也嬖奚小人但欲苟中不以禽左為上殺故用逐左之範而不中詭隨而遇禽則中此小人心術不正苟且求中者也比當作毗志反集註未及改枉己者未有能直人者也斷在此句上此章入要畧三之四公孫衍即犀首也魏之陰晉人與張儀不善離秦魏之交而相魏導義渠以伐秦佩五國相印為約長代張儀相魏儀死又入秦秦王愛衍且相之為甘茂所陷後誅死張儀魏人相秦伐魏降蒲陽而復予之因以説魏事秦又出相魏令魏先尊秦而諸侯效之魏不聴陰使秦伐魏魏乃倍從約而諸成於秦反復相秦秦欲伐齊又使儀説楚絶齊獻商於六百里楚絶齊而秦不與地楚怒以黔中易張儀欲殺之儀至楚又因靳尚以求解於楚姬鄭褏又説楚事秦去而遂之韓説之事秦歸報封武信君使東說齊又説魏北之燕使事秦所謂衡人也及秦武王立不説儀諸侯皆叛衡而儀又説武王東方有大變然後王可以多得割地聞齊甚憎儀儀之所在必興師伐之於是之梁而齊果伐梁使秦以其間伐魏後又陰使人觧齊之兵而卒相魏以死丈夫之冠冠恐當作娶字與下嫁字對按儀禮士昬禮父醮子而命之曰往迎爾相若冠則賓醮而命之字父不親命也往送之門往字作一讀送之門者按儀禮父送女命之曰戒之敬之夙夜無違命毋施衿結帨曰勉之敬之夙夜無違宫事庻毋及門内施鞶申之以父母之命曰敬恭聴宗爾父母之言夙夜無愆視諸衿鞶以順為正者妾婦之道也儀衍捭闔生事而孟子獨謂其阿順葢順其主之慾而導之争順其主之懼而導之從衡凡不能以道義正其君者皆妾婦之道也蘇氏古史曰戰國之為從衡者皆傾危之士也然而汚賤無耻莫如張儀而其成功亦莫如儀之多方儀之未信於楚也辭而之晉謂懷王曰王無求於晉國平王曰金珠犀象楚産也吾何求於晉儀曰王獨不好色乎周鄭之女立於衢閭不知而見者以為神也王説資之珠玉而遣之南后鄭褏聞而憂之奉以千金儀將行謂王曰賜臣中飲謂王召所便習王召鄭褏儀見之跪請罪曰臣行天下未嘗見人如此其美也而儀言得美人是欺王也王與褏大喜而儀言得行儀之所以求用者其術至此所以言信而功多也按此節即媒嫗之術所謂妾婦之道也歟廣居仁語録以心言正位禮以身言大道義以施為言惟是心無私邪無私則心體廣即仁也無邪則所立正即禮也故所行自無私邪偏曲所以謂大道即義也然亦惟集義養氣方到此地位此三句是大丈夫之本下三句乃其效語録威武不能屈以浩然之氣對着他便能如此此章入要畧三之五何叔京名鎬昭武人自其父兌受程氏學於東平馬公伸而叔京又從朱子學官至潭州善化令未上而卒朱子銘其墓周霄魏人戰國策作周宵禮曰註文出祭義又曰出王制大夫士有田則祭無田則薦祭則室中酌奠畢又迎尸於堂以獻薦則室中酌奠而已妁亦媒也孟子音義曰媒氏酌二姓之可否故曰妁梓匠木工梓人為器用者如攷工記為飲器為筍簴為侯之類今俗所謂小木匠人為宫室國邑攷工記建國營國為溝洫之類今俗所謂大木者輪輿車工周人尚輿一器而功聚馬者車為多察車自輪始輪人為輪専治圓曲輿人専治直方而總衆工食工也道之功大上之功小宋王偃周顯王之四十年宋公剔成為弟偃所攻出奔齊而偃自立至慎靚王三年宋東敗齊取五城南敗楚取地三百里西敗魏遂稱王赧王二十九年㓕滕則威滕伐薛在後亳葛並在南京有亳城有葛驛鎮此段言湯之王政匪諧聲從匸形從非聲今俗加竹𤣥黃古者上衣下裳衣𤣥而裳黃故幣帛皆以𤣥黃為色此段言武王之王政實不能行王政為齊所滅走死按宋有雀生史占之曰小而生巨必霸天下康王喜起兵滅滕敗齊楚魏取地數百里乃悆自信其霸欲霸之亟成射天笞地斬社稷而焚㓕之為長夜之飲於室中室中人呼萬嵗則堂上之人應之堂下之人應之門外之人又應之至於國中無敢不呼者天下謂之桀宋周赧王二十九年齊湣王與魏楚滅宋三分其地宋王偃奔魏死於温按大事記則敗齊楚魏之兵在㓕滕之前按通鑑則敗齊楚魏取地之事往滅滕之後葢事之前後已難詳攷大事記則皆附於稱王之年而通鑑則總附於齊滅宋之年又伐薛之事其時薛己為齊地當即是敗齊之時爾段干木路史曰段干李姓邑也初邑段後邑干因而氏風俗通註乃以為姓段名干木以李氏春秋干木光於德與魏都賦干木之德誤之幽通賦木偃息以蕃魏為得之又戰國䇿有段干綸段干越人則段干姓也吕氏春秋曰段干木者魏文侯敬之過其廬而軾之其僕曰段干木布衣耳而君軾其廬不亦過乎文侯曰干木不趣俗役懐君子之道隱居窮巷聲馳千里之外未肯以已易寡人也勢不如德尊財不如義高吾安敢不軾乎秦欲攻魏司馬康曰段干木賢者而魏禮之天下皆聞不可加兵奏君乃止戴不勝戴盈之宋臣疑皆戴公之後故以為氏二人問答計皆宋王偃欲霸天下之時然以孟子之言觀之則王偃實不能行王政而羣邪與處遷善不力可見之一治一亂氣化盛衰人事得失反覆相尋氣化有盛則必有衰人事有得則必冇失此一治所以一亂也氣衰則必復盛人事失則必復變此一亂所以一治也惟聖人在上則能以道御氣以治制亂此所以常盛常治而無衰亂也古今言堯舜者皆曰極治之時而不知帝堯乃善制亂之主葢帝堯治天下泰和六十餘年氣化可謂極盛天下可謂極治矣盛則必衰惟其人事無致亂之因故散而為洪水之橫流是亦一亂矣惟帝堯善於制亂故水之為災也舉舜而敷治舜舉禹益稷契而天下平所以處亂而不害其為治也洚水書作降水當從洚而音洪掘地去壅塞語録嘗疑掘地之説謂水高數尺已不可下手何况滔天之水亡父桐陽散翁解之云洪水滔天多是潦降水生之時而禹之疏鑿則在泉縮水落之候集註掘去壅塞此為得之然亦有掘平地處如兖州平土當河轉之衝故禹釃為漯水疏為九河亦為平土汎濫故掘地而使之歸港震澤三江亦然如後世開渠泄水則亦有之其餘亦多是開鑿崖岸壅塞爾夏太康孔甲履癸商武乙之類太康者禹之孫盤遊無度為羿所距保遷南夏孔甲桀七世祖國語帝甲亂之七世而殞履癸即桀也商武乙者武丁之孫遊獵射天震死周公相武王誅紂武王十三年伐紂伐奄三年討其君伐奄乃周公相成王之時奄君導武庚作亂周公相成王東征三年伐淮遂踐奄遷其君於蒲姑飛亷按史記秦之祖中潏在西戎生蜚亷字處父蜚亷生惡來惡來多力而飛亷善走父子俱以材力事殷紂武王伐紂并殺惡來是時蜚亷為紂造石槨於北方還無所報為壇霍太山而報得石棺死遂葬霍太山索隱曰事葢非實譙周深所不信按此當以孟子為正滅國者五十按周書戡黎在誅紂前逸周書誅紂之時太公望伐方來王遂禦循吕他伐越戲方侯來伐歴集於陳栢弇伐衛陳本伐磨百韋伐宣方禽之新荒伐蜀禽霍侯俘艾佚侯百韋伐厲皆告馘俘又周公相成王踐奄之時殺武庚伐淮夷徐戎餘三十餘國史傳不載大抵皆紂同惡之國也驅虎豹犀𧰼按史記紂益収狗馬竒物廣沙丘苑臺多取野獸蜚鳥置其中故武王周公驅而逺之又韓子曰昔先王列山澤綱繩擉刃以除蟲蛇惡物為民害者驅而出之四海之外則不獨是紂所蓄也有作之有讀為又按古文尚書有皆作又作春秋魯舊自有春秋東遷之後書法失周公制作典禮之意善惡是非不明雖弑逆之變亦多不書其實使為人臣者不知此義陷於弑逆之罪而不覺為人君者不知此義前有讒而不見後有賊而不知故孔子因魯史之舊而修之使是非褒貶昭然可見因此而鑒戒明亂臣賊子懼致治之法可垂萬世故謂之作胡氏曰安國字康侯諡文定因靳裁之聞程子之學友事游揚謝三君子以得程子之㫖後以春秋侍講奉勅作傳此段傳序也二百四十二年春秋起隱公元年己未之嵗止哀公十四年庚申凡二百四十二年處士橫議上失其道世敎不明故人人自為異説朱子亦謂異端之起本是隱君子自為一説而其流遂橫流於天下後世楊朱老子弟子字子居其書不傳而列子莊子多舉其語葢楊朱親傳老子之學至於列子又再傳莊子又三傳其時老子之言簡質戰國好文故其言未播列子之書未行莊子之書未著故當時惟楊朱之言盈天下孟子闢楊即闢老莊也墨翟史記曰宋之大夫或曰並孔子時或曰在其後索隠曰按别録亡墨子書有文子問於墨子文子子夏之弟子如此則墨子者在七十子之後者也漢書藝文志墨子七十一篇天下之言不歸楊則歸墨按莊子書亦盛言楊墨之辦如曰鉗楊墨之口攘棄仁義謂楊墨所言仁義也然莊子與楊朱同師同道故多偏言儒墨之是非又云儒墨之辨以墨對儒且云當時有鄭緩為儒而弟為墨十年而其父母右墨緩以死争今按孟子之時邪説詖行甚多大率不出楊墨二家之説如楊朱之説則莊列其尤著凡莊子所稱之人皆宗楊朱之説也太史公亦謂申韓之慘刻少恩皆原於道德之意葢其為我而無情不屑世故一切芻狗視之故殘忍而不恤也若陳仲子之孑介自取無親戚君臣上下許行不知上下相資養之道白圭之貊道皆是説也至於墨翟自為有弟子禽滑釐等三百人莊子亦云相里勤之弟子五侯之徒南方之墨者苦獲已齒鄧陵子之屬俱稱墨經相謂别墨又宋牼禁攻寢兵救世之戰周行天下上説下敎强聒不舍荀子舉宋牼與墨翟並言若公孫龍堅白異同之辯莊子亦舉而歸之墨翟禽滑釐之流淳于髠雖學無所主而慕晏嬰是亦墨也又荀子亦言慎墨季惠四家而季乃楊朱之友儀奉之棄親戚而遊諸侯亦云救世之戰葢宋牼之類但其設心反覆以取世資此又其最下者以此知孟子謂天下之言不歸楊則歸墨是當時異端邪説不出此二家之流也楊氏為我楊子取為我葢其初聞老子睢睢盱盱之戒而一切収歛又慕伯成子高之為人不以一毫利物必其愛身獨善而不肯役於世若人人如此則人君將誰與治天下乎是無君也墨氏兼愛其書曰若皆法其父母奚若天下之為父母者衆而仁者寡若皆法其父母此法不仁也皆法其學法其君亦然莫若法天天之行廣而無私其施厚而不徳其明久而不衷故聖人法之既以天為法天何欲何惡者天必欲人之相愛相利而不欲人之相惡相賊也奚以知之以其兼而愛之兼而利之也奚以知之以其兼而有之兼而食之也又曰昔三代聖王堯舜禹湯文武其為政乎天下也兼而愛之從而利之又率天下之萬民以上尊天事鬼愛利萬民按此節所謂墨氏兼愛疑於仁故其口相傳授皆以為愛無差等又荀子亦譏其大儉約而僈差等曾不足以容辨異懸君臣也夫聖人豈不欲舉天下之人兼而愛之顧有所不給也故必急於親賢其立為親親之殺尊賢之等者葢廣而充之所以愛天下也今夫視天下之人猶吾父母親戚奚不可也而於吾父母親戚亦無異於天下之人則不可之大者此所以欲厚待天下之人而不免反薄其親所以卒至於無父也况其為法生不歌死無服則所以儉其親者從可知矣儉於其親而尚何及人哉此孟子論二氏之害其極至於無父無君而不免陷於禽獸也大亂將起集註述大亂將起一句方見大意孟子之言雖充類至義之盡然不攷其實則疑於過葢其時異端邪説並行仁義不著所以為戰國之亂卒至於亡秦而極生民之類糜滅幾盡甚於率獸食人之禍孟子之言豈不信哉楊墨之害自是滅息楊子書不傳於世必因孟子闢之而書遂廢然列莊子書多其意也漢藝文志墨子七十一篇今存者十三篇然多膚淺或出附㑹莊子載其非樂稱道二篇之畧今書無之楊子雲曰古者楊墨塞路孟子辭而闢之廓如也則二書之不存孟子之功也程子伯子楊墨之害甚於申韓楊氏出於老子申韓亦出於老子太史公曰申子卑卑韓子引繩墨切事情其極慘覈少思皆原於道德之意孟子闢楊氏之為我是斥少恩之原佛氏之害過於楊墨佛氏寂滅類楊而禪定立脱之説過之慈悲普施類墨而平等無生之説過之葢兼無父無君之敎而資率獸食人之禍者所以其害為尤甚元魏以塔廟竭天下之財而亡梁以奉佛捨身而亡隋以道場唐以迎佛復寺五季奉佛飯僧皆無補於亡南唐以混茫無生之説亡其國生民之禍可為日積為君臣者或溺於佛而不自知或以取亡者未盡佛之道或置亂亡度外而終以佛為依皈胡不即已事觀之以為深戒耶此章入要畧五之十朱子曰諸聖賢遭時之變各行其道是這般時節其所以正救之者是這般様子恰似天地有缺齾處得聖賢出來補得周旋後過得稍久又不免有缺又得聖賢出來補這見得聖賢是甚力量匡章詳見後篇陳仲子下文齊之世家葢陳氏自成子得政於齊田和遂有齊國則陳氏在戰國時乃齊之公族世家也伯夷詳見論語註下盗跖莊子盜跖篇曰盜跖從卒九千人横行天下侵暴諸侯穴室樞戸驅人牛馬取人婦女貪得忘親不顧父母兄弟不祭先祖所過之邑大國守城小國入保萬民苦之按莊子所説雖詳而以為柳下恵之弟又與孔子同時其説遂不可據註亦自疑之又引漢書云秦之大盜則又在孟子之後當是秦國人之為盜者爾然盜跖篇後人所託決不可信孟子集註攷證卷三
