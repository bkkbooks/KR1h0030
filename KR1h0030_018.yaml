body:
  text: 欽定四庫全書孟子集注考證卷六元金履祥撰告子上告子趙氏注名不害兼儒墨之學義猶杯棬也以下文例之上當有仁字杞柳匱柳此據趙注語録又謂之蒲柳爾雅曰援匱柳楊蒲柳郛注匱柳皮可煮作飲蒲柳可為箭爾雅又曰杞枸檵注今枸杞也三者未知孰是當以語録蒲柳為正蓋可棬而為器者今南方多棬杉如荀子性惡之説荀子性惡篇曰人之性惡其善者偽也故枸木必將待櫽括蒸矯然後直鈍金必將待礱厲然後利今人之性惡故將待師法然後正得禮義然後治他如勸學篇亦多言矯揉之意又莊子書亦有黥汝以仁義之説如馬蹄等篇亦多以禮義為害性之具是所謂率天下而禍仁義也黃文肅謂告子諸問孟子但折之無言而欠於斷語履祥就其杞柳而斷之曰杞柳柔韌有可為杯棬之性故揉之可為杯棬人心本善有為仁義之性故可充之為仁義不必深闢其矯揉之説蓋人為氣稟所拘者謂不資矯揉不可也湍水篇入要略一之五近於楊子善惡混之説楊子修身篇曰人之性也善惡混修其善則為善人修其惡則為惡人今按告子之意謂性無善惡而在所引楊子則謂性雜善惡而在所修故集注謂近於楊子之説蓋告子之説又虛於楊子也其勢則然也孟子冝曰人之可使為不善是豈人也性哉其氣與習則然也生之謂性此句程子亦引之而意不同告子生之謂性是指其活動知覺處是性程子生之謂性謂人生以前則屬天地未可謂之性既生則屬我方可謂之性張子所謂合虛與氣有性之名文公所謂性字從生從心是也其實生之謂氣生之理謂性告子指氣謂性孟子以犬牛之性猶人之性折之無語矣然不明作斷辭豈欲其自思耶而告子亦無異辭是又不思也所謂不得於言勿求於心者也佛氏所謂作用是性語録舉傳燈録曰國王問尊者曰如何是佛曰見性為佛曰如何是性曰作用是性曰如何是作用曰在目曰見在耳聽聞在鼻氣臭在口談論在手執捉在足運奔遍現俱該法界收攝在一微塵識者知是佛性不誠喚作精魂又龎氏傅氏亦曰手持足履盡是神通運水搬柴無非妙用佛氏之説比告子又精神故集注言其略相似然佛氏妙處在此差處亦在此蓋指視聽言動之氣為性而不知所以為視聽言動之理之為性也指人心為性而不知道心之為性也雖其主於收攝作弄精神而顛倒錯繆終不可以入堯舜精一執中之道也愚按王文憲曰此段論性大旨及告子誤根可謂明白然告子以氣言性而不言氣字出孟子以理言性而亦不言理字出至程子張子方以此二字分别食色性也即生之謂性仁內義外語録告子只知得人心却不知有道心但見趨利避害飢食渴飲等處而不知辨别義理處正是本然之性履祥謂告子以甘食悅色為性則謂好愛之意生乎內故曰仁內不知辨别義理之謂性則謂長幼之宜由乎外故曰義外告子正以情欲為性而以義理為外也異於二字疑衍或有闕文江西儒者謂異字自是一句今按告子以彼白而我白之喻彼長而我長之孟子謂此二字不同不可引以為喻故曰異又因謂於白馬之白白人之白同可謂之白若長馬之長與長人之長豈可同以為長乎是詆其以白喻長之為異也然後正問之曰長者義乎長之者義乎則長之之心須在內也王文憲曰只此一句分曉林氏曰云云告子以吾弟則愛秦人之弟則不愛是以我為悅而曰仁內孟子正當曰吾弟則愛秦人之弟則不愛是親踈之辨即義在其中矣安得獨曰仁內乎告子謂長楚人之長亦長吾長是以長為悅故義在外孟子正當曰長楚人之長果亦猶長吾之長乎是必冇差等矣且謂以長為悅則是長長則愜於吾心也則悅豈在外歟今乃以嗜秦人之炙對長楚人之長是蓋因其食色之好非有秦楚之分以指其非外也其實上文長之者義乎已盡之矣惟告子不求諸心故孟子之喻就其所明者愈卑愈近以曉之也此章入要略一之八行吾敬公都之一語已盡而孟季子不能思與告子一爾二章問答大指略同當時淺陋之辨大率如此所謂小辨破義小言害道亦費孟子辭闢近世蘇氏胡氏之説蘇氏軾也其説略見子思論曰夫子之道可由而不可知可言而不可議不爭為區區之論以開是非之端夫子既殁諸子欲為書以傳世者皆喜立論論定而爭起孟子曰人之性善是故荀子不得不出於惡人之性冇善惡而已二子既已據之是以楊子不得不出於善惡混也為論不求其精而務以為異於人則紛紛之説未可以知其所止且夫子未嘗言性也蓋亦嘗言之矣而未有必然之論也云云胡氏文定公安國及其子宏也詳見胡子知言或問性曰性也者天地之所以立也曰然則孟軻氏荀卿氏揚雄氏之以善惡言性也非歟曰性也者天地鬼神之奧也善不足以名之况惡乎宏聞之先君子曰孟子所以獨出諸儒之表者以其知性也孟子之道性善云者嘆美之辭不與惡對也又曰大哉性乎世俗之言性者類指一理而言爾未有見天命之全體者也又曰凡人之生粹然天地之心道義完具無適無莫不可以善惡辨不可以是非分朱子曰知言所云即告子無善無不善之論也為兄之子集注云疑此或有誤字履祥按兄字當是乙字謂均是帝乙之子也此段言一時一家而善惡相逺如此韓子性有三品之説説具原性曰性之品有上中下三上焉者善而已矣中焉者可導而上下者也下也者惡焉而已矣朱子曰韓子説所以為性者五是也三品正可言氣然氣質之殊何止三品蓋千百而無算也乃若其情乃若發語辭若字對下若夫字情即下文惻隱之心四句則可以為善善即下文惻隱之心仁也四句謂性也才性發而情自然能為仁義禮智之事者蓋性之所能為所謂良能也此才也惟弗思弗求所以不能盡其才者衆也王文憲曰孟子以性不可見以其情之善知其性之善至於不善者罪無歸宿此方微發其機而終欠道一氣字出蓋欲人反求於心而自得也故曰弗思耳矣後面屢言弗思恭敬之心前篇云辭讓不若此章云恭敬為備且如一見人來便肅然恭敬及其交際或授受行前後坐上下然後辭讓之端發又恭之一字己該辭讓二字四端一端含二意如恭敬則亦然恭主體敬主心言有物必有則性也故好是懿德乃若其情所謂善也觀孟子引夫子説詩之意則性善之説蓋本於此程子曰叔子朱子曰氣質之殊非一不但清濁而已又詳見大學或問又曰伯子此語原於堯舜人心道心之旨至程子而天下之言性者定集注收二程子張子之説蓋補孟子之未備也程子此説才字與孟子本文小異孟子指性善之才性之所能為者人多不能盡惟聖人能盡其才爾程子指氣稟之才則其資質固有昏明強弱多寡之不同矣孟子之望人也切程子之明理也密王文憲曰自性而言則情與才無不善自氣而言則情有所循才有所拘然後有不善此章入要略一之二孟子答性善之辨至此章方明蓋告子好自為説不如公都子之善問朱子注孟子性善之辨亦至此章方備蓋程子兼説性氣二句斷盡古今論性異同張子又欲人之善反是教人以變化氣質也易牙齊桓公嬖人性知味並置淄澠之水皆能辨之以滋味事齊桓公詳見管子程子曰二段皆叔子語內體用伯子語同然章入要略一之九此章王文憲謂為衆人悅就同處看淺處説却分曉有受用今按此章才字即上章性善之才言性本善但係乎所養如何爾於是以物類喻所養之同則才無不善所養之異則長有遲速因物類之同以上及人類之同其言人類之同則推人形之同以內及人心之同口同嗜耳同聽目同美引以歸心之同然於以見人性之皆善與聖人初無異者又終之心有同然繳上口有同味之喻舉一以見其餘此孟子長於譬喻而切於教人如此又地有肥磽雨露之不齊已可見氣稟之有異孟子非不知有氣質之性也但就此中指出天地之性以勉人耳又自此章之後多言養之之功與前後知言養氣明善誠身雙關之説不同蓋孟子切於為人以為人性皆善但能存養不為外物所昏蔽則此心自然清明此性自然昭著明誠二者工夫即在其中非有異旨也牛山今屬青州王文憲曰牛山之木譬人之良心句句相對極分明仁義之心性也下句良心即是好惡情也即上文仁義之發仁發為好義發為惡與人相近即仁義之心人心之所同者雖嘗放其心氣清之時此心所發尚未與同然者相逺也也者讀幾希自作一句令人警省一線未斷急冝存養則其注作但其有梏亡注作又存一段三存字王文憲曰前本然之明中梏亡之失後工夫之存程子叔子此章入要略一之十夜氣一段本為心而言夜氣特其證驗存養則其工夫山木日夜之所息本喻人之良心未嘗止息然山木之生由氣化而戕賊之者在斧斤牛羊山木無能致力至若人心則生息雖由氣化而不盡在氣化梏亡雖由外物而不盡在外物此則在我自可以致力所以終歸於得養操存之説夫良心在人其人旦畫所為固有梏亡至夜安靜此良心依然生息平旦之氣即是可驗人若更能去梏亡之害加存養之工無時不用其力則清明氣象無時不然心境為當如何此章孟子切於救人山木一殷與良心一段當相對看而養與失養亦對在其間故以得養失養總之而養之得失又在操舍之間程叔子又以敬以直內一句指示操存之方可謂切要學者讀之急冝警省存得則人存不得則禽獸吁可畏哉暴寒喻教之時少聽之不熟誨奕喻教之雖一聽之不專程子叔子經筵劄子此章入要略一之三十熊爾雅熊虎醜謂虎之類也其力在掌味亦甘脆二者不可得兼謂適當間界之際求生則害義取義則即死此方是不可得兼之時須決取舍欲惡有甚於生死義之可欲甚於生以其愜快無愧也不義之可惡甚於死以其羞愧之無所容也不義而生則生可羞故雖可以得生而不忍也取義而死則死為要故雖可以避患而有不愜也如使茍人心無仁義之性而但有利害之私則所以求生避死者何所不用何所不為且將無所不至則人皆禽獸而已矣由是二字作一讀是指本心天理而言而有不用猶言何用生為弗受不屑此一段指人皆有之雖凡人乞丐者皆有是心則羞惡之本心可見矣萬鍾此又轉一節上文是決生死於危急之際此一節是計豐約於晏安之時孟子尤重以為戒向為身何文定並作一讀此章入要略三之三仁人心集注云云王文憲曰此仁之正訓也不是把仁來形容人心却是以人心指示仁雞犬放亡父桐陽散翁以此為讀程子前二段叔子後一段伯子此章入要略一之十七不知類章要略一之十三桐爾雅榮桐木注即梧桐梓爾雅椅梓注即楸此章入要略一之十四梧桐也相類非一此則梧桐也檟梓也爾雅楸屬多作椱注謂楸小葉曰椱又引左傳美椱云其作檟者苦茶恐非檟木左傳樹吾墓檟檟即梓也只當依孟子作檟飲食飲食以養口腹養小而失大則為小人而人賤之飲食而無失其大則所養以禮所祿以義是即所以養心志也豈但養口腹而已此章入要略一之十五此天之此舊本多作比余正甫以舊本為問朱子檢所有舊官本果皆作比字注中亦作比方朱子謂正文與注皆同而無文理恐是一處先誤而後人并改以從之爾今不可考但尋其義理作此字無疑也見文集范浚字茂明婺州蘭溪人號香溪先生曽以賢良舉秦檜當國不起有香溪文集行於世近無之心針本非為此章而作而與此章小體大體旨意吻合朱子取之吕成公問取此何為朱子曰正緣目前人不能如此道堪輿堪天輿地也文選注作天地之神者非此章入要略一之十六仁義忠信樂善不倦孟子嘗言仁義禮智而此天爵獨言仁義忠信蓋仁已該禮義已該智忠信則實有諸已而實行於物又接樂善不倦一句善即仁義忠信也天理固實有諸已而實行之又能樂之而不已不厭然後見其為可貴也此章入要略一之十七趙孟晉六卿趙氏為長故春秋時謂之趙孟戰國之時趙已為國孟子蓋舉舊俗方言爾貴貴於己者仁義聞譽道德之尊也人之所貴者膏梁文繡飲食之美爾此章入要略一之十二王文憲曰自牛山之木以下十章皆是勉人養心頭面不同所主則一為仁上章力微則不能勝不仁在於反己下章不熟則反不如他道在於熟之反己莫大於剛健熟之則在於日新右二章入要略一之三十一二志彀弓不滿則射不能及逺故教之學之者功力欲其到規矩器無法則不能成器故教之學之者法度欲其正也志欲到滿做必有法集注似只作一意告子下任國名説見下文以禮食如典禮所載進食之禮與飲食之節其變則如不食嗟來之食者曾子曰微與其嗟也可去其謝也可食揣量度也帶鉤古人衣有大帶其繫佩者又有小革帶一端為孔一端有鉤以穿之鉤以金或玉為之吕氏考古圖有古玉帶鉤紾戾反拗也錯綜大傳本義曰古語也錯者交而互之一左一右之謂也綜者縱而挈之一低一昂之謂也斟酌俗語也如以勺取酒以入器而酌量其淺深也膠柱調瑟語出戰國策史記琴以軫轉絃瑟以柱檠絃此章問辨若淺而集注總意極為精密曹交章要略一之四集注不解文義以其明近不待解也然其指意重在為字人皆可以為堯舜此古語或孟子嘗言之而曹交舉以為問且自謂已具聖人之形而但食粟無能如何則可至此孟子曰此何難之有亦為之足矣蓋就指為之一字發之謂人之可以為堯舜非安坐而可至也所謂為者必有用力作為之功焉有人於此力不能勝一鶩雛則是自為無力之人今曰舉百鈞之重則是自為有力之人如此則舉烏獲之任者即是用力以為烏獲也然力猶有分限而性則無不善夫人之為堯舜則又豈以力不勝為患哉乃自不為之耳此章為字皆重字但為患一為字似輕耳百鈞三十斤為鈞百鈞則三千斤古稱不知若何漢稱一斤當今稱四十三文重強匹禮記庶人執匹注作驚烏獲集注古之有力人史記秦武王好以力戲力士任鄙烏獲皆至大官雜書載烏獲將渡舟人不知其為烏獲也行舟自若烏獲涉水持舟舟人以楫椃其首烏獲登舟嗔日視舟人髮上指舟人驚眩烏獲兩足踐舟左重則舟左皆沒右重則舟右皆沒始知其烏獲謝罪得濟但此事與孟賁同未知孰是堯舜之道堯舜之道孝弟而已矣為之在行止疾徐之間衣服言語習行之際此所謂人皆可以為也下學而上達耳知求此章前為字主行言後知字主知言知而後能行行在於知知在於求高子齊人齊有高氏小辨小雅辨彼鸒斯之篇詩傳曰太子冝臼作此以自怨序以為太子之傳述太子之情以為是詩不知何據凱風親之過小七子之母不安其室而欲再嫁固為失節然禮律有繼父之服又所關止於一家故曰過小若小辨則天子廢嫡立庶國統所係不惟太子之生死不可保而國家之存滅亦不可知故曰過大宋牼莊子書有宋鈃莊子天下篇不纍於俗不飾於物不茍於人不忮於衆願天下之安寧以活民命人我之養畢足而止以此白心古之道術有在於是者宋鈃聞其風而悅之作為華山之冠以自表救民之鬬禁攻寢兵救世之戰以此周行天下上説下教雖天下不取強聒而不舍也又見荀子非十二子篇不知臺天下建國家之權稱上功用大儉約而僈差等是墨翟宋鈃也注云孟子作宋牼右入要略三之六此章與第一篇首章相類梁惠王問利國孟子闢之可也宋牼言用兵之不利似矣而孟子亦闢之蓋利之一字不可啓其源也啓其源則末流有不可勝言之害且言用兵之不利而欲止之其有用兵之利則又不可止矣利必有利之害仁義自有仁義之利孟子尊敬宋牼取其救世之心也不取其言利救其學識之淺也任今濟州任城縣至今襲慶府鄒縣一百八十里平陸見前篇名聲譽實事功猶今人言功名也仁髠疑孟子既出未見致澤之功而去之為不仁孟子言聖賢去就不同而無非仁以其皆無私心而合天理也魯繆公史記諸書並作穆吕成公大事記曰淳于髠曰魯繆公之時公儀子為政子柳子思為臣魯之削也滋甚質諸孟子皆非是穆公亟見於子思曰古千乘之國以友士何如子思不悅曰古人有言曰事之云乎豈曰友之云乎是穆公欲友子思而不可得也况敢臣之乎以臺無餽之事觀之悅賢不能舉又不能養無惑乎魯之削也穆公雖不能終用子思然尊賢尚德之意當時所罕而公儀子之亷儉亦得相小國之道以魯之弱﨑嶇強暴之間竟能與戰國相終始豈非其君相之力耶公儀子名休史記循吏有傳子柳泄柳也檀弓亦自有子柳未知孰是不用賢則亡孟子謂賢者去就則存亡所係削不勝於亡歟削何可得與按魯自悼公卑於三家及元公以後不載三家之事而費自為國必三家又微各據其邑而魯自僅存元公之世齊田氏正強威烈王十四年田白伐魯莒及安陽明年又伐魯取一城又明年元公薨而穆公顯立立三年而田和伐魯取成則孟氏亡矣又十四年而田和伐魯取最韓救魯又四年而魯敗齊師於平陸又五年而田齊伐魯破之又八年而穆公薨子共公奮立蓋穆公立於元公連喪三城之後可謂削矣而穆公三十三年之間凡三被兵喪二邑所謂削滋甚也然外結韓之救內又敗齊師於平陸平陸齊地則是又一嘗伐齊而敗其師也此所謂削而不亡之驗也淇衛地水名河西自齊言之則衛地在東河之西也高唐齊西境大邑陳氏得之而始大今為州華周杞梁左傳魯襄公二十三年齊侯襲莒門于且于傷股而退明日將復戰期於壽舒杞殖華還載甲夜入且于之隧宿於莒郊明日先遇莒子於蒲侯氏莒子重賂之使無死曰請有盟華周對曰貪貨棄命亦君所惡也昏而受命日未中而棄之何以事君莒子親鼓之從而伐之獲杞梁莒人行成齊侯歸遇杞梁之妻於郊使弔之辭曰殖之有罪何辱命馬若免於罪猶有先人之敝廬在下妾不得與郊弔齊侯弔諸其室事亦見檀弓下篇按傳首作杞殖華還遇莒子莒子請盟又作華周對中作獲把梁不復見華周事末止載杞梁之妻此曰華周杞梁之妻左氏人名字氏多是重復孟子接聞尚近舊必有考又按琴操曰杞梁妻嘆者齊邑杞梁植之妻所作也植死妻嘆曰上則無父中則無夫下則無子將何以立吾節亦死而已援琴而鼓之曲終遂自投淄水而死則又作杞梁植今存二説以備參考又按孫氏正義曰華周即華旋也或云齊莊公襲莒墜而死其妻孟薑向城而哭城為之崩孟子之所為豈髠之所能識哉孟子仕齊豈不欲德烈加於上下其德烈所以未加於上下者必有不得行其志者矣不得行故去而又不欲瞭然揚己歸過故其去就之間泯然無迹有非髠之所能識者又不欲自言此意故但舉孔子之事非衆人所識者以答之意在言語之表矣五霸趙氏注説邵康節同齊桓始霸中國尊周室攘夷狄晉文自宋襄公伯為楚所陵晉文公却楚尊王遂霸中國秦穆本霸西戎能成晉文之霸諸夏亦尊之宋襄繼齊桓之業以圖東略而南襲於楚楚莊楚世與中國爭霸至楚莊為最賢丁氏唐丁公著蘇州人其説亦本杜氏左傳注夏昆吾史記陸終之長子曰昆吾昆吾氏夏之時嘗為侯伯桀之時湯滅之虞翻曰名樊為己姓封昆吾即衛地商大彭史記陸終第三子曰彭祖彭祖氏殷之時嘗為侯伯虞翻曰名翦為彭姓封於大彭即彭城是也豕韋堯後在商為侯伯周封堯後於唐以更豕韋之後其後又封於杜讓一字二義遜讓責讓然責而謂之讓以禮辭責之也如禮傳曰逺方之民有飢寒而不得衣食有獄訟而不平其寃失賢而不舉者天子於其君之朝也揖而進之曰意朕之政教有不得爾者耶何乃有飢寒而不得衣食有獄訟而不平其寃有賢而不舉者然後其君退而與其卿大夫謀之此天子讓諸侯之辭也左氏傳公使讓之曰云云及霸主讓諸侯與諸侯相讓之辭此類亦多非辭之所可責於是乎有討今南音遜讓之讓去聲責讓之讓上聲亦通葵丘之會周襄王元年魯僖公九年夏公會宰周公齊侯宋子衛侯鄭伯許男曹伯於葵丘傳曰會於葵丘尋盟且修好禮也九月戊辰諸侯盟於葵丘傳曰齊侯盟諸侯於葵丘曰凡我同盟之人既盟之後言歸於好穀梁傳曰葵丘之會陳牲而不殺讀書加於牲上臺明天子之禁南陽齊之南境汶陽之田百里説見前篇班爵祿章下辟土地充府庫興利聚斂之臣辟土地如李悝盡地力商鞅開阡陌説見前篇辟草萊任土地章約與國戰必克從衡攻戰之臣白圭詳見史記貨殖傳薄斂固美意然此乃北狄荒涼之俗非中國通行之法也古者公稅皆什一後世公稅於民雖三十稅一而私取於民實什取五蓋古者官授田後世人自買田也人自買田故官稅輕私授於震故私取重然白圭之欲輕取據本傳圭善治生能薄飲食忍嗜欲趨時若猛獸鷙鳥之發天下言治生者祖之圭之欲輕賦蓋别自有理財之術也然圭自謂其術不可學使圭自為之則輕賦而亦可使他人為之鮮不為民害矣故孟子不許黍耐寒宜乾治水禹順導丹曲防樂正子名克為國相者不在力不在智不在博但是好善則衆善皆為之用傅巖傅本堯後之國傅巖在虞虢之間名為傅險澗水壞道發胥靡刑人築之傅説貧代胥靡之役胥靡者有罪連及末減之人其役如周禮罪𨽻漢法罰作後世官徒也高宗夢得良弼被褐帶索以形求之果得説膠鬲闕管夷吾管仲本管叔之後氏管名夷吾字敬仲又曰管仲士刑官也管夷吾為齊師所索魯使獄吏囚之轞以豫齊也孫叔敖楚蒍賈之子蒍艾獵也孫叔其字敖楚官號也舉海蓋少孤而隱於海濱也荀子曰孫叔敖期思之鄙人也注今弋陽然孟子謂舉海必有所據程子伯子此章入要略一之二十八孟子集注考證卷六
