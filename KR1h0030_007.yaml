body:
  text: 欽定四庫全書論語集注考證卷六元金履祥撰先進先進先進後進漢書尚有此名但彼謂同時前後輩此似謂古今前後輩程子叔子今反謂之所以知野人君子為今人之言者蓋下文如字斡轉吾字提起則知上文為今時之言也餘看通釋弟子因孔子之言記此十人而并目其所長所以知為弟子所記者或問載吳氏之説以例言之謂夫子於門人稱名門人稱於夫子之前亦名門人自相謂稱字或其弟子門人於論語中稱之若以理言則夫子教人未必立此四科之目雖固各因其材亦未嘗限其所成也學者自以所長目之爾程子伯子門人之賢者固不止此曽子傳道有若似聖人公西赤之才勝於宰我淡臺滅明之勇亞於子路子羔之孝次於閔子樊遲之才亞於冉有曾點漆雕開已見大意子賤之政原思之守其他諸賢未易枚舉開元禮既拘十哲之數其復顔子升侑而以曾子補十哲是矣曽子升侑而遂以子張備十哲可乎景定之禮以顔曾思孟為四侑萬世公論於斯為允然前次議者猶以顔路曾晳伯魚並在下列為未安則如之何則亦復古之制而已古者廟寢之制前為堂而後為室宗廟之祭先室事而後堂事而庠序之禮先獻酬而後燕禮今二丁之祭宜先用饗禮牲幣旅陳享先聖而南面於堂以顔曾思孟侑繼用燕禮籩豆簠簋奠先聖而東面於室以顔路曾晳而下七十子左右祫食如昭穆之例馬斯為得之其餘從祀者雖東西夾室可也十哲世俗論也唐開元始定十哲之號孝哉閔子騫以例言之當名但此篇乃閔子門人所記故記其字一日三復三去聲家語弟子行篇子貢曰獨居思仁公言仁義其於詩也則一日三復白圭之玷是南宫縚之行也孔子信其能仁以為異士大戴引之云云以為異姓昏姻也通釋謂誦詩至此必三復然當依集注所引孔子對王文憲曰前有季康子兩問無對字疑誤後放此各言其子孔子嘗痛顔子謂不得視猶子也而此曰各言其子蓋所以砭顔路非禮之請也然於鯉也死不鬻命車以為之槨於回也亦然其視之猶子可見矣是以門人厚葬孔子惜之以為不得如葬鯉之得情也君子用財視義可否豈獨視有無喪具稱家有無於人之喪也亦然此説不可謂非也而胡氏謂豈獨視有無然稱有無即是義按是時顔淵之死顔路他無所請而至於請車夫子亦他無可豫而至於拒之則顔路疑於求而夫子幾於吝今考其時則顔淵之死且葬適當厄陳蔡之後自楚反陳之餘此正夫子之窮也夫喪事稱家之有無夫子既以此處其子安得不以處顔子乎夫子遇舊館人之喪嘗脫驂以致賻矣而不能為顔子之槨彼一時此一時貧富不同也胡氏之説雖善然不考於事而其流少恩矣學之有序王文憲曰看未能對焉能便是有序一理二氣程子叔子子路卒死於衛孔悝之難事見左傳哀十五年詳見第十三篇夫子謂由也不得其死然所以警子路者豫矣而子路不悟卒死孔悝之難使子路而悟夫子之言將不死其難乎曰子路之死固是傷勇然其失不在於死難而在於仕衛夫輒與蒯瞶有父子之爭孔姬與蒯瞶有兄弟之戚而孔悝主輒內必有母子之變子路仕焉不得其死冝矣抑此猶以事勢言也以理而言則正名之説莫詳焉而子路不思此固取死之道也漢書引此句班固幽通賦注論語稱閔子云云子樂曰若由也不得其死然府名左氏昭二十五年公居於長府程子未詳家語云辨樂解篇子路鼓瑟孔子聞之曰先王之制音也奏中聲以為節流入於南不歸於北夫南者生育之鄉北者殺伐之域故君子之音溫柔居中以養生育之氣憂愁之感不加於心暴厲之動不在於體也小人之音則不然亢厲微末以象殺伐之氣中和之感不載於心溫和之動不存於體昔者舜彈五絃之琴造南風之詩故其興也勃焉殷紂好為北鄙之聲其廢也忽焉由也匹夫之徒曾無意於先王之制而習亡國之聲豈能保其七尺之軀哉按此瑟字作琴朱子蓋借以證夫子之言過禮記仲尼燕居篇曰師爾過而商也不及子貢越席而對曰敢問將何以為此中者也子曰禮乎禮夫禮所以制中也集注入此段於後意方足爾雖若勝於愚不肖之不及師未可謂賢智商非愚不肖此二句泛言爾然不若止曰道以中庸為至過之者雖若勝於不及然其失中則一也差之毫釐繆以千里二句出禮記史記皆云易曰今易無此語崔駰史記注謂易已有之今見易通卦驗上卷魯鈍也曾子於諸子年最少此與諸子並論蓋其初登門之時也其時才鈍故其用功誠確而倍所以終於傳道程子一條伯子二條叔子傳稱唁者謂俗論也凡傳稱唁曰者皆從言古文篆字之從言者皆從口空匱也自何晏注以空為虛無意本莊子故前輩諸公及張宣公皆從之集注玩其文意回賜對言屢空對貨殖庶乎對屢中其説穩實絶無異端之病程子兼取二子賜不幸言而中左傳定公十五年邾隱公來朝子貢觀焉邾子執玉高其容仰公受玉卑其容俯子貢曰二君皆有死亡焉正月相朝而皆不度高仰驕也卑俯替也驕亂替疾君為主其先亡乎夏五月公薨仲尼曰云云善人章程子未詳逡巡進退之間民生於三事之如一惟其所在則致死焉國語晉語欒共子曰民生於三事之如一父生之師教之君食之非父不生非食不長非教不知生之族也故臺事之惟其所在則致死焉顔淵之於孔子王文憲曰宜作孔子之於顔淵曾猶乃也曾在登反虐民未學而治民則妄作者擾民庸繆者誤民身不足以率民而徒持刑政以齊民者則又必有不教而刑之患是皆不足以治民而適以亂之其終歸於虐之也不斥其非而特惡其佞即事皆學而不専在於讀書此説謂之非則不可然未學而使之以仕為學此則子路之失而乃借此説以禦夫子之責故夫子但惡其佞而不謂此説之非也古者學而後入政未聞以政學者也鄭子産之言見襄公三十一年誘之盡言以觀其志夫子何以之問本欲言其用而三子亦多以用對但言其所能為不進其所欲為夫子恐其志局於此故下文轉作亦各言其志所以集注於無吾以下曰誘之盡言以觀其志比必二反當作毗志反見文集小國也春秋之時諸大國猶不能自振則小國可知而由求諸子皆欲自小國而為之即此可見二子才具之高能為人所難為四子侍坐以齒為序據上文詳見或問以方鼓瑟夫子問三子對而點方鼓瑟古人為學詩書禮樂則琴瑟之事如今日之課耳但其動靜之際氣象自别亦微似狂耳單祫祫夾也或單或祫視暖涼為候今上已祓除後漢書禮儀志曰三月上巳日祓除官民潔於東流水上蔡雍注云即論語暮春浴乎沂又上巳乃三月節後初建巳之日所以總説暮春至曹魏則定以三月三日為上已所以蘭亭曰暮春之初泗上士人以為沂水三月氷堅未解何以言浴當是沿乎沂爾殊不知沿沂之説本於韓李而文公於或問已辨其非矣蓋彼但以浴為祼浴而不知為祓除也况魯國無川浴之俗暮春亦非水浴之時曾點又豈川浴之人哉且如其説則堅氷未解曾點又何以御春服風舞雩也毋乃病乎况周無寒嵗秦無燠年古今風氣不同氣化或異未可據耳日之近而詆古人之書也沂水名在魯城南地志以為有溫泉焉魯以沂名水者非一此沂乃出尼丘山東源經魯城南而入泗者也沂岸深而水淺中有逵泉冬暖夏冷地志據冬而言故曰溫泉云蓋有以見夫此節推曾點已見大意以冠下文人欲盡處要在此句夫春和之時單祫之衣童冠之遊沂雩之地人孰不見此遊適之景而點獨舉此夫子獨與之蓋見其胸次無人欲之纍故隨時隨地見此天理流行之樂動靜之際釋其鼓瑟舍瑟作對異撰處而其言志此節釋曾點所言之事而其胸次此節釋曽點言外之氣象視三子之規規於事為之末者氣象不侔矣故夫子歎而深許之三子之言皆所能為無非實用下文及平日夫子亦皆以是許之而於此乃獨與點似若鄙實用而尚清高者但三子各言其所能而不知勉其所不能其後子路死於衛冉有為季氏聚斂公西華雖不見其用處然不免纍於肥馬輕裘之間乃知夫子之與點蓋有深意所以微激三子也大抵學者先觀其器量識趣曽點所言不過即所居之位樂其日用之常素貧賤行乎貧賤耳而玩其辭氣想其識量則於本原所見者自有安行天理與物皆春之意故雖三子言用而曽點不言用然三子止此而曾點不止此矣使其用之而行則曾點可以用三子以其有各得其所之氣象也由求不能兼曽點以其規規於事為之末也各得其所則堯舜氣象亦不過此規規事為則失身聚斂其弊有所必至矣曾晳曰曾晳以夫子與已而又問三子之言亦其好學切問吕成公曰終是有些矜意在夫子答之曰亦各言其志也已矣乃是微抑其矜曰為國以禮止為之大集注程子一條説三子二條説曾晳及子路三條四條説曾晳程子云子路只為不達為國以禮道理若達却便是此氣象蓋達此則事事物物各有其節便是堯舜曾點氣象子路不達此非惟不可望曾晳也其後孔悝助子拒父無禮甚矣而子路仕之卒死其難不達之故其弊如此可惜也已然觀此章者至與點而止而不觀下文辨論之詳夫上文之與點所以激三子也下文之辨論所以實曾晳也聖人陶冶之妙進退抑揚初非茍然亦非長語由不知夫子所哂之意故終死於孔悝求不知夫子與點之意故聚斂於季氏曾晳又不知體夫子辨論三子之意故志雖高而行有不掩所以終於狂凡此皆學者所當戒也子路只為不達為國以禮道理若達却便是這氣象也何文定曰此段當總入第五篇末亞於浴沂之下程子一條二條伯子四條叔子三條未詳顔淵仁者心之全德自古聖賢相傳至夫子教人為學則曰為仁最為親切然而仁為何理孔門初無明言前人未冇正訓蓋古者義理素明不待訓説自制文字之初此理已分明仁字從人從二古篆凡重字則於本字之下從二仁字從人而傍從二是人人字言人之所以為人也又科斗古文仁從人一心或作千心謂仁即人一心之理千人所共之心也故孔門論學但曰為仁集注所謂全其心之德也至子思孟子時異端之言仁者漸差故子思孟子正言其名義子思曰仁者人也孟子曰仁人心也又曰仁也者人也合而言之道也又曰不仁不智無禮無義推而為四端之説然自此以來異端日多義理日晦諸儒不察更無定論韓子獨以博愛名仁程子非之以為仁是性愛是情然亦以為仁無正訓言愛言覺皆非也但合孔孟言仁處觀之一二嵗得之未晚如曰公而以人體之則為仁又曰四德之元猶五常之仁偏言則一事専言則包四者仁之正訓可謂引而不發躍如也至朱子言之始明備曰仁者天地生物之心而人得之以為心者也此即程子所謂四德之元也孟子所謂仁人心也曰仁者心之德愛之理心之德者專言之也愛之理者又偏言之也而此章正名之曰心之全德可謂盡矣凡集注言仁帶及人處則曰心之德愛之理獨説心處與為學處則曰心之全德曰心德之全是於専言偏言處又分别明辨矣然此章帶禮説孟子對義説又兼四性説程子又兼五常説學者不可不思蓋心之全德天理渾然其中自是無所不備聖賢切於明道教人故就中又指出其間體段子目以此仁之中又自有裁制各當處謂之義又各有節文處謂之禮藏在中而有分辨謂之智無非著實謂之信既備諸體段故見諸發見謂之四端五常而不害其為仁之渾然也而語録又有梅仁杏仁之喻此尤為親切人之心德謂之仁故梅杏之心亦謂之仁正取此義古人既以人心之仁名梅杏之仁學者試以梅杏之仁反觀吾心之仁梅杏有此仁故種之即生人心有此仁故感之即動而愛然梅杏之仁種之而生生而長長而花花而實如此則梅杏仁中専是生之性已具此長成收藏之性在其中矣使仁之中不具此生長收藏之性則何以生之後有幹枝花實長成收藏之節哉今又觀梅杏之仁其尖處是根芽純是仁意內分為兩片是仁中已對有仁義其文理分明即禮也藏此生意在內即智也充實不虛則信也其仁不實則種之便不生不長矣以此觀之則人心之仁悉包義禮智信在其中可知然梅杏之實冇此仁又是元初種子冇此仁故生而為梅杏之實無不有此仁此所謂天地生物之心而人得之以為心者論仁者至朱子人心全德之訓可謂明備今推明會粹其説以俟學者為仁者所以全其心之德也草巢趙必升問學者顔淵問仁章二為字二已字之異同今按上已字重是指身之私欲下已字輕是指機之在我此不待説若二為字則何文定謂上為字輕語録多作謂之仁便是仁王文憲謂文公豈不能下謂之字或下曰字乃下所以全三字所以全是用力於仁也此章之下朱子釋之曰為仁在已上章又曰為仁無時無處不用其力讀者詳之此二君子晚年未一之論履祥按王子之説固密但克己復禮為仁之下即繼之曰一日克己復禮天下歸仁焉則克己復禮便是仁可知故二為字上字輕而下字重上為字猶語録所謂便是仁文公以所以全訓之者雖密於語録然猶云克己復禮便是為仁爾上句重在克己復禮字上則為字輕下為字則包克己復禮在中故為字重又文公語録中庸第十三章人之為道如為仁由己之為不可以為道如克己復禮為仁之為讀者試思之心之全德莫非天理二句合説極為圓備語録仁禮非二勝去聲下文勝用平聲事皆天理復禮搭在事上説體用圓備語録曰佛氏只在克己更無復禮此所以不中節歸猶與也天下之人皆與其仁本程子曰一日克己復禮則天下稱其仁焉又按吕氏克己銘曰及既克之皇皇四達洞然八荒皆在我闥孰曰天下不歸吾仁癢痾疾痛齊切吾身遊氏謝氏之意類此朱子以為不然謂如此則是存想天下歸仁不須克己只坐想終一日便自天下歸仁矣豈有此理且已有二項有物我之已有私欲之已吕氏只説得物我之已遊氏亦公以克己復禮為想象如此二説與下文非禮勿視聽言動略無干涉視聽言動自是屬行諸公都從知上説不從行上説又曰一日真能克己復禮則事事皆是天下之人聞之見之安得不與其為仁也朱子之言如此則克己復禮皆是實事天下歸仁皆是實説日日克之不以為難日日字在一日之前謂日日而克之復之至於一日豁然欲淨理純動容周旋無不中禮則天下之人孰不謂之仁人哉一日語下添日日字由已語中添不以為難語意密察私欲淨盡天理流行二語結定在此則段中言語皆緊程子曰非禮處便是私意叔子也易傳曰雖無邪心茍不合正理即妄也乃邪心也此段意亦如此理欲大界分學者尚可辨惟理欲之間毫釐之差所當分辨爾又曰未詳上條體此條用謝氏曰克己要決王文憲曰此學者頂門下針也天理人欲之際已判然矣顔子之學蓋已得於博文之後知至理明故不復有疑非禮者已之私也非禮而言動固是己私若説視聽固在己而非禮者則在物何以皆曰己私蓋以其可以悅目悅耳此即己私也程子叔子由乎中應乎外聖人之事也中仁也外視聽言動自周旋中禮也制於外所以養其中學聖人之事也非禮而勿焉克復所以為仁也視針聽針視為要聽為重故視針云中遷而聽針言亡正性本善只為世俗邪説鄙論淫辭姦聲一切非禮之言咻之而性之正亡矣知誘物化本樂記人有血氣心知之性物至知知然後好惡形焉好惡無節於內知誘於外不能反躬天理滅矣夫物之感人無窮而人之好惡無節則是物至而人化物也人化物也者滅天理而窮人欲者也知止本大學言針躁妄王文憲曰二字包盡言之病針內皆此意履祥謂上四句收入養其中以下又發出制乎外者警戒最詳切動針王文憲曰理欲二字是生死路頭朱子晚年以四針為傳授心法切要之言以此章上接危微精一之傳戊申封事及延和奏劄皆連舉以告君而損益四代禮樂即繼於此章之後至明在己禮之間非字之上至健在克復之間勿字之中仲弓章敬以持已恕以及物則私意無所容而心德全矣王文憲曰敬以持己私意無所容於內有以存其心之德恕以及物私意無所行於外有以推其愛之理內外無怨先言邦後言家邦踈無怨易家親無怨難此所以先後言之以驗其工夫之密程子叔子是偶然摘此二句説不是就此章經內説惟謹獨便是守之之法學問功力易間斷者莫如獨能謹獨則無間斷矣故程子於川上章及此段皆指謹獨以為方然於此章却補得出門使民以前工夫下文儼若思一段又詳之或問程叔子主敬行恕番易饒伯輿謂此章全説強恕求仁之方出門使民亦指接物之恕蓋備舉行恕之首尾告之無怨乃恕之效此説王文憲亦然之使民如承大祭所謂無施勞也乾道坤道乾道剛健中正純粹顔子純粹明決之性似之坤道敬以直內義以方外仲弓主敬行恕之工似之方外即潔矩之意司馬牛名耕程子叔子平日所為無愧於心此二句又補內省不疚以前工夫語録所以不憂不懼由內省不疚學者又須觀所以內省不疚如何得來向魋作亂牛常憂懼牛有兄弟而云然者憂其為亂而將死也向魋為司馬氏説見述而篇魋為惡於宋嘗欲殺孔子其為人可知其弟子頎與之同惡其兄巢弟子車不能正反與之同此牛所以有無兄弟之憂也其後魋果以欲弒景公而亡奔衛司馬牛致其邑與圭而奔齊及魋再奔齊而牛又致其邑適吳反卒於魯郭門之外子夏四海皆兄弟之言向魋之惡司馬牛常以為憂夫子知之有內省不疚之訓而又直以無兄弟為憂子夏廣之胡氏病其意圓而語滯夫以牛之高節何以在宋則宋止巢而不止牛適吳又何至為吳人所惡豈吳人所向異歟不然則牛之所以敬而無失恭而有禮者亦容有未至耶以家語稱其為性躁好言語此亦牛之尚有疚子夏之言或切中其病也又皆兄弟字若作猶兄弟字似無病哭子喪明事見禮記檀弓篇此必因子張之失子張之失輕信易發故夫子告之以此常人反有因此而以疑執為明者殊不知當先以明逺為務非但以不行為明逺也足食足兵民信或疑初意止言二事民信之矣乃其效子貢則析而三之以究其極然細玩之此正與答冉有庶富教事同國家為政於此三者不可缺一上文民信雖以效言下文信字則兼本效夫以次第言則三以事理言則一民之信之雖在足食足兵之後而施信於民即在足食足兵之中天下豈有舍信而能足食足兵者子貢之智固知信之重與兵食並而未知信之重於兵食故再三問之以究其極初言民信雖因兵食而後固末言民信則舍兵食而獨存語若並而意獨至蓋信之效固因兵食而行信之理則先兵食而有使一日而無此理則不相保固而人道絶矣聖人視天下存亡生死皆是常事惟是理不可一日泯苟惟無信雖有食有兵且不相為用况無食無兵之際其不為鳥驚獸駭相戕相噬者幾希矣有國家者所當深思也必不得已而去如加之以師旅因之以飢饉危急存亡之秋也此事惟周大王可證不以其所以養人者害人是去兵也杖策走馬而去則倉廩米粟皆棄之是去食也獨仁意素孚而民從之如歸市卒以再立國而有天下程子叔子駟不及舌駟四馬也古者一車四馬故曰駟謂言出舌雖駟馬不可追而反之此必當時諺言虎豹之鞟猶犬羊之鞟三猶字二正一反大意謂惜乎棘子之説固君子之意也而其失言亦不可追夫文之不可無猶質之不可無二者均也虎豹之鞟猶犬羊之鞟惟有毛則可辨其為虎豹為犬羊耳若無文則君子小人上下等差皆無所辨也夫廢禮文而至於君臣上下貴賤等差之無辨其為失言豈不大哉盍徹章此章蓋極本原之論而讀者猶疑有子所對大相反似嫌於迂看得哀公之意本是兩下問年飢謂嵗凶而百姓飢餒也用不足謂賦少而國用缺乏也年飢不可加賦而用不足又不可不加賦二者將何以為計有若對曰盍徹乎蓋且對年飢一句先以寬民力為重哀公曰二吾猶不足如之何其徹也却是因盍徹之對而專憂國用之不足故有子再對謂國家以民力為本民足則君自可與之俱足若民力不足君雖獨足其誰與守之觀有若君民相對之辭則知哀公亦是君民相對之間集注推明處此之方雖入節用二字以補之似不首解年飢二字之意公以有若不諭其旨故言此以示加賦之意哀公此問未有加賦之意有若斯答反以減賦為言及哀公再問則為之發明民富為足國之本民貧則國危之禍縱哀公不能減之什一必不至於再加賦矣此亦告君之法多則桀三句並出揚子先知篇崇德章程子叔子是時景公失政而陳氏厚施於國左氏昭三年晏子曰公苛其民而歸於陳氏齊舊四量豆區釡鐘各自其四以登於釜陳氏三量皆登一焉以家量貸以公量收之民人痛疾而或燠休之民歸之如流水欲無獲民將焉辟之又昭二十六年晏子對景公曰陳氏雖無大德而有施於民豆區釡鐘之數其取之公也薄其施之民也厚公厚斂焉陳氏厚施焉後世若少惰陳氏而不亡則國其國也已公曰是可若何曰惟禮可以已之在禮家施不及國景公又多內嬖而不立太子其後果以繼嗣不定啓陳氏弒君篡國之禍齊燕姬生子不成而死諸子鬻姒之子荼嬖諸大夫恐其為太子也言於公曰君之齒長矣未有太子若之何公曰二三子亦姑謀樂何憂於無君公疾使國惠子高昭子立荼置羣公子於菜哀公五年景公卒公子嘉駒黔奔衛鉏陽生奔魯陳乞鮑牧以兵逐國子高子陳僖子使召陽生於魯立之使胡姬以安孺子如賴去鬻姒使朱毛殺孺子於野幕之下十年弒悼公簡公立使闞止為政哀公十四年將逐陳氏陳恆攻殺闞止執公於舒州尋弒之小邾射以句繹奔魯射音亦人名句古侯反句繹地名當在魯鄒繹山之下左氏哀公十四年小邾射以句繹來奔曰使季路要我吾無盟矣季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉對曰魯有事於小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能問政章程子叔子魯自中葉政由大夫魯自文公薨東門襄仲殺赤及視而立宣公季文子始持其柄而専魯政至襄公十一年三分公室而各有其一至昭公五年舍中軍四分公室季氏擇二孟孫叔孫各一家臣效尤據邑背叛陽虎囚季桓子而奪其政公山不狃又以費叛康子奪嫡左氏傳哀三年秋季孫有疾命正常曰無死南孺子之子男也則以告而立之女也則肥也可季孫卒康子即位既葬康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退公使共劉視之則或殺之矣召正常正常不反杜氏注曰畏康子也按孺子之子生康子攝主俟其長而退禮也而即請退此或所以殺之也此所以有奪嫡之罪也質直集注內主忠信子張務外故夫子之言每針其失前章崇德之問夫子以主忠信徙義告之故此章又以質直好義為言文雖不同而意則一質則忠實之謂直則貞信之謂故集注於此章即以前章主忠信訓之審於接物察人之言觀人之色是接物之際審吾言行之當否自牧下人固是謙下於人然以慮字冠其上欲常思量惟恐有忽略之意所以自牧字體得好如牧牛然常是牽轉不令放逸也色取仁而行違此質直好義之反居之不疑是察言觀色慮以下人之及語録謂此只粗漫將去専以大意氣加人者謾牟干反程子叔子曾氏幾字吉甫吕居仁門人成公外祖也號茶山諡文清收入集注者惟此一章逺如字上聲絶逺之逺左氏曰禹稱善人不善人逺語録不仁者皆化為仁則不仁者絶無矣程子叔子善道道去聲集注作善其説以道之語録曰告之固忠矣須教導得是始得與集注稍異論語集注考證卷六
