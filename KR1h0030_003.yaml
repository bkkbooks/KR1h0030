body:
  text: 欽定四庫全書論語集注考證卷二元金履祥撰八佾每佾八人此說疑是蓋古者以八為數後來雖俗樂每列亦八左傳所謂女樂二八是也數假借去聲降殺左氏傳作隆殺以兩此自上而下故曰降殺忍罪不客誅忍從後說何憚不為忍從前說三家說見前篇孟懿子章堂廟堂也上文庭亦謂廟庭蓋廟制室外為堂堂前為庭無知王文憲曰前章不仁此章不知不仁不知故無禮無義按不仁言其忍也不知言奚取也程子曰叔子也王文憲曰夫子本譏三家而魯在其中程子原其始定其罪立萬世之大法遂使二字責有所歸不仁章王文憲曰游氏言仁切程子言禮樂切程子言禮樂之實李氏言禮樂之文合此四說方盡集注用意精深學者冝細觀程子曰仁者天下之正理叔子也語録曰只是泛說不是說仁之體若曰義者天下之正理亦得將如之何語録謂不奈得禮樂何也譬如非善舟者必不奈一舟何非善御者必不奈一車何中心斯須不和不樂則鄙詐之心入之矣外貌斯須不莊不敬則慢易之心入之矣不莊不敬不和不樂便是不仁鄙詐慢易則如禮樂何哉林放弟子傳不載禮殿圖有之禮本集注以文對本字又以質對文字易治也語録滑熟也何文定曰文集有曰禮正在恰好處泝而上之則儉為本㳂而下之則奢為末此語最為分曉流於末之奢固不可然安於本之儉而不求到恰好處亦非聖人本意也夫子舉喪與禮對言者朱子謂禮是禮之吉者喪是禮之凶者故並言之爾范氏以喪祭言者蓋因古有此二語特舉以為凡例耳汙音蛙抔音掊並出禮運夷狄章程子叔子泰山東嶽也在今兗州襲慶府奉符縣為魯國之望曾在登反射下並去聲凡在下上聲下之者去聲觶四升爵輔頰也後去聲凡前後之後上聲後之之後去聲夫子隨疑而答但示後素之證子夏觸類而長因知禮後之說聖人之知非待子夏而後發聖人之意又因子夏而及此爾言此以進子夏也杞夏之後國在今開封府雍丘縣宋殷之後國在今宋州本名應天府古者二王之後各守其先代禮物聖人於夏殷之禮不曰吾能知之而曰吾能言之此蓋定禮樂時語也聖人生知之資其於禮之義理則知之明矣此其所言蓋謂二代制度文為之詳耳雖當時二代之禮亡失將盡而以聖人之資觸類旁通皆能歷歷言之但聖人謹重之意必欲得典籍故舊以證成其書而文獻二者卒不可得故終於從周後人迄不見其成書之盛也其間見於禮記者又多雜以門人經師之說惜哉趙伯循唐儒林傳啖助門人趙匡陸質助卒質與其子異裒録助所為春秋集傳總例請匡損益質纂㑹之號春秋纂例匡字伯循河東人歷洋州刺史質稱為趙夫子集注以犯廟諱舉其字說具春秋纂例宣州有版本朱子載其言於或問而入其要於集注鬱鬯以秬黍合鬱金草釀酒取其香氣暢達魯之郊禘禮記明堂位以為成王之賜上章程子嘗論其非禮近陳氏君舉謂東遷之後諸侯僭禮又據史記謂其時秦祭白畤又據外紀謂魯請郊禘而曰魯之郊禘惠公請之也其說甚辨如此則尤夫子之所深嘆而不忍言也禘之說此章集注二意俱備有為之說者曰知禘之說則不王不禘天子禘諸侯祫大夫士廟數上下各有等差各安其分則天下之治不難矣此亦集注後說之意雖明白易見然非仁孝誠敬之至者亦未易知此也中庸曰明乎郊社之禮禘嘗之義治國其如示諸掌乎章句謂與論語大同小異特記者有詳略王文憲謂論語約而難知中庸詳而易見不若以中庸解論語辭不費而義明履祥按中庸是泛說論語是答或人之問亦恐各是一出勉齊曰禘之說一章理無不明誠無不格只是見得盡做得也盡心路熟後事事自㑹如此祭如在章程子叔子奧古者室中北墉南牖東南隅為户東北隅為室之宧西北隅為屋漏西南隅為奧奧尊者之常居也何謂上二句蓋當時俗諺故王孫賈設問竈陘謂竈穴前隊也尸古者祭必有尸蓋使生人服鬼神之服居鬼神之位使鬼神憑之而饗飲食也竈者老婦之祭或是老婦為尸朱子謂竈尸恐是膳夫為之當時用事何文定曰所謂奧有常尊而非祭之主者蓋五祀四時之祭皆於此乎成禮是其有常尊也然不專主於一而若户若竈若中霤若門若行皆先祭其本所而後設饌迎尸於此是其非祭之主也若竈雖卑賤不尊然在夏時則專主祭竈當夏時而專用事者故曰當時用事或曰用事謂水火烹飪之所謝氏王文憲曰上蔡之說疑有病聖人據理而言豈問其知不知禍不禍也若畏禍而為兩可之辭所以為心術之害者大矣非所以言聖人况此答拒之者亦至初非遜詞鄹解見序說侯本作矦射的之垜也謂候人射中也從厃從矢象形鵠工毒反即告字謂告人以所當中之處也取射禽獸之義故加鳥告本取牛口之梏下之告上則曰告如牛口加梏有謹止之義若上告下則假借去聲餼猶今言生料也本作氣俗加食魯自文公始不視朔文公名興以病不視朔其指告朔通釋指羊盡禮如拜下禮也今拜乎上泰也雖違衆吾從下夫子之從下蓋盡禮耳而衆人反以為諂此章當以此事為證語録曽及之何文定曰諂與敬不同禮施於所當施則為敬禮加於不當加則為諂程子叔子定公問章本注正說也吕氏互說也尹氏重上則略與孟子語意同蓋當時是奉敇注論語故其意主於警君關雎黃文肅曰先生再看或問止此章睢七余反詳見詩集傳玩其辭審其音夫子時所謂關雎蓋合辭意聲音而言之也故集注之末有玩辭審音之說今則辭尚可玩而音不可復聞矣問社古者立社各樹其土之所冝木以為主社土神故古人以土所冝木為主抑因所生木以為主耶刻所冝木以為主耶曰亦因所生木為主耳社壇而不屋刻主則必為屋矣然出征而載社主則何主朱子語録謂古人多用主命如出行大事則以幣帛就廟社請神以往如今魂帛之類耳然不可考履祥按自唐以來社始用石為主其說具唐書張齊賢傳歷言以深責之問社之說諸儒見夫子三辭繁而不殺又因左傳哀公患三桓之侈欲以越伐魯去之卒死於外故謂此必哀公與宰我謀誅三桓故為廋辭以相語所以夫子有成事遂事既往不可諌救之說前則蘇氏後則胡氏皆有是言而集注不取然集注之意亦自足該諸儒之說大抵告君之說與告他人不同如夫子對哀公好學之問乃以顔子不遷怒二過之德告之顔子無爵無位非有可怒過為之事權而獨舉此蓋哀公為人躁妄故借顔子之德以藥哀公之病今其問社宰我乃以使民戰栗告之哀公躁妄豈不生事所以夫子深咎之然此三言亦或當時方言而夫子備舉之也管仲管叔之後故其書多稱我先王器小本注聖賢大學之道是器大樣範局量褊淺規模卑狹是器小形象知大學之格物致知則能有以盡心量之全知大學之誠意正心則能有以全心德之實故局量不褊淺所謂正身修德也知修身齊家以及治國平天下故規模不卑狹所謂致主王道也惟其局量褊淺故不能正身修德惟其規模卑狹故不能致主王道惟其局量褊淺故其規模卑狹三歸說苑止有管仲築三歸之臺别不詳載又漢書三歸雍徹顔師古謂娶三姓女如此則奢僭兼之然此但言其不儉爾未斥其僭蓋諸侯三姓而備九女此則三女而已未為僭也又一說三歸之臺據算家有築臺三歸法蓋方臺也其法上方自相乘凡為若干尺下方又自相乘為若干尺又以上下方相乘為若干尺却以勾股法三分損二為中方之數合上下中方凡幾千尺以高尺統之用積羃法得方臺積尺之數凡幾萬尺謂之三歸法如此則但言其臺榭之盛家臣之多為非儉爾門屏謂之樹爾雅釋宫文也天子外屏諸侯內屏大夫以簾管氏以屏塞門蓋僭諸侯之禮也天子外屏屏設於畢門之外則當寧而立以受諸侯諸公之朝於外朝諸侯設屏於門內則門屏之間謂之寧立於此以受卿大夫士之朝按國語卿之家亦有私朝論語冉子退朝是也管仲為卿於齊以霸而家臣皆具官則亦設屏於門為寧以朝其家臣矣反坫在兩楹之間蓋當賓主兩階之中於堂間斫土石為覆爵之器以示此爵賓主共之蓋兩君燕好之禮也當時管仲當國而齊霸諸侯諸侯之朝齊者必私覿於管氏之家故仲亦設此以燕之也不然則作此虛器自取僭擬何哉禮記臺門而旅樹反坫大夫之僭禮世當作臺門而樹旅反坫蓋為臺門則必有屏樹及旅酬而為坫覆爵也或人以小為儉以奢為禮當時見識議論大率如此程子叔子本深及逺大器本淺小器規矩準繩楊雄法言先知篇云大器猶規矩準繩先自治而後治人者也蓋規矩準繩惟其自盡方圓平直之理故足以為天下之方圓平直若是四者自有喎斜迂曲則何以能治天下之方圓平直哉詭遇說見孟子集注器小而功大者詭遇者也器大則為之範者也器大之功不止此矣何文定曰竊詳管仲器小之論集注局量褊淺規模卑狹二語覺已盡其曲折局量以資質而言乃器小之本根規模以施為而言乃器小之效驗惟其局量之褊淺所以規模之卑狹下文說不能正身修德是指局量褊淺處不能致主王道是指規模卑狹處大凡人惟見其大也而後不肯安於小管仲之所以小者只為不識其大緣他資質本是凡近而又無聖賢之學以充之才雖高而識實陋氣雖鋭而志實卑所以局量容受不得而規模恢拓不開不過成就得些小霸業以上更去不得了夫子以小器斥之可謂一言以蔽之而朱子復明之以兩言而器之所以小者無復餘藴蓋局量褊淺者器小之體規模卑狹者器小之用欲識仲之為器小者觀諸此足矣然亦須將此二語考驗管仲平生方見得此二語說得他著且如仲始與桓公講論治國公辭以已要奢淫恐妨為治為仲者便合就桓公心術上整頓然後事乃可為而仲却謂皆不害霸是他被些才使急於自見惟恐君不見用無以成其功業故曲意深縫至於如此及其後也三歸具官塞門反坫奢僭之事至身自為之與辭上卿之禮全别是又被這些功業動了包藏不住致滿溢而不自知其視正身修德之事反若迂濶而不切於事此非局量褊淺而何又如管仲一時事功其大節目只有尊王攘狄兩事是時周室尚有可為為仲者正當至公血誠輔佐天子棖立紀綱以還西周之舊今乃挾公濟私假尊王之名為圖霸之實至若楚人僭王猾夏此是甚底大罪過乃置之不問却尋得包茅昭王節日責他大意只是要他略服便做收殺在我且自可以伯大抵皆是急於近功淺效若王道則恐其久逺難成判斷不做此非規模卑狹而何而朱子只直指其不知學者緣資禀自是定了若知聖賢大學之道則褊淺者可以變而宏深卑狹者可以擴而高廣蓋量隨識長學進則識長識長則量自充量既充則規模不患於不大且以管仲言論風㫖觀之說得話亦自識道理非全無聞而志識卒於卑陋只就小小窠窟結果了豈非不學之過乎奢而犯禮之事聖人只是答或人儉禮之問非正指小器而言然就這上面看亦可見得器小形見處故程子特指此以曉人而管仲所以為器小者益覺分明此乃程子說得冇功處故朱子曰當深味也而集注又曰雖不明言小器之所以然而其所以小者於此亦可見矣此皆指奢與犯禮而言語樂此夫子正樂之時語也古欒不可見故此章難為言當以孟子條理之說參之翕合也謂合八音而共奏一樂章也從之則條暢之也純如則八音如一聲也徼如則又自各有條理也至於繹如則詠嘆淫佚餘音不絶也喪諸說多謂天喪斯文之喪惟劉侍讀蘇氏作失位去國之喪集注從之此失魯司冦去魯適衛之時歟韶盡美章程子叔子居上不寬為禮不敬臨喪不哀朱子謂如此等語皆急讀去王文憲曰此即反語讀㸃之凡例何以觀之此章結語虛難看蓋人亦須冇本領方可看其分數此是尚有可觀者若舉無其本何以觀之哉是無足觀者一說每事各有大本苟無其本則雖别有小節亦不足觀矣里仁擇屬知處本字上聲安仁則一利仁則二仁者純乎仁故安而行之知者知此仁故利而行之安則已與合一利則尚有彼此亦只在生熟之間耳朱子再三誦此二句以為解中未有及此者因嘆此公見識之高無私心好惡當於理程子所謂得其公正叔子也通釋舉前後所言微有所疑王文憲曰朱子此章論好惡由心而達之事故先無私而後當理後篇論忠清因事以原其心故先當理而後無私程子論陽復則曰仁者天下之公論禮樂則曰仁者天下之正理此章則曰得其公正無私公也體也當理正也用也開說了方可合說無惡集注必無為惡之事平實通釋惡念何自而生緊密不以其道得之二句於前句冠一苟字後句加一雖字文義即易見謂不當得而得之或問論不以其道得富貴通釋論不以其道得貧賤何王二公令人兼看去王文憲並作上聲然自去去聲去之上聲又已違之去聲驅而去之上聲觀過何文定曰朱子謂此篇言仁有淺深此章却只是說慈愛之仁蓋仁主於愛君子之過雖是失於厚而過於愛然畢竟不失為仁但是仁中之過耳若小人失之薄而流於忍却正與仁相反此處察見君子小人之仁不仁尤更分曉故曰觀過斯知仁矣然意此等處夫子當時必冇所因而發斯知仁上文各於其黨則斯知仁不是偏結之語謂於此亦可見仁之存否也故集注以尹氏之說補之程子叔子後漢吳祐後漢書吳祐字季英遷膠東相政惟仁簡嗇夫孫性私賦民錢五百市單衣進其父父得而怒曰有君如是何忍欺之促歸伏罪性慙懼詣閣持衣自首祐屏左右問其故性具說父言祐曰掾以親故受汗辱之名所謂觀過斯知仁者蓋謂嗇夫受賕固是過然為欲衣其父而此又以父言請罪於斯可以知其仁矣掾屬吏也音緣去聲蓋謂官之屬猶衣之緣也嗇夫漢時鄉官主督租賦者死可所重在聞道非必夕死雖夕死亦可耳然夕死尚可其他可知程子上條叔子下條伯子心欲求道此志於道不如第七篇志於道重故集注止言心欲求道識趣識見志趣也志於道而猶以惡衣食為恥只可責志程子叔子何足聖人語平集注語峻蓋切於警學者於天下謂於天下之事也比必二反當作毗志反如比周比義射者比比其反皆毗志反如比死者比化者皆必二反朱子嘗因學者之問欲改未及放利章程子叔子禮讓謂恭敬辭遜之心也故謂禮之實下文禮字乃禮文制度品節之詳此章朱子或問作三句第二句至國字歇無位章程子叔子一以貫之朱子曰一字重讀用各不同此句要看即後句所謂萬殊也體之一即後注所云一本也昔嘗親受文定何子之語曰此章要實見得是理是何物文公好說箇恰好處理只是恰好處此便是中便是至善自古聖賢相傳只是這箇天下萬事萬物各各不同而就每事每物中又自各有箇好處故事理雖不同到得恰好處則一此所謂萬殊而一本然其一本者非有形象在一處只是一箇恰好底道理在事事物物之中此所謂一本而萬殊曾子於其用處蓋已隨事精察而力行之精察知之力行行之曾子工夫如此故夫子告之以一貫其他學者豈可驟語以此昔者朱子為學之初務為儱侗宏闊後見延平李文靖皆以為不然曰理不患其不一所難者分殊耳朱子於是縷析毫差文理密察卒至體用渾圓故朱子亦嘗曰而今不是一本處難認乃是萬殊處難認真積力久謂真實積纍功力之久也出荀子子出此篇曾子門人所記故稱子出門人或曾子門人或孔門諸人也盡已之謂忠推己之謂恕此程叔子語乃學者忠恕之正訓曽子借此以體一貫使學者知用力之方耳但一貫以道言忠恕以心言夫子之心即道故自一以貫之學者以心體道故曰忠恕蓋必盡己之心以體道而推己之心以處物使各合於道也讀此章者且須看此分明夫子之一理至推矣此以天道形容夫子之一貫一即至誠無息故忠可以名之貫即萬物各得其所故恕可以名之此一貫之所以為忠恕也蓋至誠無息者至可見矣至誠無息者夫子之忠也所以為一也萬物各得者夫子之恕也所以為貫也中心為忠如心為恕此禮疏文當考程子曰凡三條首條伯子語後又二條叔子語言忠恕者凡三節伯子忠恕一以貫之止大本達道此夫子之忠恕叔子天命條此造化之忠恕違道不逺二條此學者之忠恕中庸但以忠恕為近道爾而曾子乃謂夫子之道忠恕故用再三分辨然夫子不待忠恕天道亦無忠恕之名皆借此以形容耳以己及物至是也此本分仁恕而言集注統取入忠恕一以貫之此下方正說此章之意忠者天道中庸曰誠者天之道也誠之者人之道也朱子至誠無息之說即此意恕者人道謂體當人情無不曲中也朱子泛應曲當萬物各得即此意黃文肅曰聖人之忠恕天道也學者之忠恕人道也如何又說忠者天道恕者人道以聖人比學者聖人之忠是天之天聖人之恕是天之人學者之忠是人之天學者之恕是人之人忠者無妄真實無妄也恕者行乎忠即天下雷行物與無妄下文所謂乾道變化各正性命也大本達道中庸首章動以天程子易無妄傳文也聖人之忠恕是自然學者則力為也喻義章程子叔子愛日楊子曰不可得而久者事親之謂也故孝子愛日集注愛日之誠四字章㫖方見深切然此意具在不可不知之中語録常記憶父母之年喜其壽而懼其衷惟恐舉之不及是以孝敬之心日常切訥敏王文憲曰此矯輕警惰工夫子游曰何文定曰君臣朋友皆以義合故事君三諫不聼則有去義導友忠告不可則有止義過是若更强聒不置則是失之頻數取辱取疏乃其勢之必至然君臣朋友雖曰以義合而皆大倫之一其義甚重若未至於數而逆憚辱與疏而豫止焉則為不盡君臣朋友之義而薄亦甚矣尤非聖人之所許也按子游之言多有偏弊如此章者必得文定之說而後備程子伯子論語集注考證卷二
