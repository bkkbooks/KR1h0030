body:
  text: 欽定四庫全書論語集注考證卷七元金履祥撰子路先之先當作去聲謂率先之也語録取張子云以身為之倡勞之舊作去聲朱子從張子身不愛其勞之説而集注收蘇氏之解故讀作如字程子伯子先有司先平聲謂凡衆事且任有司為之於前也二章相連而二字不同子路以勇臨事夫子恐其易於責人故勉其自己率先之則先當作去聲仲弓以敬治煩夫子恐其失於叢委故勉其使人先為之則先當作平聲第二章蘇氏亦有説或問牧之通釋有取焉當兼看程子伯子推此義王文憲曰一蔽於小其害或至於此而不難故程子極言之以警學者范氏曰不先有司至天下乎仲弓可使南面蓋於此問得之季氏其時四分公室而有其二是有魯國之半又専魯國之權則其宰亦未易為然其為季氏宰不見於傳記豈不久而去之耶出公輒蒯瞶之子孟子作孝公魯哀公三十年孔子自楚反乎衛此據孔子世家又按年表陳楚世家楚昭卒之年魯哀公之六年也孔子在陳則是自楚反陳非反衛也按衛世家則齊弒悼公之年哀之十年也孔子始自陳至衛非自楚反也孔子在陳曰盍歸乎來蓋思魯之狂士則其自陳至衛乃過衛耳而輒致公養之禮遂有待子為政之意焉及間正名之説非其所樂故孔子尋去之而歸魯若曰自楚反而即在衛則是不可久而久也故皇極經世於丙辰書孔子自陳至衛丁巳書自衛反魯則孔子久速之可於此見矣程子伯子蒯瞶衛靈公太子南子靈公夫人宋女也公子郢靈公庶子按春秋左氏傳魯定公十四年秋齊侯宋公會於洮初宋公子朝通於南子衛靈公為夫人南子召宋朝於宋至是太子蒯瞶如會獻盂於齊過宋野野人歌之曰既定爾婁豬盍歸吾艾豭太子羞之謂戲陽速曰從我而朝少君我顧乃殺之速曰諾乃朝夫人大子三顧速不進夫人見其色啼而走曰蒯瞶將殺余公執其手以登臺太子奔宋盡遂其黨太子告人曰戲陽速禍余速曰太子無道使余殺其母不許將戝於余若殺夫人將以余説是故許而弗為魯哀公二年衛侯遊於郊子南僕公曰余無子將立女不對他日又謂之對曰郢不足以辱社稷君夫人在堂三揖在下君命祗辱夏衛靈公卒夫人曰命公子郢為太子君命也對曰郢異於他子且君沒於吾手若冇之郢必聞之且亡人之子輒在乃立輒晉趙鞅納衛太子於戚使太子絻八人衰絰偽自衛逆者告於門哭而入遂居之五年趙鞅伐衛初孔文子取蒯瞶之姊伯姬生悝文子死其豎渾良夫通於內蒯瞶在戚孔姬使良夫之焉蒯瞶與之言曰苟使我入獲國服冕乘軒三死無與與之盟為請於伯姬十五年閏月良夫與蒯瞶入舍於孔氏外圃昏二人蒙衣而乘孔氏之老欒寧問之稱姻妾以入伯姬氏伯姬杖戈蒯瞶與五人介迫孔悝於厠強盟之遂劫以登臺欒寧使告季路季路將入遇子羔出曰弗及不踐其難季路曰食焉不避其難入曰太子焉用孔悝雖殺之必或繼之且曰燔臺半必舍孔叔大子下石乞盂黶敵子路以戈擊之斷纓子路曰君子死冠不免結纓而死孔悝立蒯瞶是為莊公輒奔魯是為出公復死於越莊公遣孔悝載伯姬奔宋哀十七年晉再伐衛衛人出莊公已氏殺之於戎州名不正至民無所措手足名不正言不順即綱常不立萬日隳壞夫子又逐節發明尤為明盡名不正則言不順如輒以祖為禰使國人戴已而為君使國人拒父而謂之冦何以號令於國是名不正則言不順也凡不可説者必不可行則事何可成事有條理則有禮樂事得其序則為禮事得其和則為樂事既不成則何以能有禮樂無禮則無序而施之也乖謬無樂則無和而行之也忿戾乖謬忿戾則刑罰安能中理刑罰不中理則民難於避就推衛國之類言之則逆父者無罪循分者有刑民何所措手足此段専為衛發而所該甚廣君子名之決是可言言之決是可行君子發言豈可為苟且之論苟且之論一行即名不正言不順而萬事不成矣按衛君待子而為政則是輒欲用孔子之久而孔子蓋未之從也曰必也正名乎是明輒之拒父爭國為不正也考之孟子公養之説是夫子常居於衛受其餼廩之供矣其留於衛何也夫子未嘗絶人於善彼其知尊夫子是猶有人心也安知其不可正乎考之前篇夷齊之説則輒惟當知有父子之倫而不可拒父然衛國臣民又當知有父子之義而不可以立蒯瞶在輒則當從蒯瞶在衛則當立公子郢使輒而果用孔子孔子必先以人倫化誘之可則行不可則去耳夫子之留於衛亦是見此一事大害名義或可借是正之亦轉移世道之一機也而卒不果惜哉胡氏之論蓋伊尹之事夫子所處想又從容於此文公謂聖人行權亦有非常人所可測者履祥初疑公子郢辭國遂釀成衛國之亂亦賢者之過間嘗考之郢既支庶而外蒯內輒皆必爭者公欲立郢獨語之於床第之間此郢之所以辭也觀其言曰君夫人在堂三揖在下君命祗辱則是謂靈公當與卿大夫命之於朝即名正言順亂源窒矣此亦夫子正名之説也而靈公不悟卒無明命及公沒夫人立之又辭此尤郢之見幾也郢立於夫人之手即制於南子而事皆不可為矣况正犯蒯瞶之所必爭乎吁此郢之所以為賢與子路事輒不去卒死其難語録或疑子路仕衛孔子何以不痛責之按正名之説野哉之斥夫子不為不痛責之矣又按子路初仕於衛為蒲宰則公臣也其後蒯瞶之亂子路為孔悝之宰則私臣也故子路之死為救孔悝之難爾學稼所貴學於聖人者以大學明德新民之道修已治人之方也而樊須以學稼圃為問故夫子以不如老農老圃拒之責之至矣而又以小人名之繼以大人之事言之可謂明盡然觀章末四方之民至焉用稼之語則樊須所欲學蓋欲如許行為神農之言者孟子闢許行章又此章之注疏也農圃同一事秦所謂種樹之書漢所謂農家者流是也復扶又反誦詩章程子未詳魯衛孔子歎之此歎當在去魯適衛之時似有猶吾大夫之意然魯為禮義之國素賢於衛夫子此歎又似歎魯公子荆春秋釋名即公南楚見襄二十九昭二十年家語又有荆公子不知為誰當考粗上聲王文憲作平聲纍並去聲制田里薄賦斂此富之之實事也制田則畫井授田一夫百畞以出穀粟而養其口制里則在田在邑五畞之宅樹之以桑以出布帛而養其體與凡市㕓之制薄賦則省起兵役薄斂則不多征稅立學校明禮義此教之之實事也古者二十五家為閭而有孰五百家為黨而有庠遂則有序國則有學教之禮以制心使之悉由於規矩準繩之中而不肆教之義以制事使之悉由于當行之方而不越三事庶富教也漢之文明文孝文皇帝也文帝之時煙火萬里可謂庶矣陳陳相因賜民田租可謂富矣明孝明皇帝也唐之太宗太宗貞觀四年米斗三錢行旅不齎糧取給道路可謂庶富矣西京前漢都長安後漢都洛陽故謂長安西京後世稱為西漢明帝尊師重傅帝自為太子時受尚書于桓榮及即位猶尊以師禮幸太常府親自執業胡氏又譏桓榮授經専門章句不知大學之道使其君德業如是而已臨雍拜老永平二年行養老禮遣使者安車迎三老五更天子迎於門屏交禮至階天子揖如禮親袒割牲饋酳宗戚子弟莫不受學明帝崇尚儒學自王太子諸侯王及大臣子弟功臣子孫莫不受經又為外戚樊氏郭氏陰氏馬氏諸子立學於南宫置五經師自期門羽林之士悉令通孝經章句太宗大召名儒增廣生員太宗大召天下名儒為學官增築學舍千二百間增學生滿三千二百六十員自屯營飛騎亦給博士使授以經二君當言三君而止言二君者蓋主立學之君而言明帝太宗也不言文帝蓋文帝雖未能立教而言行無過又公卿多舊功臣二君知立教矣而明帝苛察急切已有可議太宗兄弟袵席之間慚德為多故獨言二君其能然乎期月興衰撥亂三年治定功成史記孔子世家善人章程子伯子也見文集對䇿中語漢自高惠至於文景高祖自漢王即帝位共十二年孝惠七年吕后専政八年孝文二十三年孝景十六年庶乎近之諸君皆天資朴厚中間吕氏雖専政史亦稱其不出房闥而天下晏然雖未免有祿産之變孝景又有七國之禍其黎民醇厚幾致刑措乃在孝文之世孝景遵業耳故但曰庶乎近之然本文善人已是僅可而文景之證又曰庶乎則善人功效已不如聖人之神速而文景之事又未可皆為善人若高帝文帝可謂善人而在位皆不久六七十年之間駁雜處多也如有章程子一條伯子二條兼取二子季氏之私朝大夫之家朝其家臣亦謂之朝故左氏伯有朝者至布路而反國語公父文伯之母亦有外朝內朝之説或問引之下文私室當作私朝夫子為不知者本檀弓篇語謂若不聞知者而微詞以正之或問已謂此説傷於巧而集注復用之魏徴獻陵之對唐太宗貞觀十年葬文德皇后於昭陵帝念后不已於葬中作層觀以望昭陵嘗引魏徴同登使視之徴熟視之曰臣昏眊不能見上指示之徴曰臣以為陛下望獻陵若昭陵則臣固見之矣上為毁觀獻陵高祖陵也王文憲曰夫子誠據禮直言之隱然自足以正名分抑季氏教冉有矣以魏徴事比恐未安幾期也詩曰如幾如式詩楚􅗔篇如幾如式注訓期且引左氏傳昭公薨子家易幾而哭為證故皆訓期然乃時期之期非期必之期也通釋皆訓為近以言不可若是為句則四幾字皆訓近語意為通定公問人之嘗言有何一句即可以致興喪者夫子答之曰言不可若是蓋古今興喪亦多端不可一句限定然亦有一言近之者如人之言曰云云豈不近於一言而興喪邪陳與可曰依通釋訓近而仍舊作一句謂言不可如此責近效言不可如此必近禍亦通因此言而知則必興喪不在一言而在君心於此一言如何爾故前一節舉人之言矣而必曰如知後一節舉人之言矣而必曰如其善不善大要興喪固多端本原並在君心所以分夫子此章辭不迫切而語意周密識微謝氏此説則幾字又有幾微之意謂言不可以若是然其幾微之處亦有一言足為興喪之原莒父缺程子伯子恭敬忠居處易肆而容常恭執事在外而中常敬與人接物而心無不實其內外一致如此之夷狄不可棄縱至夷狄亦不可棄則平時平居可知此句總上三事無時無處不如此則人欲無所容心德全而天理流行矣程子伯子子貢問士夫子平日許子貢以從政他書所載子貢亦每以使事自許而此章夫子所答但以使事為士之上而子貢每問又輒每下與平日不同恐此章之問乃是子貢方人之時大率論士材器之大小又論語從政多説大夫此章既問士又問今之從政則又恐是問士與今大夫之材品則此士非以學言是以職言者子貢不問可以為大夫之才而問今之大夫則其問亦下故夫子以何足數答之此章集注雖明而或問又收朝氏之説又兼連下章之意今附此以待後之君子程子叔子謹厚孟子中道狂狷鄉願前後通為一章而此章乃突入謹厚二字疑是謹願二字蓋為原人也然歷考諸本及語録又皆曰謹厚後再思之若説鄉原之謹願則又賊德矣此注自為也二字生來自狂狷二字反來謹是不狂者厚是不狷者此亦自是善人但欠志節耳初注正作善人後改從謹厚孔子既不得中行而與之下此一等何不取謹厚不狂不狷之人而獨取夫狂狷之人蓋謹厚之人固是善人但據其資質止於此上不能進於中道亦不肯進於中道下不期於鄉原而不覺自為鄉原矣因其志節而激厲裁抑之以進於道注內二句最備激厲其不及裁抑其太過即進於中道矣朱子曰立志有守狂狷之長行不掩知未及狂狷之病兼其長去其病可至中行矣巫醫國禮司巫中士醫師上士注雖賤役蓋執技以事上者此章南人之言重在巫醫夫子引之重在學者集注發明夫子之意其義未詳語録曰不占而已矣猶云只是不讀易好惡章一鄉皆稱原人衆皆悅之此鄉人皆好之者也匡章通國皆稱不孝焉此鄉人皆惡之者也然鄉原之人惟孔孟而後知其賊德章子不孝惟孟子惟能辨其設心甚矣知人之難也程子曰質之近仁伯子也此資質之近仁耳有此質而能加之以學則仁矣曾氏曰剛必無欲毅能力行木無令色訥無巧言子路所不足子路勇果氣象行行於切切偲偲怡怡皆所不足故夫子以此告之又分言其用凡重言皆形容氣象胡氏之説體貼深密學者所宜體認七年王文憲曰有聖人作用有賢人作用有善人作用善人只就天資上做出無學以充之所以久速不同教使其心志習於孝弟忠信親上死長之義耳目習於金鼓車旗身習於甲胄手足習於弓矢干戈坐作馳騁之節即此二章觀之黃氏謂言兵之最精者莫如聖人程子叔子憲問此篇疑原憲所記篇首不姓不字但書名問蓋憲記所自問而併記他語也狷介王文憲曰狷是有執守介是有分辨語録憲是介狷者傳中説介處亦多按弟子傳中載此二章之外止載與子貢辨病貧事已可見其狷介其他書傳中事亦多克伐章章首無起語蓋冒上文憲問字一時並記二問難集注作難能語録一作到此遏之極難程子一條叔子二條未詳不能再問當再問仁和順積中英華發外出樂記澆奡古字通寒浞殺羿因其室而生澆處於過疆圉縱欲夏遺臣靡滅浞立少康少康滅澆於過事見左傳楚詞諸書俱不得其死句俗讀連然字者非十一篇言由於未死之前故曰不得其死然期辭也此章迷二人於既死之後故止曰不得其死斷辭也何文定王文憲以然字唤下句便見尚德之意不答以然字屬下意自分明不待於答俟其出而稱美之以示門人禹平水土暨稷播種禹曰暨稷播奏庶艱食濬獻澮此皆躬稼事為命章夫子言鄭國之事此萬世為辭令之條例世叔古語世字與太字通用如衛太叔亦作世叔如太子亦稱世子也按襄公三十一年左氏傳曰子産從政擇能而使之馮簡子能斷大事子太叔美秀而文公孫揮能知四國之為辨於其大夫之族姓班位貴賤能否而又善為辭令禆諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子産乃問四國之為於子羽且使多為辭令與禆諶乘以適野使謀可否而告馮簡子使斷之授子太叔使行之以應對賓客是以鮮有敗事按左氏所記與此章相先後當以夫子之言為序但左氏首以為子産擇能者得之今按左氏前後應對諸侯多出子産昔者取印堇父於秦太叔為令正不獲也更幣從子産而後獲之以此知子産能用三子之長雖有三子無子産不可也子産之政不專於寬子産謂子太叔曰惟有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之則多死馬故寬難又如使上下有服則鄭人謂取我衣冠而禇之使舊疇有封洫則謂取我田疇而伍之又如鑄刑書尤為當時所議然其要歸於愛民而已故夫子以惠稱之昭二十年子産卒仲尼聞之出涕曰古之遺愛也舉其重而言夫子稱子産君子之道四惠居其一耳論其始終之事而又特以惠為言蓋舉其重而言之也孟子又謂其惠而不知為政此又特舉一事而言以示後人為政之規大抵孟子大山巖巖之氣象自非王佐之才皆孟子所不足如論管仲亦然問子西夫子在時子西未有白公之敗而其遜國平亂改紀其政事多可取當時賢士大犬稱之故或者舉之與管仲子産同問惟夫子不取爾遜國立昭王改紀其政昭二十六年楚平卒令尹子常欲立子西曰太子壬弱其母非嫡王子建實聘之子西長而好善立長則順建善則治子西怒曰是亂國而惡君王我受其名賂吾以天下滋不從也楚國何為乃立昭王定四年吳師入郢昭王出奔子西為王輿服以保路國於脾泄聞王所在而後從王定六年子西遷郢於鄀而改紀其政以定楚國昭王欲用孔子又沮止之此史記孔子世家詳見序説其後卒召白公以致禍亂哀十六年傳曰楚太子建遇讒在鄭適晉謀襲鄭鄭人殺之其子勝在吳子西曰吾聞勝也信而勇欲召之葉公以為不可子西召之使為白公請伐鄭許之未起師晉人伐鄭楚救之白公遂作亂殺子西而劫惠王子西以袂掩面而死葉公與國人攻白公國寧此事在孔子卒之後故集注曰其後又曰其人可知蓋引其終以證夫子之言也伯氏齊大夫駢邑地名人名與地名他書無所見然玩本文又似伯氏駢是人姓名邑三百是食邑之數蓋春秋時以駢為名者多有之如王子伯駢之類是也又如公與之邑六十與之邑三十蓋卿大夫受采邑之數古者四井為邑則三十二家食邑者收其公田之租一邑公田則四百畞邑三百公田十二萬畞當今五萬畞矣其户數則九千六百家所謂萬家之邑也傳稱城小穀以封管仲又曰桓公置管仲於榖無駢邑之名威公奪伯氏之邑以與管仲玩本文似管仲奪伯氏之邑而伯氏雖窮不怨者故古注謂伯氏食邑三百家管仲奪之使飯疏食沒齒無怨言而説者多引諸葛孔明竄廖立李平無怨為證注引荀子與之書社三百而富人莫之敢拒以此知是威公奪與之然既公奪與之則安得但云奪又云無怨言蓋古者天下封建國立世家各已久有其地如襄王賜晉文陽樊溫原之田晉文猶以兵取之則奪之之説疑亦此類而荀卿云富人莫之敢拒是管仲之功有以服其心斂手而歸邑也孟公綽本篇兩見史記曰孔子之所嚴事於魯孟公綽臧武仲之知臧孫氏文仲之孫宣叔之子名紇襄二十二年臧武仲如晉雨過御叔御叔曰焉用聖人注武仲多知時人謂之聖襄二十三年臧紇奔齊仲尼曰知之難也有臧武仲之知而不容於魯國作不順而施不恕也卞莊子之勇新序事見第八卷或問已引之又荀子曰齊人伐魯忘卞莊子不敢過卞又史記陳軫傳曰卞莊子欲刺虎館豎子止之曰兩虎方且食牛食甘必爭爭則必鬬鬬則大者傷小者死從而刺之卞莊子從之一舉果有雙虎之功館豎子戰國策作管與四子皆即子路耳目所接以示之臧武仲接聞既近公綽魯孟氏之賢子路卞人莊子其鄉大夫冉求其同門之友皆近其可學以兼之然要又在文之以禮樂故集注特表程伯子曰臧武仲之知非正也若文之以禮樂則無不正矣知非正見上注程子一條勇也以上伯子須是以下叔子二條三條伯子胡氏曰今之成人以下乃子路之言此段語意明是子路之言朱子以夫子無再教之辭故以胡氏之説為第二説語録前後皆從胡氏之説且謂子路退而自言所以無再教之辭也今當從胡氏公孫枝按左傳及注當從公叔發集注或傳寫之誤臧武仲以防求為後於魯襄二十三年傳曰季武子無適子公鉏長而愛悼子臧紇為立之公鉏後為公左宰孟孫惡臧孫季孫愛之孟莊子疾其御豐點謂公鉏立羯請讐臧氏孟孫卒公鉏立羯孟氏閉門告於李孫曰臧氏將為亂不使我葬孟氏將辟藉除於臧氏臧孫使正夫助之除於東門甲從已而視之孟氏又告季孫怒命攻臧氏臧紇斬鹿門之關以出奔邾使告其適長兄臧賈且致大蔡焉曰紇之罪不及不祀子以大蔡納請賈使弟為以納請遂自為也臧孫如防使來告曰紇非能害也知不足也非敢私請苟守先祀無廢二勳敢不辟邑乃立臧為臧紇致防而奔齊威公伐楚仗義執言不由詭道春秋傳僖四年齊侯以諸侯之師侵蔡蔡潰遂伐楚曰爾貢包茅不入寡人是徵昭王南征而不復寡人是問師進次於陘楚子使屈完如師退次於召陵陳諸侯之師與屈完乘而觀之屈完及諸侯盟文公伐衛以致楚陰謀以取勝初晉文公之為公子出亡過衛不禮焉及齊齊桓公妻之及曹曹亦不禮焉及宋宋襄公贈之以馬二十乘及楚子玉請殺之楚子送諸秦僖公二十四年秦伯納之二十六年宋以其善於晉侯也叛楚即晉楚令尹子玉伐宋圍緡伐齊取穀申叔侯戌之二十七年楚子及諸侯圍宋宋如晉告急狐偃曰楚始得曹而新昏於衛若伐曹衛楚必救之則齊宋免矣二十八年晉侯將伐曹假道於衛衛弗許自南河濟侵曹伐衛衛侯出晉師入曹宋人如晉師告急晉執曹伯分曹衛之田以畀宋人子玉使宛春告晉師曰請復衛侯而封曹臣亦釋宋之圍晉侯拘宛春以怒楚私許復曹衛之田曹衛告絶於楚子玉怒從晉師晉師退三舍辟之以報楚楚衆欲止子玉不可晉師次於城濮及戰狐毛設二斾而退之欒枝使輿曵柴而偽遁楚師馳之晉人以中軍公族橫擊之楚師敗績出穀戍釋宋圍一戰而伯語録吕伯恭博議論此一段甚好雖太巧節節看來都是博議曰楚與宋皆有德於文公者兼施則當兼報豈當有所偏助文公之心則以宋弱國也因前日之德而親我楚強國也挾前日之德而陵我今楚伐宋為吾計者固當助宋以厚其親我之心挫楚以奪其陵我之氣且吾方圖伯業坐視楚之橫行而不較則伯權在楚矣然遽加兵於楚則背惠食言其誰與我於是不攻楚而攻楚之所必救伐曹伐衛皆楚親䁥外無背楚之名而內有怒楚之實使兵端發於楚待其先動而後應之雖破楚而無背惠之名為謀可謂譎矣此猶非其譎之尤者文公名雖救宋而實在於勝楚時天下之強國惟晉與楚必先摧楚之鋒然後可以専伯於天下楚子固倦於兵其狼戾而好戰者獨子玉耳不深激子玉之怒則將知難而退雌雄不決矣於是執曹伯分曹衛之由所以深激其怒而趣之戰也伐曹衛所以救宋也今楚果以愛曹衛之故將釋宋圍是適投吾欲也我復曹衛彼釋宋圍何為不許之乎非惟不許又執宛春以辱之又私許復曹衛以挑之惟恐激而不怒怒而不戰是其心果在於勝楚而不在於救宋也人知文公救宋而止爾孰知其譎之尤一至於此乎至於退舍則其譎又深矣楚本無競晉之心文公多方以怒之迫而使戰雖子玉不勝一朝之忿然上則楚子下則士卒皆不欲也乃退舍以避之避之毋乃使子玉得假以為班師之名乎文公豈不慮此蓋已料子玉於度內明知子玉內懷蒍賈之語急於立功以刷耻見吾之退必謂脆敵功業易取無若此時雖退十舍猶將來追況三舍乎文公之所以肯退者先有以必楚之不退也心欲戰而形若不欲戰用以報德用以驕敵用以感諸侯之心用以作三軍之憤一世為其所眩惑信矣文公之善譎也文公之譎夫豈一端而已哉三日而去原欲自附於王者之師然毁丘墓以脅曹果王者之師耶利小則用信利大則用譎三罪而民服欲自附於王者之刑矣然舍魏犨而屈法果王者之刑耶疏者則用法愛者則用私吾是以知文公之譎也統而論之大則如託狩以召王小則如曵柴以誤敵未易遍舉要不能出一譎之外聖人之言可畏也履祥按此章夫子特説桓文以較其正譎桓公正處固多亦未有全不出於譎者桓公之譎易見而文公之譎善譎耳夫子首言晉文後言齊桓蓋因文以言桓桓公特比晉文為正爾桓公殺公子糾章事在左傳莊公九年集注節入語極簡要王文憲謂有前賢未發之論履祥按程子之説據漢史淮南王傳薄昭言桓公殺弟以安國大約以兄弟為斷然荀子又有威公殺兄之説杜氏韋昭之説亦云但二者曲直不待爭兄弟而後明顧子糾名義已失不得為正方齊之將亂也鮑叔奉小白奔莒及襄公被弒子糾固在內也所當正君赴難明義討賊而乃奔魯固已忘讐棄國矣其奔魯也若能乞師復讐猶之可也乃雍糾殺無知內難已定方圓再入既而桓公先入請國人葬襄公正位君齊矣糾何為者而管召方輔之用師以伐國是直以亡公子抗齊君耳前無正君討賊之義後有抗君爭國之非則是仲之輔糾為不義其罪已自可誅桓公不誅而用之則仲安得而讐桓乎文定何子謂猶今之叛者既赦自無可死之理此夫子所以不責其死也或曰然則夫子於子路子貢之問不明言其所以是非何也曰聖人之言正如造化無迹而功用自見要在學者思而得之况其事辭曲盡見於春秋書公伐齊納糾伐而納之內不受之辭也糾不稱子不宜立也書齊小白入於齊係之齊宜立也齊人取子糾殺之稱齊人國討也稱子譏齊也書取弱魯也謂桓公殺之為巳甚矣此則程子吕成公亦嘗言其略矣然則管仲將得為仁乎曰夫子許管仲以有仁人之功耳然亦二子之失問也二子以事問而又謂管仲之非仁故夫子以仁之事功答之使二子之發問也而曰管仲仁乎則夫子答之又必有異矣陳牧軒曰以私情言之管仲若負子糾以公義言之管仲則不當讐威公九春秋傳作糾僖二十六年展喜謂齊孝公曰桓公是以糾合諸侯詳見或問又按此穀梁氏之説所由起然則齊桓亦不無兵車之合而語云不以兵車者按師能左右之曰以此云不以兵車雖有兵車而未嘗用之大戰也故國語曰諸侯甲不解纍兵不解翳韜無弓服無矢胡氏傳亦曰自山戎以前二十餘年未嘗命大夫為主將未嘗興大衆出侵伐其後惟召陵之師責以大義而楚自服兵師雖衆桓公制之以律而不暴楚人請盟桓公接之以禮而不驕此之謂也如其仁管仲雖未得為仁而利澤及人則有仁之功矣禮記所謂與仁同功也夫子傷周室之衰諸夏之弱夷狄之盛而許管仲之仁此聖人衰世之意也程子叔子則為之也難東漢書引此句作則其為之也難陳成子弒簡公春秋傳哀十四年夏四月齊陳恆執其君置於舒州六月甲午弒其君於舒州孔丘三日齊而請伐齊三公曰魯為齊弱久矣子之伐之將若之何對曰陳恆弒其君民之不與者半以魯之衆加齊之半可克也公曰子告季孫孔子辭退而告人曰吾以從大夫之後也故不敢不言按左氏所載當以論語為正程子叔子胡氏曰此段補程子為人章程子曰二段並叔子文公語録曰前段是低底為人後段是好底為人前為人欲見知於人而已後為人却真要為人然不先自已做功夫非惟為那人不得和已也喪了孔子居衛主蘧伯玉家事出史記見序説莊周稱出莊子則陽篇曰蘧伯玉行年六十而六十化未嘗不始於是之而卒詘之以非也未知今之所謂是之非五十九非也又蘧伯玉年五十而知四十九年非此句雜出淮南子書中以智為先出第九篇此章凡四見一不患人之不已知患不知人也二不患莫已知求為可知也四君子病無能焉不病人之不已知也以德報怨見老子恩始章然此語亦出表記觀此章之答則知表記以為夫子之言者蓋失其傳也或因事而發其言各有所當歟故朱子語録亦取其寬身之説不怨天此章兩知字相應但二天字似不同上意方言不得於天而不怨天下文又説知我者其天乎豈前是未定之天後是已定之天豈前是氣數之天後是義理之天而義理感通之妙終有轉移氣化之理歟及細玩集注中却只以理推曰深味其語意則見其中自有人不及知而天獨知之之妙蓋聖人只自以理知之王文憲曰於事上見得理透便是上達天理與我默契便是天知程子一叔子二伯子三兼取二子子服孟獻子之後別為子服氏歷惠伯昭伯以至景伯命也或問謂此使子路墮三都出藏甲之時賢者避世賢者自作一讀其次是指避世之次程子伯子七人注説謂長沮桀溺丈人晨門荷簣儀封人接輿集注取李氏之説石門趙善譽輿地考曰在今東平之境擊磬於衛磬編磬也以玉為之按此章語録憂樂之説云是一大題目而未嘗説破履祥謂聖人之心體用全備未嘗忘天下以為樂亦未嘗出已位以為憂但自荷簣者觀之則以為冇心爾聖人之心如明鑑物自畢照荷簣之心如反鑑不復照物惟其不復照物故反以照物之鑑為有心爾集注聖人心同天地一段最宜玩味硜硜此時夫子擊磬必是聲堅重而節數故有有心之譏以衣涉水曰厲衣謂裏衣也古人不裸涉水及跨以上則不脫裏衣而涉攝如攝齊之攝謂以兩手揭衣趨也所謂蹇裳也諒陰按禮當作梁暗天子居喪之次也大夫士居倚廬謂於中門之外東牆下倚木為廬諸侯加圍障天子則又加梁楣故名梁暗集注不載此説或問略及言君薨與上下文不相應按此章當從禮記曰子張問曰云云孔子曰古者天子崩王世子聽於冡宰三年家語尤詳古者天子崩則世子委政於冡宰三年成湯既沒太甲聽於伊尹武王既喪成王聽於周公其義一也禮達而分定禮運語修已以敬上修己字輕敬字重下文修己字重敬在內上一句已該下二句下修己二字則上修己以敬一句程子曰未詳夫子懲子路之失以示工夫之難盡程子推敬字之極以見功用之無窮夫敬之功用固大然非一人獨敬便能如此感應亦惟上下一於恭敬則充積薰蒸天地自位萬物自育氣無不和四靈何有不至此即禮運篇所謂體信達順之道也此當參考禮運上文又曰聰明睿知皆由此出夫敬又非塊然自守而自能安人及物也蓋惟敬則私欲不作心體日明所聞無所溺所見無所蔽睿聖通微智燭日廣所以事事處其當物物得其情則百姓人物無不安者且可以此事天饗帝况在人物有不可格者乎語録曰體信是忠達順是恕體信是無一毫之偽逹順是發而皆中節無一物不得其所原壤事見檀弓責其喪歌則過大而當絶責其夷俟則因小以責大非止為夷踞也闕黨童子或問引家語恐是叔仲會按叔仲會魯人字子期少孔子五十嵗與孔琁年相比二孺子俱執筆迭侍於夫子孟武伯見而問曰此二孺子之幼也於學豈能識於壯哉孔子曰然少成則若性也習慣則自然也論語集注考證卷七
