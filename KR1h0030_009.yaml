body:
  text: 欽定四庫全書論語集註攷證卷八元金履祥撰衛靈公去衛適陳按孔子凡三去衛定公十四年居衛十月去衛將適陳過匡為匡人所圍得去適蒲月餘復反衛又去衛過曹適宋遭伐木之禍十五年自鄭適陳哀公二年反於衛因問陳而行復如陳哀公六年楚昭王聞孔子在陳蔡之間使人聘孔子孔子將往從之陳蔡大夫謀曰孔子賢者所刺譏皆中諸侯之病今者久留陳蔡之間諸大夫所設行皆非仲尼之意孔子用於楚則陳蔡用事大夫危矣於是乃相與發徒役圍孔子於野絶糧從者病莫能興朱子疑楚聘夫子恐陳蔡大夫必不敢圍故集註即以此章為去衛適陳之時然或問又因史記至知德者鮮為絶糧以後一時之言則又舊說也程子叔子一貫第四篇以行言此以知言第四篇上文曰吾道下文曾子以忠恕明之故曰以行言此上文為多學而識發但曰予一以貫之葢專以知言也語錄曰也須多學識得未有不學而自一貫者也王文憲曰聖人只是於多學中有一以貫之劉頡曰世有多學徒恃强識而愈窒者惟於義理有得則學不必多而自能多不求識而自能識此一以貫之之謂也婁音屡問行猶問達之意問達主於名問行主於事達欲名聞於人行欲動無不遂皆欲得於外之意紳大帶之垂者帶結於前再繚之為兩耳垂為紳長與裳齊士三尺有司二尺五寸程子伯子鞭辟辟音關如行辟人之辟謂猶前驅者以鞭攔約人使開向一邊也著巳直畧反切己也尸諫家語困誓篇曰史魚驟諫而不從病將卒命其子曰吾在衛朝不能進蘧伯玉退彌子瑕是吾為臣不能正君也我死汝置屍牖下其子從之靈公弔焉怪而問之子以父言告公曰是寡人之過也於是命之殯於客位進蘧伯玉退彌子瑕孔子曰死而屍諌可不謂直乎可巻卷上聲王文憲曰可字要思量如於孫林父寗殖放弑之謀襄十四年衛孫林父寗殖將出獻公孫林父并帑於戚而入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將若之何對曰君制其國誰敢奸之雖奸之庸知愈乎遂行從近闗出襄二十六年衛獻公使子鮮為復辭敬姒彊命之以公命與寗喜言曰苟反政由寗氏祭則寡人寗喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行從近闗出史紀世家曰文子語蘧伯玉伯玉曰臣不知也志士章程子叔子子貢問章程子叔子斗柄初昏建寅之月此古厯也沈括曰今正月斗柄指丑矣葢嵗差也但以冬為亥子丑春為寅卯辰不必因斗建也天開於子地闢於丑人生於寅畧見第二篇三綂之說詳見漢志及後漢書註然不及邵子經世之明經世以三十年為世十二世為運三十運為㑹則一㑹凡一萬八百年至寅㑹而始開物是人生於寅也夏小正之屬禮運曰我欲觀夏道是故之杞而不足徴也吾得夏時焉鄭康成註曰得夏四時之書其存者有小正史記夏本紀太史公讃曰孔子正夏時學者多傳夏小正云索隱曰夏小正大戴記篇名朱子語錄曰行夏之時自行夏小正之事履祥按夏時不止小正此葢夏時之小者耳夏時又自別有夏令時儆之屬名見國語周人飾以金玉周人尚輿一器而工聚焉者車為多一曰玉路二曰金路葢飾以金玉者周冕有五衮冕鷩冕毳冕希冕𤣥冕韶舞舜樂名詳見虞書鄭國之音樂記曰鄭衛之音亂世之音也其政散其民流誣上行私而不可止也鄭衛皆淫聲此獨云放鄭聲者詩集傳曰衛詩三十有九而淫奔才四之一鄭詩二十有一而淫奔之詩已不翅七之五衛猶為男悅女之辭而鄭皆為女惑男之語是則鄭聲之淫有甚於衛故夫子獨以鄭聲為戒也程子曰發此以為之兆未詳兆孟子集註曰事之端也治天下之制度事為非盡於此四者而已也設此四者以為之端兆則凡事皆欲準此合其時宜酌其文質致其中和人之所履者容足之外皆為無用之地而不可廢也莊子曰知無用而始可與言用矣夫地非不廣且大也人之所用容足耳然則厠足而墊之至黄泉人尚有用乎蘇氏之言本此集註引此似但說地之逺近不說時之逺近何文定曰蘇氏此說正是譬喻未必専以地言王文憲曰逺慮以地言則周以時言則豫諡曰惠列女傳曰柳下惠處魯三黜而不去憂民救亂妻曰無乃凟乎君子有二耻國無道而貴耻也國有道而賤耻也今當亂世三黜而不去亦近耻也柳下惠曰然油油之民將䧟於害吾能已乎且彼為彼我為我雖祼裎安能汚我油油然與之處仕於下位柳下惠既死門人將誄之妻曰將誄夫子之德耶則二三子不如妄之知也乃誄曰夫子之不伐兮夫子之不竭兮夫子之信誠而與人無害兮屈柔從俗不彊察兮蒙耻救民德彌大兮雖遇三黜終不易兮愷悌君子永能厲兮嗟乎惜哉乃下世兮庻幾遐年今遂逝兮嗚呼哀哉魂神泄兮夫子之諡宜曰惠兮門人從之以為誄臧文仲為政歴僖文二公不仁左氏孔子曰臧文仲下展禽不仁也見第六篇註躬自厚吕成公少年性嚴急自讀此章之後氣質變化德董寛宏義質章程子曰此章本註進歩伯子重上又說雙重譽平聲譽之也去聲名譽也斯民也三代之所以直道而行也漢書文景紀贊曰孔子稱斯民三代之所以直道而行也信哉朱子於此章舊得其意後得漢史引此以見不易民而化之意遂證其說然勉齊黃公親見朱子改訂註文直至通宵只為此句難得簡潔爾然宜桃出直道獨解而後及句意其辭若曰直道而行謂善善惡惡無所私曲也吾之於民所以無毁譽者蓋以此民即三代之時所用以直道而行之民故我今亦不得而枉其是非之實也似為簡明當仁章程子伯子辭取達意而止儀禮聘記曰辭多則史少則不達辭苟足以達義之至也葢亦夫子此章之意季氏此篇或以為齊論齊論章句頗多於魯論此篇首章句語甚多後章亦然故疑其文從齊論顓臾風姓大皡之後今沂州費縣西北有顓臾故城寰宇記在費縣西北八十里故漢顓臾縣開皇十八年以南武陽為顓臾縣貞觀元年省入費魯附庸古者小國不能五十里者不能自達於天子附於諸侯曰附庸二子仕季氏不同時定公十二年子路為季氏宰哀公十一年冉求為季氏宰詳見或問蘇氏說疑子路再仕季氏季桓子死遺言召孔子康子乃召冉求其後孔子反魯子路從既季氏故宰必復主季氏家受其供饋而與聞其事爾下文獨責冉求可見東蒙寰宇記蒙山在沂州費縣西北八十里東蒙山在縣西北七十五里在蒙山之東故云東蒙在魯地七百里之中詩乃命魯公俾侯於東錫之山川土田附庸孟子謂周公封於魯為方百里葢以田計也山川附庸不在此數禮記魯境七百里蓋通山川附庸計之也四分魯國左氏昭公五年舍中軍卑公室也四分公室季氏擇二二子各一皆盡徴之而貢於公註隨時獻公而已周任古之良史此馬融之說千姓編云周任商大史又家語晉人覘宋章子曰云云是以周任有言曰民悅其愛者弗可敵又左傳昭三年仲尼曰周任有言曰為政者不賞私勞不罰私怨夫子屢援其格言則周任之賢可知矣相瞽者之相說文云相省視也地之可觀莫如木然其義不通按瞽者慿人視以為目慿人扶以為杖故相字從木目因此凡扶翼人者亦皆名相逺人謂顓臾逺人泛言他國下文謀動干戈於邦内則顓臾非逺者言蕭牆之内則視顓臾為逺人爾蕭牆屏也門天子外屏諸侯内屏大夫以簾春秋之時大夫皆僣臺門旅樹之禮故亦設屏其謂之蕭牆者雖設屏以限内外而蕭疏可以通望内外如漢罘罳之類是也蕭牆之内言憂起於門屏之内也其後哀公果欲以越伐魯而去季氏左氏哀公二十七年公患三桓之侈也欲以越伐魯而去三桓因孫於邾遂適越魯自文公薨公子遂殺子赤立宣公而君失其政歴成襄昭定凡五公文公二妃敬嬴生宣公敬嬴嬖而私事裏仲宣公長而屬諸襄仲十八年二月文公薨襄仲欲立宣公叔仲不可襄仲見於聲侯而請之齊侯新立而欲親魯許之冬十月仲殺惡及視而立宣公殺叔仲惠伯夫人姜氏歸於齊哭而過市曰天平仲為不道殺適立庻惡二傳作子赤宣十八年襄仲之子歸父有寵欲去三桓以張公室公薨季文子遂東門氏子成公立十八年子襄公立三十一年子昭公立二十五年伐季氏不克遜於齊三十二年薨於乾侯定公立十五年薨自季武子始専國政歴悼平桓子凡四世而為家臣陽虎所執按宣公之薨季文子逐東門氏已得國政但以其忠故稱為賢大夫至襄五年季文子卒其子季孫宿繼是為武子十一年三分公室三家各有其一季氏盡征之無所入於公襄二十三年季武子謀於臧武仲立紇後為悼子悼子卒意如立是為年子昭五年四分公室季氏擇二二子各一皆盡征之十二年南蒯欲出季氏不克二十五年昭公伐季氏不克遜於齊又如晉欲去季孫不克薨於乾侯定五年季平子卒季孫斯立是為桓子陽虎囚桓子殺逐季氏之臣七年陽虎御桓子將陷之於齊師八年陽虎欲去三桓將享季氏於蒲圃而殺之季氏適孟氏以免陽虎刼公與武叔攻孟氏弗克出奔九思章程子伯子邦君之妻此章呉氏曰不知何謂王文憲曰當在南子章天厭之之下又天地之間男貴女賤女子貴者方得比於男子故夫人自稱曰小童比於小男子也大夫之妻曰孺人亦比小男子也公侯之妻曰夫人夫則比男子矣至為天子之妻始曰后則在百司之上而比於繼體之君矣大抵此書後十篇多缺誤陽貨瞷亡饋豚論語不言瞷亡因孟子而見孔子膰肉不至去魯論語止言女樂亦因孟子而見如邦君之妻周八士堯曰前章雜舉夏商周語固皆缺誤然前十篇如孔子曰天生德於予論語不載伐木之事弟子速行之說亦因史記而知諸若此類及集註所謂必有為而言與鄉黨所載亦自疑有闕誤此皆弟子集論語之時事辭不無所遺也朱子每恨不及見古孔子家語良亦以此論語集註攷證卷八
