body:
  text: 欽定四庫全書經部八論孟集注考證四書類提要臣等謹案論語集注考證十卷孟子集注考證七卷宋金履祥撰後有自跋謂古書之有注者必有疏論孟考證即集注之疏以有纂疏故不名疏而文義之詳明者亦不敢贅但用經典釋文之例表其疑難者疏之其書於朱子未定之說但折衷歸一於事迹典故辨訂尤多蓋集注以發明理道為主於此類率沿襲舊文未遑詳核故履祥拾遺補闕以彌縫其隙於朱子深為有功惟其自稱此書不無微牾自我言之則為忠臣自他人言之則為讒賊則殊不可訓夫經者古今之大常理者天下之公義論之得失惟其言不惟其人使所補正者果是雖他人亦不失為忠臣使所補正者或非雖弟子門人亦不免為讒賊何以履祥則可他人則必不可此宋元間門戶之見非篤論也其中如辨論語注公孫枝云案左傳當作公孫發集注或傳寫之誤辨孟子注許行神農之言史遷所謂農家者流云史記六家無農家漢書藝文志九流之中乃有農家皆為典確至於辨公劉后稷之曾孫一條謂公劉避桀居邠去后稷世逺非其曾孫不知古人凡逺祖多稱髙祖左傳郯子稱我髙祖少皞是也凡逺孫多稱曾孫左傳蒯瞶稱曾孫蒯瞶敢昭告皇祖文王是也如此之類則注不誤而履祥反誤亦未盡確當不移然其旁引曲證不苟異亦不苟同視胡炳文輩拘墟回護知有注而不知有經者則相去逺矣書凡一十七卷首有許謙序後有吕遲刋書跋猶為舊本朱彝尊經義考稱一齊書目作二卷注曰未見蓋沿襲之誤不足據也乾隆四十四年十一月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀論語集注考證原序古之聖人得其位皆因時以制治孔子酌百世之道以淑天下而其事主於教孟軻氏推尊孔子傳於後世以迄於今故論語孟子者斯道之閫奧也繇漢而還解之者率有不獲至二程夫子肇明厥旨今散見於遺書嗣時以後諸儒所著班班可考然各以所見自守有得有失未有能摉抉融液折諸理而一之者子朱子深求聖心貫綜百氏作為集注竭生平之力始集大成誠萬世之絶學也然其立言渾然辭約意廣往往讀之者或得其粗而不能悉䆒其義或一得之致自以為意出物表曾不知初未離其範圍凡世之詆訾混亂務新竒以求名者其弊正坐此此考證所以不可無也先師之著是書或櫽括其說或演繹其簡妙或攄其幽發其粹或補其古今名物之略或引羣言以證之大而道德性命之精微細而訓詁名義之弗可知者本隱以之顯求易而得難吁盡在此矣蓋求孔孟之道者不可不讀論孟讀論孟者不可不由集注集注有考證則精朱子之義而孔孟之道章章乎人心矣謙自壯年服膺師訓即知讀朱子之書其始三四讀胸中自以為洞然顯白已而不能無惑學之頗久若徐有得焉及即其書而觀之乃覺其意初不與己異學之愈久自以為有得者不遂止於一而與鄙陋之見合者亦大異於初矣由是知聖賢之言理趣無窮朱子之說雋永當味童而習之白首不知其要領者何限先師是書亦憫夫世之不善學朱子之學者也傳曰仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮謙於是深有感焉故翻閲羣書用加讐校藏諸家傳諸其徒若好事君子能廣而傳之是固謙之所望亦先師之志云爾許謙序
