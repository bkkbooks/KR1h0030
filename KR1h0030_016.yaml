body:
  text: 欽定四庫全書孟子集注考證卷四元金履祥撰離婁上離婁莊子云離朱子日司馬云離朱黃帝時人百步見秋毫一云見千里針鋒孟子作離婁按婁朱古聲雙疊如邾謂之朱婁故離朱又謂之離婁公輸子魯巧人公輸班禮記作般師曠晉平公樂師字子野程子伯子規矩準繩權與物鈞而生衡衡運生規規圎生矩矩方生繩繩直生凖準正生平蓋衡運生規規所以為圓西折其圓則取方而生矩矩所以為方也方則直而生繩繩所以為直也懸繩以為準準從衡平為準所以取平也鄒氏此章惟鄒道卿分晝明故集注專取之右首章入要略四之六此章以仁心法度對言明巧聰道者心也規矩六律仁政者法也仁心仁聞者心也先王之道者法也善心也政者先王之法也日力耳力心思者心也規矩準繩不忍人之政者法也不仁者無仁心也無道揆法守者無法度也自仁者宜在髙位以下則兼言君臣矣自詩曰以下則又專言臣也泄泄者臣無仁心也無禮義非先王之道者臣無法度也恭者尊君之意期望逺大敢謂凡主此尊君也敬者謹密之意陳善閉邪每事不苟此敬君也王文憲曰責難是先立一個大志下句是仔細㸃檢即是責難工夫也惡諡諡法殺戮無辜曰厲壅遏不通曰幽捐位亂常曰幽此章入要略四之七行有不得反求諸已白鹿洞學規以為接物之要此章入要略一之二十七巨室吕成公曰古者理㑹封建次則理會大家麥丘邑人新序曰齊桓公田至於麥丘見麥丘邑人問之子何為者對曰麥丘邑人也公曰年幾何對曰八十冇三矣公曰美哉壽乎子其以子之壽祝寡人壽麥丘邑人曰祝主君使主君甚壽金玉是賤人為寶公曰善哉至德不孤善言必再吾子其復之麥丘邑人曰祝主君使主君無羞學無惡下問賢者在旁諫者得人公曰善哉至德不孤善言必三吾子又復之麥丘邑人曰祝主君使主君無得罪於羣臣百姓桓公怫然作色曰吾聞之子得罪於父臣得罪於君未嘗聞君得罪於臣者也此一言者非夫二言者之匹也子更之麥丘邑人坐拜而起曰此一言者夫二言之長也子得罪於父可以因姑姊叔父而解之父能赦之臣得罪於君可以因便辟左右而謝之君能赦之昔桀得罪於湯紂得罪於武王此則君之得罪於臣者也莫為謝至今不赦公曰善賴國家之福社稷之靈使寡人得吾子於此扶而載之自御以歸禮之於朝封之以麥丘而訪政焉裴度唐晉國公知政事元和十三年憲宗以淮西既平浸驕侈皇甫鎛程异曉上意數進羡餘以供其費憲宗以二人同平章事裴度求退不許復上疏云云韓𢎞輿疾討賊唐宣武節度使朝廷討淮西命𢎞都統諸軍詔毋自行以遏北冦𢎞請使其子公武以兵㑹討蔡及朝廷討李師道𢎞以兵東下承宗斂手削地成德節度使王𢎞正死承宗襲總軍務以請吐突承璀請兵計之戰屢敗命四而藩鎮各進兵招討王承宗遺使自陳請自新裴垍請戮承璀乃罷中尉尋出之武元衡之被刺上疑承宗既而捕賊知非其罪不治淮西平韓愈用柏者之策請裴度書喻之承宗請獻德棣二州以二子質京師天下章程子叔子不可為衆猶所謂難為兄難為弟世說新語德行篇曰陳元方子長文有英才與季方子孝先各論其父功德爭之不能决咨於大丘太丘曰元方難為兄季方難為弟按太丘陳實字仲弓為太丘長其子紀字元方諶字季方元方有季方之弟則未易為兄季方有元方之兄則未易為弟集注引難為字以證不可為字謂與仁者為敵難為衆力也滄浪水名楚辭集注曰滄浪即漢水下流見禹貢按禹貢嶓冡導漾東流為漢又東為滄浪之水今均州漢水中有滄浪州是其證也滄浪之歌乃是荆楚間風謡之舊故屈原漁父辭亦有此歌但我字作吾圖經謂夫子自葉之漢而聞孺子之歌今鼎州又自有滄浪水乃屈原答漁父處其地不同歌辭則一而取義又各不同夫子言水之清濁則有濯纓濯足貴賤之異此其自取也屈原所引則謂清者自清濁者自濁故各有所用而不相通要其用處亦不出夫子之意此章入要略一之三十五鼂錯所謂鼂錯漢頴川人為景帝御史大夫此數句是賢良對策中語錯自刑名之學此數句偶合爾然於孝文時曾上納粟備邊拜爵除罪之策文景遂致富庶賜租之治亦受行其說矣為湯武驅民言桀紂以暴失民湯武以仁得民民畏桀紂之暴故歸湯武之仁是桀紂為煬武驅民以來猶魚畏獺故投於深淵鳥畏鸇故投於業林是獺為淵驅魚以入鸇為叢驅爵以來也言非禮義非狷毁也此字重讀程子曰伊川易傳革卦上六傳文此章入要略一之三十三道在邇章入要略二之十獲上信友章集注中庸章句文有不同集注為明切中庸又密備集注為下學中庸兼上達亦與大學相表裏格物致知乃明善之要其誠意正心修身乃誠身之謂推之齊治則順親信友獲上在其中北海之濱伯夷孤竹君之長子孤竹國在遼西令支縣中國去北海甚逺但以遼海為北海太公史記太公吕尚者東海上人嘗事紂紂無道去之隱海濱聞西伯賢又善養老盍往焉西伯出獵果遇太公於渭之陽與語大悅曰自吾太公望子久矣號之曰太公望載以俱歸立為師善戰如孫臏吳起之徒詳注序說連結諸侯如蘇秦張儀之類蘇秦洛陽人說六國合從遂佩六國相印張儀詳見前篇按戰國游士說六國南北相結則曰合從說六國西面事秦則曰連衡司馬溫公曰合從者六國之利也夫孟子言交鄰之道則合從相維未必不然但連衡事秦實不可以為國故孟子止定連諸侯者之罪集注并及蘇秦爾豈以蘇秦亦初說秦惠王以連諸侯之策不用而後說六國以從故當時有反覆之譏此所以舉儀秦而並言與李悝盡地力按前漢晉志杜佑通典李悝為魏文侯作盡地力之教以為地方百里提封九萬頃除山澤邑居三分去一為田六百萬畝治田勤謹則畝益三斗不勤則損亦如之地方百里之增減輒為粟百八十萬石按李悝之法乃是盡民力以求多粟而增其賦此法商鞅實受之其後遂開阡陌矣商鞅開阡陌朱文公阡陌辨曰陌之為言百也遂洫從而徑塗亦從則遂間百畝洫間百夫而徑塗為陌矣阡之為言千也溝澮橫而畛道亦橫則溝間千畝澮間千夫而畛道為阡矣阡陌之名由此而得遂廣三尺溝四尺洫八尺澮二尋則文有六尺矣徑容牛馬畛容大車涂容乘車一軌道二軌路三軌則幾二丈矣此其水陸占地不得為田者先王所以正經界止侵爭時蓄泄備水旱為永久之計商君以刻薄之心行茍且之政但見田為阡陌所乘而耕者限於百畝則病其人力之不盡伹見阡陌之占地太廣而不得為田者多則病其地力之有遺世衰法壞或歸授不免有煩擾欺隱之姦又必有陰據自私而稅不入於公上者是以一旦奮然不顧盡開阡陌悉除禁限聽民兼并買賣以盡人力墾開棄地悉為田疇而不使有尺寸之遺以盡地利使民有田即為永業而不復歸授以絶煩擾欺隱之姦使地皆為田田皆足稅以核隂據自私之幸而千古聖賢傳授精微之意於此盡矣淳于髠史記曰齊人也博聞强記學無所主其諫說慕晏嬰之為人而承意觀色為務又入滑稽傳授丞又反受植酉反禮記曰嫂叔不親授又曰惟喪與祭得相授受其授之則以匪無匪則皆坐奠之而後取之教子章正身擇師君子之所以教子也曾皙名㸃史記㸃作蒧程子叔子王文憲曰此章三必字要思量此章入要略二之三人不足與適朱子曰二語當急讀過與言不必信一般不可作斷句惟大人為能格君心之非方是斷句王文憲曰此是㸃讀正反之法程子叔子孟子三見齊王而不言事荀子大略篇曰孟子三見宣王不言事門人曰曷為三遇齊王而不言事孟子曰我先攻其邪心此章入要略四之五王勉建陽人集注王氏多介父之說故王勉獨著名樂正子章王文憲曰王驥從孟子出弔是欲借重於孟子孟子不與之言是待小人之嚴樂正子之從子敖是失身也孟子不責其失身而責其徒餔啜者度其心止欲藉其資糧輿馬來見孟子爾舜不告事見萬章篇程子曰堯以君命治之也仁義之實文分嘗與吕成公言實字有對名而言者謂名實之實有對理而言者謂事實之實有對華而言者謂華實之實蓋仁之實不過事親義之實則是從兄推廣之愛人利物忠君弟長乃是仁義之華采履祥按此實當作文實之實事親從兄者仁義之實而推之仁民利物忠君弟長則皆仁義之文王文憲曰此實是根本精實非可以對虛對僞而言智之實知斯二者弗去是也集注見之明守之固二句精密按智本訓知而屬貞屬藏所以兼有弗去之意四端每端皆含兩意則智字以所知之事言之則有是有非以知之在內言之則含知與守王文憲曰要緊在知斯二者弗去一句上弗去則無間斷所以能樂則生矣此章入要略二之二李氏延平先生名侗字願中諡文靖師事羅豫章羅仲素豫章先生名從彥字仲素諡文質了翁陳忠肅名瓘字瑩中尊事龜山揚公仲素則龜山門人故其言語相聞此語收入小學之書此章入要略二之四離婁下諸馮在河中府河東縣其地有姚墟負夏衛地史及雜書云舜販於頓丘就時於負夏鳴條在今解州乃湯與桀戰處史記皆云舜崩於蒼梧之野因葬焉今道州九疑是也此云鳴條恐古地有二名爾東方夷服之地舜有虞之國在今河中府舜井尚在歷山雷水皆在河中之境而古今又多傳齊州有歷山濮州有雷澤曹州有陶丘皆舜舊隱是云東夷之人又㑹稽上虞世俗亦云舜所居此或因孟子之言而附㑹之歟按舜為父母所逐負販就時多在東方之地故云東夷之人爾或云東夷西夷猶俗言東邊西邊岐周周自古公遷於岐山之下周原古號岐周在今鳯翔畢郢畢在豐西南文王所葬郢逸周書作程謂文王嘗宅程及伐崇遂作邑於豐在今京兆符節周禮掌節門開用符節集注篆刻文字而中分之彼此各藏其半有故則左右合以為信此即所以符其節則藏符於中而執之以為表者此章言前聖後聖相去雖逺及其行政化於天下凡事莫不止於至善以此理量度之無一毫不同者溱洧二水名在今鄭州語録云即汜水在虎牢之下故虎牢名汜水關鄭子産以乘與濟人處聞人務德以為此水其下皆沙深不可施梁柱淺不可徒涉恐難以乘與濟然此類不必深考履祥按古今地名不同圗經流傳亦異二水源流亦長詩褰裳涉溱褰裳涉洧則二水亦小可以徒涉但或冬寒病涉子産偶見之以乘與濟之爾觀下文言十一月十二月可見又徒杠輿梁字皆從木不過秋冬間作木橋耳固不患水之深淺子産相鄭使都鄙有章上下有服田有封洫廬井有伍不可謂無政但於橋道一節偶有未修舉處見有病涉者因以乘與濟之小人無知喧傳慈惠故孟子因此一事以明為政之體夏令曰九月除道十月成梁先王之道至春秋戰國皆成廢墮讀此章當知先王之制與為政之體諸葛武侯治國橋道傳舍無不修治此足為法矣諸葛武侯葛氏本出諸縣後徙琅邪其地自有葛氏故自諸而遷者稱為諸葛以别之至諸葛亮字孔明官至丞相封武鄉侯諡忠武後人獨稱武侯治世以大德不以小惠續後漢書曰亮為相十四年才兩赦或言太惜赦者亮曰治世以大德不以小惠儀禮曰儀禮喪服篇曰齊衰三月為舊君者孰謂也仕焉而已者也何以服齊衰三月也言與民同也大夫為舊君傳曰大夫為舊君何以服齊衰三月也言與民同也大夫去君歸其宗廟故服齊衰三月也言與民同也何大夫之謂乎言其以道去君而猶未絶也注謂三諫不從待放於郊未絶者謂爵祿有列於朝出入有詔於國潘興嗣字延之號清逸嘗從濓溪遊曾子固亦在事見謝溪堂文集清逸墓志非禮之禮非禮之禮如就位而與右師言不待招而見諸侯與世俗之繁文趨時之謬敬異端之儀制進退拜跪之不典皆是非義之義如陳仲子之亷楊朱之取為我鄉原之善儀衍之大丈夫遊俠之義氣聶政荆軻之許人以死皆是集注察理不精乃一章之要旨事不察則蔽察不精則差所以有非禮義之禮義隨事順理則無非禮之禮因時處宜則無非義之義有不為章程子叔子入要略三之十九已甚章要略五之六信果文公云此二語不可作句至惟義所在方是斷句大人章入要略一之十九必誠必信禮記曰喪三日而殯凡附於身者必誠必信勿之有悔焉耳矣三月而葬凡附於棺者必誠必信勿之有悔馬耳矣深造之以道王文憲曰深造不作已到說之以兩字不可作助語打過道則其進為之方語本趙注朱子初疑此句未甚安却是循道以進耳而今集注從之蓋有意也深造如一步進一步一節進一節以道如循序而漸進熟讀而精思後篇不成章不達意可兼看資猶藉也資如蓄積之資集注訓作藉則如資助之資資給之資蓋與取字相應惟資藉之者深厚故取用之者不竭程子曰前伯子後取叔子意足之此章最難看惟程子得其意然止說上一句而下三句在其中蓋上一句是本下三句是效大抵無淺易輕浮之失無陵躐强探之病有循序漸進之功故可以自得之自得之則無安排布置之勞無生澀杌􅑾之患有存養久熟之功故居之安居之安則有寬裕深長之氣有悠逺博厚之積故資之深有資藉深逺之豫故有取用不竭之功隨其所值無不得其至善之所在也又程伯子答橫渠一段可以反證曰所論大槩有苦心竭力之象而無寬裕溫厚之氣非明睿所照而考索至此故意屢偏而言多窒小出入時有之學者以此反證可以約見此章之意此章入要略一之二十三言無實集注兼舉二義皆非定說雖凡例以前說為長然如後說則兩實字當作一本一效蔽賢者以正為邪以善為惡此言之無實者也言無實者不祥故不祥之實禍亦惟蔽賢者當之蓋文字中凡說不祥便見凶禍又當之二字亦可見語意興始作俑者其無後乎同舍上聲楚辭集注朱子晚年之作謂舍字當作去聲止息也不舍晝夜謂曉夕不息爾作捨者非今語孟子集注皆作上聲蓋未及改也幾希幾微希小也者讀幾希句猶云人之所以異於禽獸者只些子耳存見存此些子去即失之文勢多以此二字為反結語非孟子文意後篇平旦之氣文意亦然不知此二知字補所以去所以存之故本下文明察字戰兢惕厲此四字補意尤緊亦從幾希字來只爭些子才不存之即去去即同於禽獸所以戰兢惕厲惟恐失之也舜存之者君子也存者聖人也聖人不待存之由其明察於中自然安行於外察如文理密察之察此章入要略一之三戰國䇿梁王魏嬰觴諸侯於范臺酒酣請魯君舉觴魯君興避席擇言曰昔者帝女令儀狄作酒而美進之禹禹飲而甘之遂疏儀狄絶㫖酒曰後世必有以酒亡國者事見魏卷二執守而不失恐與子莫執中之執似故特出此字義語録曰湯只是要事事恰好無過不及而已而讀為如詳見或問詩中用而字結語者皆是如字意偏其反而謂華偏翻如也室是逺而謂人之逺如也諸詩多如此泄狎也狎字訓泄與褻字同然只作本訓亦可蓋泄者有餘溢漏之意謂武王不以在邇而溢不以在逺而遺語録又曰泄兼冇狎侮忽略之意周公思兼三王以施四事語録恐是周公自有此語按如此則上四條亦必周公歷述之也承上章通上章言舜因歷舉三王周公通下章言孔子而又自言私淑皆似一時之言與末卷末章意同程子曰叔子此章入要略五之二聖人則一其時其事其作用之迹與其警省之辭又各有可見處故周公孟子各因一事而言禹之好惡湯之中公文武之不間不已則學聖人者有可用力處晉之乘當作晉楚之史與春秋並立故左氏春秋傳於晉楚之事最詳以其有可參考也桓文為盛齊桓之霸在魯莊閔僖之時晉文之霸在僖公之世而此云春秋皆桓文之事蓋五霸桓公為盛其後諸霸不過襲其迹而為之晉文之霸子孫繼其事世主夏盟至春秋末始衰故霸主雖不一而其事則皆桓文之事耳公羊傳公羊高作筆則筆削則削游夏不能贊一辭見史記孔子世家君子之澤四句必古語俗諺孟子引之以言孔子之世未逺流風餘韻多在故我雖未及登門而尚得竊有所聞於人以自淑也傷惠傷勇吳伯問豐取之亷傷不難於擇矣若可與不可與可死不可死之間不幸擇之不精者與其吝嗇寧遏豫與其偷生寧就死在學者則當平日竭其窮理之功庶於取舍生死不難於精擇也朱子曰此意極好但孟子之意却是恐人過豫而輕死也履祥竊意戰國之世豪俠之習勝多輕施結客若四豪之類是也刺客輕生若聶政之類是也一時風聲氣習大率如此故孟子為當時之戒有傷惠傷勇之說使如後世吝豫偷生之習勝則孟子之戒又須别矣如後篇舍生取義章不難舍生但欲合義耳有窮國號羿其名左氏後羿遷於窮石或云即張掖窮石山弱水所出在今甘州此說不然當是并冀間地逢䝉羿家衆左氏傳羿歸自田家衆殺之蓋寒浞行媚於內而娛羿於田使家衆殺之逢䝉其人也荀子作逢門尹公他事又見左氏傳襄公十四年與此不同事皆無足論逢䝉以賊殺賊庾斯以私廢公孟子特因射事取友一端以為監戒耳西子西施也越地有東施有西施范蠡為越王句踐求西施氏美女以賂吳王夫差遂以亡吳范蠡終自取之泛湖而去言性則故而已矣程子謂此章為智而發王文憲曰此章本說智是從原頭說來則字非語助有不足之意性最難名狀故天下言性者止說得故而已矣如言乃若其情情是已發見者即性之故也利順便之謂集注訓自然之勢尤妙王文憲曰故或有順有否順者是本所謂自然之勢也天之高也周天三百六十五度四分度之一圓者圍三徑一則徑一百二十二度少四分度之三天包地外地而正當天中則自地面徑天面六十一度少也星辰之逺也此星指五緯辰指二十八宿之次十二辰也求其故王文憲曰此一故字最證得已然之迹分明日至之度周天三百六十五度四分度之一日日行一度則周嵗三百六十五日零三時也五日一候三候一氣二十四氣為一嵗則為日三百六十以天有五度四分度之一則日有五日三時故三侯十五日為一氣率餘七分積三十二分而增一日此自可以計千嵗之日至但氣本起於度故曰日至之度然日至之度亦有嵗差故氣與度古今不同如堯冬至日在虛周冬至日在牽牛宋冬至日在斗初此嵗差也既有嵗差則冬至之度似不可定推然言天者以前所差之故而推後所差之準則千嵗之日至可坐而致也致謂算得來也求其故者謂推千嵗已前之日至也千嵗之日至可坐而致者謂推已後之日至也造厯者以上古十一月甲子朔夜半冬至為厯元漢律厯志云上元太初四千六百一十七嵗至漢元封七年復得閼逢攝提格之嵗仲冬十一月甲子朔旦冬至於是改元封七年為太初元年按厯家以十有九嵗七閏為一章之數則氣朔分齊積二十七章為一會三會為統三統為元凡四千六百一十七年則氣朔日月之運皆齊故元封七年大餘小餘皆無大餘謂日餘分也小餘謂月餘分也蓋一元之數則日月並無餘分厯又再起元首程子叔子周禮職喪周禮春官宗伯之屬有職喪上士二人中士四人下士八人掌諸侯及卿大夫士凡有爵者之喪以國之喪禮涖其禁令序其事凡國有司以王命有事焉則詔贊主人凡公有司之所共職喪令之按古者有爵之喪皆職喪涖之故皆合典禮不若後世國異家殊而委巷之禮浮屠之法莫之或正也凡有司之所涖則事屬朝廷故謂之朝廷猶漢言縣官俗言官府也存心此存心猶言處心與上文存之後篇存其心不同由與猶同古書由猷猶並作繇此章入要略一之二十六平世亂世洪水未平黎民阻饑亦一亂也而謂之平世以堯舜在上禹稷見用也亂世謂周室衰替列國兵爭諸侯大夫皆僣其上而孔顔不見用也或者不知但言平世則聖賢出亂世則聖賢隱如此則世亂其誰整之蓋世之治亂在聖賢之用舍使春秋之時能用孔顔則不為亂世矣孔顔不見用於世則非惟職不得行勢皆不可行也尚何救亂之有三過其門而不入過平聲經過也禹娶塗山四日而復往治水其後啓呱呱而泣亦不為留行則尋常經過其門不入可知矣由與猶同己見上章然此章由字只作自字訓亦可蓋禹作司空職在平水而天下有溺者是由我有以致其溺也棄為后稷職教稼穡而天下有飢者是由我有以致其飢也責皆在我故急急救之也同室鬭事關一家已之責也鄉鄰鬭事在他人非己責也非己之責則非惟職不當救勢亦不能救也使其勢可及則亦救之矣但披髮纓冠以急救其勢之所不及則惑爾雖閉戶可也雖字可字當看謂非心所不欲救蓋勢所不可行也此章入要略五之七章子章子者匡章字也莊子亦謂章子不見父又戰國䇿云章子之母啓得罪其父其父殺之埋於馬棧之下齊威王使章子將而應秦曰夫子之彊全兵而還必更葬將軍之母對曰臣非不知更葬也臣之母得罪臣之父父未教而死夫不得父之教而更葬母是欺死父也故不敢此事似見章子不得逆父之由而實無違父之罪今即孟子之意觀之則章子無五不孝之罪但無先意承志喻父母於道之孝亦無不敢疾怨起敬起孝說則復諫之孝故孟子論其責善賊恩之罪而矜其黜妻屏子終身不養以自責之意文公謂其為人必拗彊之人輔漢卿謂其似陳仲子文分然之履祥按上文通國皆稱不孝則章子已為衆所棄故孟子矜其意陳仲子則為衆所慕故孟子辨其非亦微顯闡幽之意也曽子居武城曾子書雜篇載一事與此相類魯人攻費而責其罪曾子謂費君曰請出避姑無使狗豕入吾宅也費君曰寡人之於先生厚矣今寡人見攻而先生去之安能為先生守宅也曾子不答而出及魯攻費責費之罪者十而曽子所陳者九費君復修曾子之舍而後迎之沈猶行魯人蓋魯舊有沈猶氏也儲子見後篇又戰國策云燕亂儲子謂齊王因而仆之遂伐燕齊人章首當有孟子曰字王文憲曰此與上儲子章合是一章蓋因儲子有瞷夫子之語遂發瞷良人一段言求富貴利達者則作僞以欺人如墦間者君子言行如一何必竊視也恐正是一章非闕文也兼孟子書别無瞷字獨此處連有之所以求所以二字指其求乞之態與乞墦何異乞墦小乞丐求富貴利達者大乞丐其態度所可羞者一也不羞也而不相泣者也字非句連作兩讀孟子集注考證卷四
