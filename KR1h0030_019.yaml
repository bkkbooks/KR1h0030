body:
  text: 欽定四庫全書孟子集注考證卷七元金履祥撰盡心上盡其心者舊説盡心則知性知性則知天朱子以上句文法如得其民者得其心也故集注反舊説而得此章之意入要略一之二十二修身以俟之語録既不以夭壽二其心又須修身以俟之方始立得此命自身有百年在世百年之中須事事是當始得有一日在世一日之內須事事是當始得若既不以夭壽二其心而一向胡亂做去又不可如佛氏以絶滅為事亦可謂夭壽不二然修身以俟一段全不理會所以做事無頭腦無父無君亂人之大倫程子叔子張子曰張子西銘盡得此章之意而發明之若集注收此四句則不如程子三句之明順易知昔王文憲嘗以張子由太虛四句何以不入近思録而收入集注問於何文定文定曰此段説得甚精而亦難看故朱子雖屢稱此語亦嘗謂其有病要之亦非有病但看者易得做病如以虛為理一句便難看朱子恐人有看錯者反為病所以不收入近思録其收在孟子盡心章末者却是孟子之説已明可以互相發明不至錯看也由太虛有天之名何文定曰張子所謂虛者不是指氣乃是指理而言蓋謂理形而上者未涉形氣故為虛爾以下面合虛與氣證之見得此虛字是指自然之理蓋謂有此太虛自然之理而因名之曰天故曰由太虛有天之名然自然之理初無聲臭之可名也必其陽動陰靜消息盈虛萬化生生其變不窮而道因可得而見蓋虛底物事在實上見無形底因有形而見故曰由氣化有道之名蓋天以理之自然言太虛之體也道以理之運行言太虛之用也至就人身看則必氣聚而成人而理因亦聚於此方始有五常之名故曰合虛與氣有性之名所謂合虛與氣者非謂性中有理又有氣不過謂氣聚而理方聚方可指此理為性爾合字不過如周子二五妙合之意太極二五有則俱有固非昔離今合但兩事分開看則有以見其合爾合性與知覺有心之名蓋心統性情性者理也情者氣之所為也故曰合性與知覺有心之名朱子嘗謂其説得甚精但辛苦耳證得孟子此章却是分曉履祥按合性與知覺有心之名蓋理與氣合而會於心故心為最靈而能知覺王文憲曰太虛即太極圖上面圎圈氣化即圈內陽動陰靜上二句統説下二句就人上説莫非命也章入要略三之九是求兩是求字皆作一讀其上二句皆古語嘗言孟子指其所求者斷之此章入要略三之十一誠實也實見得實行得張子曰反身而誠則行無不歉於心語録取之歉音慊此章入要略一之二十一人能耻己之無所耻輔氏曰以己之無耻為耻此章入要略一之三十四取於人大章程子叔子謂宋勾踐此章一以道義為主而兩節常相對人知則達則得志不知則窮則不得志一以道義為主則囂囂不失不離士不失己民不失望澤加於民修身自見獨善其身兼善天下無往而不善也義道一理而分窮達蓋道主於行而言義主於節而言佚道章程子叔子皡皡章程子伯子豐氏豐稷元祐黨人所過者化所存者神二句古語荀子亦云仁人之兵所過者化所存者神是也舊説又一意惟程叔子以所過為所經歷文公歎其甚精而從之按過字當作平聲則意自見與天地同流所以皡皡小補所以歡虞仁言章程子叔子良能章要略二之一程子未詳不為不欲章要略一之二十九王文憲曰朱子初取范氏説而不如李氏此説曲折詳盡説無字精三樂章要略三之十二程子伯子所性語録這一個道理合下都定了更添減不得四體不言而喻猶云不勉而中也四體不待言喻蓋其動容周旋不待思勉而自然中禮故借在外不言而喻者以譬在我者不勉而中也一説見面盎背睟然盎然如此則施於四體其動容周旋中禮者不言可知矣如此輕説似亦可通然非集注本意程子未詳此章入要略三之十三北海伯夷孤竹之國在遼西令支縣中國去北海甚逺大率止以遼碣之間為北海東海史記曰太公望吕尚者東海上人或曰吕尚處士隱海濱散冝生閎天招之尚亦曰吾聞西伯賢又善養老盍往焉泰山章此章凡三節上二節喻聖人之道知行至到則餘皆近小本原盛大則其用無窮下一節示學者之方循序而漸進下學而上達善利章要略三之二程子二條並叔子列子稱其言按列子楊朱篇曰楊朱曰伯成子高不以一毫利物舍國而隱耕大禹不以一身自利一體偏枯古之人損一毫利天下不與也悉天下奉一身不取也人人不損一毫不利天下天下治矣禽子問楊朱曰去子體之一毫以濟一世汝為之乎楊子曰世固非一毫之所濟禽子曰假濟為之乎楊子弗應禽子出語孟孫陽孟孫陽曰子不達夫子之心吾請言之有侵若肌膚獲萬金者若為之乎曰為之孟孫陽曰有斷若一節得一國子為之乎禽子默然有間孟孫陽曰一毛微於肌膚肌膚微於一節省矣然則積一毫以成肌膚積肌膚以成一節一毫固一體萬分中之一物奈何輕之乎禽子曰吾不能所以答子然則以子之言問老𣆀關尹則子言當矣以吾言問大禹墨翟則吾言當矣孟孫陽因顧其徒説他事摩突其頂摩頂放踵猶俗言撞頭至腳爾突即撞也莊子曰墨子稱道曰禹親自操槖耜而九雜天下之川腓無胈脛無毛沐甚雨櫛疾風置萬國禹大聖也而形勞天下也如此使後世之墨者多以裘褐為衣以跂蹻為服日夜不休以自苦為極曰不能如此非禹之道也不足謂墨子莫魯賢人本趙注又按莊子云儒墨楊秉四謂儒家墨氏楊氏秉氏凡四家之學也秉别無所聞恐即當時子莫執中一家之説孟子因闢楊墨惟子莫能知楊墨之偏而欲取二家之中以執之其意在為我兼愛之間也意則善矣然不歸於儒則終害道故孟子亦併非之蓋二家之中不可執須權輕重時當利物則為禹之過家不入而非兼愛之過時當獨善則為顔子之陋巷自樂而非為我之不及隨時隨地而權稱之以適其平方可謂之中故孟子曰執中無權猶執一也舉一而廢百也今且以權之稱物為喻物之重一斤者則推就一斤而後平物重一兩者則推就一兩而後平凡輕重不等者皆推取平而止平即中矣楊氏取為我猶重一兩者也墨氏兼愛猶重一斤者也子莫嫌為我之輕世又嫌兼愛之重外而欲執二家之中猶嫌一兩之太輕一斤之太重而欲執半斤以為中也則物有在半斤之上下者銖兩鈞石皆不稱矣是執一也所謂舉一而廢百也程子二條並叔子飢渴章要略三之十八微顯闡幽其顯處人皆知之其幽處非人之所能知者故聖賢之論人微隱其顯而闡明其幽如夷齊之清鄉人冠不正則去之又知其隘矣惟孔子則知其量而發明之曰不念舊惡怨是用希柳下惠之和援而止之而止人皆知其量寬矣惟孟子知其守而闡明之曰不以三公易其介蓋夷齊之胸次柳下惠之心事非孔孟不能知也雖然論其心術之奧孟子能知柳下惠之介也而防其未流之弊亦惟孟子能知其不恭是皆闡幽之謂也性之章要略五之三性之其聖自天身之其聖自我殺一無罪至非義也士無生殺豫奪之權而云爾者此亦尚志之事猶周子所謂志伊尹之所志恥君不及堯舜一夫不獲也當時公卿大夫橫殺橫取多矣而士之所志乃如此又所守所行無非仁義則其施之公卿大夫之位仁義不可勝用矣此言士之所事亦以警王子之徒也此章入要略一之二十四設若非義而與之齊國陳仲子不特不義與之國而不受正使雖義而與之國亦必不受如宋子魚曹子臧吳季子雖義可以受國猶不受也况仲子之狷僻以母之食不食以兄之室不居其肯受國乎履祥竊意孟子本意當以仲子不義為句與下文舍簞食豆羮之義字相反對謂仲子不義設若與之齊國而不受人皆信之然此特義之小者爾與舍簞食豆羮之義何異惟君臣上下此乃義之大者而彼皆無之此不義之大者也以其小義而信其為大義奚可哉此斷其不義之辭也瞽瞍殺人舜父頑桃應設此問以觀聖賢處事之變孟子據此答以見聖賢用心之極爾由前言之則舜之丞又自不致有殺人之事由後言之則臯之執法又别有議貴之辟孟子皆未論到此且論聖賢之心各行其道各極其至在我無難處之謀而天下亦無不可處之事矣此章入要略二之七注文微不同而集注為明徑居養有居則有養居養富貴之氣廣居則養浩然之氣豕交章程子叔子形色形者人之體凡耳目鼻口五臟六腑百骸九竅皆具此陰陽五行之理而心其主色者形之用凡動容貌正顔色見於面者尤其精神之發也下文止言踐形則色在其中矣程子叔子此章入要略一之二十孔子之於顔曾顔子鑽堅仰高用心苦矣夫子博之以文約之以禮而欲罷不能如有所立卓爾曾子隨事著察真積力久用心博矣夫子告之一貫而唯然會悟體以忠恕此所謂速化也於冉閔冉雍求仁閔子騫之孝夫子成其在德行之科所謂成德也於由賜子路好勇夫子達之於禮義子貢穎悟夫子達之以性道此所以成其材也樊遲萬章隨問而答所謂解惑也陳亢夷之亢因子貢伯魚而聞夫子之道之因徐子而聞孟子之命此所謂遞相傳授者也孟子之私淑於人則又有在雨化成德之間者矣道高章此章言下六句極其精密學者須貼題思之繩墨彀率二事雖對喻下文正就彀率上生意彀者挽滿也率者射法也臨射時止是引之之法然已自有發之之機學者志正體直到引滿之時自住不得而發之之機躍如在前矣引而不發教者之妙機躍如也學者之自得厚薄章要略二之十一仁民此仁字言仁之用愛物集注草木禽獸皆舉之取之有時用之有節此先王愛物之政也若釋氏雖例以不殺為愛物然知施於動物而不知施之植物此之謂不知類况絶滅親親之倫此之謂不知本墨氏猶愛無差等釋氏則又倒行逆施之矣程子叔子一本見夷之章無偽也天理之真自有次第皆實心之推未能親親而仁民則悖德未能仁民而愛物則逐末皆是務外也務外則偽也此章入要略二之九盡心下召陵之師春秋魯僖公四年齊桓公以諸侯之師伐楚責其不貢次于陘楚屈完來盟於師師退盟于召陵武成章程子叔子杵或作鹵史漢戰國策作鹵徐廣顔師古曰漂浮也鹵盾也履祥按鹵杵聲相近軍中固有楯無杵然鹵乃濕鹵之鹵謂血流地生鹵爾王文憲曰此孟子拔本塞源之論雖非武王殺之然亦仁人所不忍言也虎賁書序作百史記亦作千書序不可信王曰前章疑武成難信此章繼言武王伐殷疑武成所以懲戰國多殺之暴引湯武所以示後世弔伐之仁二章不同同歸於救世而已莊周所論斫輪莊子天道篇輪扁對桓公曰斫輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣一間散翁曰詳此章文意似於兩人字讀謂殺人父之人是亦殺其父殺人兄之人是亦殺其兄亦字如猶字於本文為通必行文王之政謂前篇關譏而不征其人其字重讀見其所安之實本論語察其所安猶不得也孟子以前未有不仁得天下之事但夷羿寒浞本身即已誅滅孟子以後固多有不仁得天下者矣不但一再傳失之然子孫誅滅殆無遺類不止於猶不得而已孟子之言未嘗不驗也聖人百世之師文公文集曰孟子於二子雖或以為聖之清或以為聖之和然又嘗病其隘與不恭且以其道不同於孔子而不願學也及其一旦慨然發為此論乃以百世之師歸之而孔子反不與馬何哉孔子道大德中而無迹故學之者沒身鑽仰而不足二子志潔行高而迹著故慕之者一日感慨而有餘也此章入要略五之五仁也章程子伯子外國本尤延之云高麗本按髙麗箕子之國為東夷文物之邦尚多有古書理賴也楚辭蹇修以為理叶音賴辨證曰孟子不理於口漢書無理之至皆訓為賴則理固自有賴音矣性命章要略三之十有命焉命也性也之性是氣質之性有性焉之性是天地之性此固不待言惟二命字難分有命焉之命一節是氣之理命也之命一節是理之氣何以謂氣之理是就氣上説而理亦在其中為之品節限制何以謂理之氣是就理上説而氣却於其中有清濁厚薄之不同蓋理氣未始相離天以陰陽五行化生人物氣以成形而理亦賦焉猶命令也然理則一而氣則有清濁厚薄之不同所以在人便有智愚聖否貴賤貧富之異而理固無不在焉此所以謂命也但命也之命自其清濁厚薄者言之則全屬氣有命焉之命自其貧富貴賤之分限言之則便屬理命也之命在前有命焉之命在後然才有清濁厚薄便亦自有貧富貴賤才有貧富貴賤便自冇上下品節所以總謂之命但其上一截清濁厚薄全屬氣到貧富貴賤各有品節則屬理此兩命字所以同所以異者如此性也命也口之於味也以下五句是氣質自然之欲故斷之曰性也此是順結也仁之於父子也以下五句是人心自然之理乃結之曰命也此乃反結何耶曰口之於味五者就人身言仁之於父子五者就人事言就人身言有此形氣便有此五者故曰性也就人事言則所處所遇自是有不同者故曰命然人以前五者在人身為性而必求得之孟子指出天分謂各有限制之不同故曰有命焉君子不謂性人以後五者在人事為命而不求自盡故孟子指出原頭謂本有義理之不異故曰有性焉君子不謂命謂之君子不謂性則知一謂之性者世人之言也謂之君子不謂命則知一謂之命者亦世人之言也故朱子有世人之説王文憲曰性也是氣質之性要輕看有性焉是天地之性要重看又曰孟子後段命也一句是歇後語仁義五者非命也到得所值不同則命也故程叔子朱子於此五者之命見其説不去於是以命也推上去説清濁厚薄所值不同以補語意程子並叔子厚薄清濁五者之命程叔子清濁厚薄之説盡之矣夫清濁厚薄氣也而清濁發於所知厚薄驗於所值自其清者言之則仁之於父子也至義之於君臣也盡禮之於賓主也節智之於賢否也自能辨聖人之於天道也自不期而吻合白其濁者言之則於父子而仁有所窒於君臣而義有未明於賓主而禮有未合於賢否而智有所昏於天道固不能如聖人之自然吻合此命之清濁也自其厚者言之則為父而得其子之孝為子而得其父之慈為君而得其臣之忠為臣而得其君之遇賓主之相敬賢者之相知聖人而必得位得名得祿得壽自其薄者言之則子孝而有瞽瞍之父父慈而有朱均之子君賢而有觀扈之臣臣忠而冇龍逢比干之戮為主而晉侯見弱於齊為賓而魯君不禮於楚以言乎智則晏嬰而不知仲尼以言乎聖與天道而孔子不得其位此名之厚薄也氣化流行紛綸錯揉化生人物隨處不同或清或濁或厚或薄四者相經相緯相揉相雜而發於心驗於身遇於事有萬不同者清者生知安行而濁者反是厚者氣數遇合而薄者不然此所以謂之命也程子發此四字或問兼存兩説學者宜比而觀之善信章要略五之十一程子前叔子後未詳所不忍下文無欲害人之心也所不為下文無穿窬之心也達之於其所忍猶云以其所愛及其所不愛也所為如下文受爾汝以言不言餂之皆其類也無受爾汝之實文公因沈僴之問自謂注中因何改不分曉謂實字當對名字説不欲人以爾汝之稱加諸我是惡爾汝之名也然反之於身而去其無可爾汝之行是能充其無受爾汝之實也履祥按注中不分明者謂舊説作誠實解也然今注亦未大分曉當從語録之説夫爾汝者人所輕賤之名也受人輕賤之名我固恥之但能反身而充其無受輕賤之實則其所為者無往而不為義也則為之訓作為之為此章入要略一之七但要略注尚是舊説按此章有所不忍者無欲害人之心此惻隱之端也有所不為者穿窬之心此羞惡之端也能充之於他事則無非仁無非義矣前兼説仁義後獨説義語録曰仁只一路義則頭項多下又充之以無受爾汝之實又充類至義之盡以言不言餂人者其心術隱微猶盜賊也觀省至此可謂細密必如此充之而後無一毫非義近約章要略四之四不下帶古人視不下於帶因以目前常視為不下帶此古時方言也性者語録當有之字反之語録當有者字程子伯子下同董子董仲舒前漢書有傳答江都易王曰仁人者云云程子始表出之朱子白鹿洞學規以為處事之要此章入要略五之一藐之注作輕之左傳藐諸孤謂小也藐之小視之也語録孔子畏大人孟子却藐大人大人固當畏但所藐者其堂髙數仞食前侍妾田獵後車耳孟子為見世人視大人許多崇高富貴當有言不敢出口故云爾楊氏曰文公語録曰雖曰聖人之心無小大無敢慢不肯如此説但以此視彼為富貴權勢所移者冇間矣聖人固不如此若大賢以下則未免如此此章入要略三之十四養心章要略一之十八王文憲曰吕侍講曰天下難持者莫如心天下易染者莫如欲又周子養心亭説集注不入王文憲曰必自寡而後至周子所謂無程子曰伯子語輔漢卿謂極其微細言之學者須於有所向處充治去待其周張則用力難矣羊棗章羊棗曽晳所獨嗜曾子為不忍而不食膾炙人所同嗜曾子非為味而食狂狷章要略五之十二終此語與論語小異論語曰子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之琴張事見莊子莊子大宗師篇曰子桑户孟子反子琴張三人相與友曰孰能相與於無相與相為於無相為孰能登天遊霧撓挑無極相忘以生無所終窮三人相視而笑莫逆於心遂相與友莫然有間而子桑戶死未葬孔子聞之使子貢往待事焉或編曲或鼓琴相和而歌曰嗟來桑户乎而已反其真而我猶為人猗子貢趨而進曰敢問臨尸而歌禮乎二人相視而笑曰是惡知禮意子貢反以告孔子曰彼何人者耶孔子曰彼遊方之外者也按狂者志高而行不掩焉者夫子謂可因其志高而與之進道耳非取其終於狂也若終於狂則便有琴張之病過中失正而流於異端矣琴張之狂未必盡如莊子所言然其近似亦必有以取之牧皮未詳家語史記弟子傳不見牧皮此在三千之數必魯人也如孟獻子之友牧仲蓋魯有牧氏嘐嘐然曰古之人狂也志大也行不掩焉簡也略於事也程子曰伯子鄉原德之賊也論語止此一句上文必有所傳非之無舉二句原也同流合汙二句鄉原所以媚小人也居之似忠信二句鄉原所以媚君子也衆皆恱之併上文鄉原之似德也自以為是而不可與入堯舜之道鄉原之非德也似德則亂德非德則賊德矣邪慝如鄉原之屬是也凡異端非正道者皆邪慝也邪詖之辭邪也淫遁之辭則慝也而獨於鄉原章出邪慝二字蓋如楊氏為我則學義而差者也墨氏兼愛則學仁而差者也其亦有以善意為之未必有為惡之意也若鄉原之志行態度取媚求容欺世盜譽欲自附於中行而反譏狂狷以自是其惑人心壞風俗不復可以振起而使世人皆不得見中行之真是真所謂邪慝也已此章孟子因孔子三言而發明狂者之志狷者之守又因孔子賊德之言而寫出鄉原之情狀態度而卒歸之反經其為世道人心訃逺矣大矣讀之使人感切趙氏曰五百嵗而聖人出亦有遲速故言有餘按邵子經世書自已會之未以運經世之一之未嵗在甲辰而帝堯即位二聖相授至經世之刻一百四十嵗而卒午會以運經世之二之子嵗在甲子禹攝之八年下至經世之三之卯嵗在乙未凡四百五十二年而成湯有天下下至以運經世之四之亥嵗在癸亥凡六百二十九年而文王為西伯是入以運經世之五至以運經世之六之未庚戌之歲凡五百八十餘年而孔子生又七十一年庚申獲麟三年壬戌之嵗孔子卒至以運經世之七之寅乙酉之嵗孟軻至梁上去孔子卒凡一百四十三年見知聞知韓文公曰堯以是傳之舜舜以是傳之禹禹以是傳之湯云云程子謂文公必有所見若無所見不知所傳者何事今按原道不過謂其法度禮樂政教以是傳之蓋制作皆得其的而後可謂前聖後聖之相傳也然其言不如孟子之精見而知聞而知所知者何事蓋此理之大中至善也又此章繼若子反經之後尤有深意萊朱或曰即仲虺趙注萊朱一曰仲虺則是以仲虺為萊朱之一名也集注引之而云或曰即仲虺或之者存疑也履祥按仲虺古文尚書作中靁靁即雷字也史記亦作噩雷萊聲韻同又虺本音呼回反亦與雷萊音叶但今唐本不依古文作靁而依左傳故以仲虺為萊朱則若可疑爾湯之賢臣伊尹之外無如仲虺者考之仲虺之誥其見知之實可想矣而與伊尹並為左右相則萊朱即仲虺可知也太公望吕尚散宜生若周公虢叔閎夭泰顛南宫括皆不與見知者之列虢叔周公父子兄弟不在數於大臣則獨舉太公望於五臣則獨舉散宜生孟子當時蓋别有所考後世不聞其詳爾近聖人之居聖人之居在今襲慶府仙源縣而鄒即鄒縣在仙源之南爾上爾字指見而知之者下爾字指聞而知之者此二句舊説未明惟三山林少頴之説為得其指文公聞而是之蓋凡言爾者皆有所指之辭故字書言如是為爾即翻切之意也此二爾者即指上文所謂見知聞知者而為言也此章大意謂自古五百餘嵗而聖人出在當時必有見而知之者在後世則有聞而知之者今去聖人之世未逺去聖人之居又甚近而曽思輩又皆亡矣已無有如是見知者則亦恐遂無復有如是聞知者矣此其思前聖憫當時憂後世俟來哲深長之意藹然見於言表嗚呼悠哉孟子集注考證卷七跋右仁山先生論孟考證所以繼文公之緒惟益之許先生得其傳以授後學然抄寫不繕而謬誤相承尤非所以廣布也憲幕張公特為主盟俾鳩工鋟梓以便學者屬愚董其役於是許先生手自校證點畫無訛非特學者之多幸亦斯文之多幸也古麗後學吕遲謹識
