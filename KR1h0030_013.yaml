body:
  text: 欽定四庫全書孟子集注考證卷一元金履祥撰梁惠王上梁惠王魏武侯子名罃周烈王五年武侯薨無太子公子罃與公仲緩爭立六年罃為魏侯都大梁周顯王二十九年秦公孫鞅大破魏軍魏獻河西之地於秦以和魏都安邑至此與秦界河迫不可都故徙大梁今開封府祥符縣地僭稱王吕氏大事記按戰國策周顯王十六年魏拔趙邯鄲服十二諸侯遂稱王當時諸侯多已稱王諡曰惠竹書記年稱惠成王又莊子文惠君崔氏司馬注皆云即梁惠王史記魏世家三十五年周顯王之三十五年卑禮厚幣以招賢者而孟軻至梁按邵氏聞見後録人有非孟者謂孟子起頭便不可曉孟子每云不見諸侯而其書首云見梁惠王此固姍侮之辭亦是不曾看史記史記云惠王數敗於軍旅卑禮厚幣以招賢者鄒衍淳于髠孟軻皆至梁邢疏引此北士見之遂又謂孟子至梁鄒衍淳于髠為從史記列傳稱鄒衍後孟子又云梁惠王郊迎鄒衍尊禮如此豈與孟軻困於齊梁同哉則梁惠之尊信孟子反不如衍此孟子道所以不行於梁也又傳雖稱客有見髠於梁惠王者然不云孟子見之也集注引史記是補孟子書之缺以知孟子之見梁惠王應其禮幣之聘爾叟字當作叟俗作叟何文定謂當連一句又梁惠以叟稱孟子古人尚年以叟老為相尊之辭非必果有年也王何必曰利孟子之意謂為人上者有國家之重最不可以利之一言率其下以利牽下則上下交征國家必有篡奪之禍以仁義率下則下知仁義必無遺親後君之事而國家自無不利矣孟子此章分作兩節一節明言利之害一節明仁義之利仁者心之德愛之理心之德是專言之仁愛之理是偏言之仁此是兼體用說訓詁見論語集注第一篇第二章下但此章從全體上說故首曰心之德論語是從孝弟上說故首曰愛之理集注立言精密類此義者心之制事之宜亦兼體用說朱子說義理體用渾圓橫竪該備學者所當細玩王文憲曰孟子本是分義利對言然必曰仁者非仁做不得義出也孟子之書造端託始之深意自周衰以至戰國之世惟知利之一字故紛亂至此孟子欲撥亂世而反之正首須掃去此一字方可說其他事理孟子功不在禹下者即此類也但所以行仁義之事惜梁惠不能再問下諸章詳之太史公西漢人司馬談為太史令其子遷稱之曰太史公此語見史記列傳孟子傳王文憲曰太史公偶得其要程子叔子拔本塞源語出左氏傳孟子首格君心掃去利之一字如拔木之根使不復生塞水之源使不復流則禍亂熄矣此章入要略三卷之首賢者而後王文憲曰孟子添而後兩字便精神活動詩大雅靈臺按文王九十六嵗當啇紂之十九年作靈臺程泰之雍録曰文王都豐在今鄠縣豐水之西有豐宫靈臺靈沼靈囿皆屬其地括地志云辟雍靈沼今悉無復處惟靈臺孤立髙二丈周回一百二十步河內河東皆魏地魏地在西河之東故分今河中之地謂之河東大河至華陰折而東流故溫懷之地謂之河內一云魏都大梁在大河東南故名河東而以故安邑之地為河內今河中府是此獨以魏地言也荒政周禮荒政十冇二有移民通財之意喪死喪平聲厲禁周禮山虞掌山林之政令物為之厲而為之守禁澤虞掌國澤之政令為之厲禁注厲蕃界也禁為守者設禁令也又云厲遮例也五畞之宅百畞之田古者六尺為步步百為畞一夫一婦受田百畞又受田廬之地二畞半邑居二畞半田以九百畞為一井八面皆百畞為私田八家受之內一百畞為公田八家同養公田又於公田之內除二十畞為廬舍八家則每家得二畞半也邑居所受亦如之然尺有數等周尺以人中指中節為寸人有上中下不同則以中人為度一尺約當今浙尺八寸則百畞之地全無多地當自別有地尺若衣服針炙則以人尺為度爾古所為畞即今田疄其廣六尺其長六百尺是為一畞若以今尺步計之則古之百畞當今四十一畞古者二畞半當今一畞十步頒白者不負戴於道路古者道路之制輕任并重任分頒白者不提挈不特子弟代父兄之勞凡行道之人少者皆分代老者之任風俗敬老如此則尊君親上可知矣凡此諸節皆孟子勸梁惠以行仁義之實事王道之成王文憲曰成字應前始字生於教字不知檢發王文憲曰今之政如此何以謂之盡心罪嵗王文憲曰應前兩凶字程子叔子王文憲曰疑孟子者以其不合勸諸侯為王故程子著此語而朱子不可不見於此也寡人願安承教王文憲曰此章宜與上章合為一章王喜天下之民至焉一句故發承教之言孟子亦因以終其說俑禮記曰孔子謂為芻靈者善謂為俑者不仁不殆於用人乎哉晉國成王封弟叔虞於唐至燮父遷晉水之地因名晉其後曲沃奪宗至文公以來世為盟主末年六卿分晉自相兼并魏斯趙籍韓虔三分晉地為諸侯謂之三晉而魏為大長子死焉周顯王二十八年惠王之三十年魏龎涓伐韓齊田忌孫臏伐魏以救韓魏大發兵使太子申將與龎涓合軍拒之戰於馬陵魏師火敗殺太子申龎涓西喪地於秦七百里周顯王十五年魏惠王之十七年秦敗魏師於元里取少梁大事記曰此秦復河西地之始也顯王二十九年魏惠之三十一年秦公孫鞅㑹齊趙伐魏襲虜公子卬大破其軍魏獻河西之地於奏以和南辱於楚周顯王十年楚伐魏決白馬之口以水長垣之外十六年楚景舍取魏睢濊之間此所謂南辱於楚也歟若昭陽之戰則在梁惠後十二年當周顯王四十六年楚柱國昭陽伐魏敗魏師於襄陵取八邑上距孟子初見梁惠凡十四年不知惠王此問的在何年也百里可以王王文憲曰此答國不在於彊先以一語寬之繼以仁政告之王往而征之王文憲曰孟子非不用兵必如是而後可爾惠王之志在報怨孟子之論在救民救民乃可王之本則報怨不必言矣彼陷溺其民王往而征之此為天下之公報怨孰能禦之舍是不為而欲日尋干戈以報怨忿其不敗亡者鮮矣王文憲曰比死者洗之其道不過如此當時謂之迂闊不知乃洗死之良方惟周太王以來能用此方耳史記稱梁惠王不果所言則見以為迂闊而逺於事情蓋惠王不用孟子之言未幾而用蘇秦之策以合從又用公孫衍之說而敗約又用張儀之說而割地事秦史記又曰天下方務合從連衡以攻伐為賢而孟軻所如者不合此說為實録云梁襄王周慎靚王二年魏惠王薨子襄王立史記以顯王三十四年魏惠王卒襄王立西晉元康中汲郡盜不準發魏襄王冢得紀年書始知惠王有後元年至十六年薨而襄王立說者憑史記以襄王前立遂謂汲冡為哀王蓋襄哀二字皆從衣故誤也襄王在位二十四年薨後為昭王安釐王景王湣王無哀王也詳見序說必合於一然後定自太古以來封建非一日之積自三代之衰至於春秋封建之弊亦非一日之積至戰國之時六七大國又更相吞噬孟子度其勢須合為一然後定但秦以彊力殺人而一之項亦嗜殺故皆不能定至漢遂四百年天下為一周七八月孟子篇內多以周正數月蘇子子由之論齊宣王田氏名辟疆此後齊也本媯姓自陳公子完奔齊食邑於田遂為氏自田恆弒簡公專齊國至田和遷前齊康公於海上盡有齊國周安王十三年和㑹魏文侯楚衛於濁澤求為諸侯安王十六年初命田和為諸侯是為齊太公傳子桓公孫威王當周顯王二十七年靈王辟疆立顯王四十五年齊宣王聚學士於稷下乃梁惠王後十一年也至周慎靚王五年梁襄王之三年齊宣王之二十七年孟子為卿於齊桓文之事事謂其所以為霸之謀畫經營也若糾合一匡之事孔門固嘗言之矣董子西漢武帝時人董仲舒也以其醇儒度越諸子故以子稱仲舒為江都相易王問粵勾踐與大夫泄庸種蠡謀滅吳為粵有三仁仲舒對曰粵本無一仁夫仁人者正其誼不謀其利明其道不計其功是以仲尼之門五尺之童羞稱五伯為先詐力而後仁義故不足稱於大君子之門也末句荀子同君乎逺庖廚禮記曰君子逺庖厨凡有血氣之類弗身踐也踐注音剪太山東嶽在今襲慶府北海北海去中國甚逺但以小海為北海故漢於今青淄之間置北海郡老吾老止所為而已矣王文憲曰前以愛物之心推上仁民來此以親親之心推下仁民去又明示以推之之法善推其所為不特是此章大㫖孟子平生工夫受用只在此一句本然之權度權尚能知輕重度尚能知長短人心之靈義理素具豈不能自忖量思度其長短輕重處便軟熟順意之人發政施仁所以王天下之本此篇方提此一句所以行此政施此仁使天下仕者耕者商賈行旅之皆歸者則見公孫丑上篇尊賢使能云云止如此則無敵於天下蓋亦則盍反其本矣蓋者蔽辭盍者責辭王文憲曰前本字指本心後本字指王天下之本五畞之宅百畞之田已見前章井田之廢非一日積至商鞅而後盡變爾故孟子告齊梁之君皆以制民之産告之至告滕文公亦首以經界為說蓋井田之破壞所在皆然非一日矣此章入要略四卷之首王文憲曰孟子與齊宣王問答凡十四章惟首章開闔變化精神超越而原氣不動非門人所能傳此是傳不得處履祥按此章孟子於齊宣王指其真心而勉其推因其不能推而令其審勉其審是欲重論其欲是功利重又曉之以功利之害誘之以王道之效教之以王道之本其開發君心舌端造化之妙如此齊宣王有欲無志有欲者桓文之事興兵搆怨闢土宰華夷也無志者可以保民自託不過請嘗試之自任不力言及王道章末更無領略之辭矣梁惠王下樂樂下字音洛俗讀皆然但以語意則上字當音洛蓋娛好之也猶云獨娛聽樂音與衆娛聽樂音孰為歡樂下二句放此田獵此章本言樂而兼言及田獵者必當時齊王有田獵之好也羽旌以鳥羽為飾旄以犛牛尾為飾如樊纓之類范氏祖禹字淳夫楊氏龜山咸英韶濩英本作䪫黃帝樂也咸池堯樂韶舜樂濩湯樂文王之囿文王靈囿在今鄠縣灃水之西其時三分天下已有二不聞有七十里之說也孟子稱於傳有之必有所自疑文王於終南諸處為之厲禁以為田獵及細民樵牧之地使以時入爾未必如後世之囿也孟子言事多因其語意以開誘之初不辨其事之虛實有無也湯事見後篇湯居亳與葛為鄰伯不祀湯遺之牛羊使亳衆為之耕文王事見詩大雅大雅綿之篇曰肆不殄厥愠亦不隕厥問舊說文王雖不能絶昆夷恚怒之心亦不廢吾聘問之禮太王事見後章太王居邠狄人侵之事之以云云句踐事見國語國語越語曰越王句踐棲於㑹稽之上用大夫種之謀使行成於吳願以金玉子女賂君子辱句踐女女於王大夫女女於大夫士女女於士越國之寶器畢從寡君帥越國之衆以從君之師徒唯君左右之夫差將聽之子胥諫不可越又飾美女八人納之太宰嚭曰子苟赦越國之罪又有美於此者將進之嚭諫吳王曰古之伐國者服之而已今巳服矣又何求焉夫差與之成字之事之小事大大字小春秋左氏傳凡兩出孟子並作事而集注解事小為字者本古語也然仁人之心既忘己之彊大人之小弱雖曰字之其交際往來與事大亦無異故俱作事遏徂莒當是徂共謂遏其徂共之衆也密人侵阮徂共密國在今寧州阮國在今涇州共今涇州共池孟子對曰有有字句應上賢者亦有此樂然人不得此樂者則非其上矣離宫謂别宫也營室星有離宫三故凡作宫於他處者取此齊景公晏子並見論語考證轉附山名未詳朝儛或云海㫄之山潮至如舞顧野王輿地志云僯水名出南陽琅邪齊東南境上邑名今沂州琅邪郡亦有山徴招角招齊有韶樂故其作樂用其音調徴調角調皆以韶為名此章純用晏子之言蓋其時晏子書尚全故孟子引之後篇云知管仲晏子而已雖並言管晏而其下止言管仲而不言晏子蓋孟子未嘗不重晏子也明堂周世明堂見於冬官大小戴禮記蓋天子朝諸侯布政之宫如一大殿而為九室四方各三門門㫄夾窗其內九室户牗相通天子巡狩四嶽朝諸侯於方嶽之下倣明堂之制而為堂故太山之下有明堂岐周之舊國今鳯翔府察異服云云禮記王制乃積當作子賜反穀堆也於王何有王去聲公劉后稷之曾孫本史記世表然考之漢史則公劉避桀居邠去后稷世逺又考之路史則公劉乃后稷之後世孫爾天理人欲同行異情本胡子知言前一句曰同體異用其語有病故集注止收一句曲學阿世出漢書轅固謂公孫𢎞曰務正學以言毋曲學以阿世王文憲曰自好樂以下至此五章共一機軸而充之以學力似不免有戰國雄辨氣象其所以異於戰國者務引其君以當道發天理於幾微遏人欲之橫流所以大有功於天下比必二反願比死者且比化者皆作必二反比其反也與射者比當作毗志反文公嘗因學者之問而未及改如不得已合連下文作句王自謂舍之之决孟子則戒其用之之輕慎王文憲曰此章緊要在謹字下文二察字謹之之道姑舍女所學而從我闕伐燕章詳見序記王文憲曰取之勿取正論也言武王文王則贅矣王速出令云云王文憲曰此是孟子用世之機惜齊宣王不能用又惜乎後日樂毅不得聞此說也穆公鄒君也集注恐人誤以為魯穆公也魯穆公顯以周威烈王十七年即位至周安王二十五年薨而共王奮立歷康公屯景公匽以後方與孟子同時則此穆公乃鄒穆公而非魯也又按賈太傳新書述鄒穆公之賢甚詳蓋因孟子之言而自反者歟新書春秋篇曰鄒穆公令食鴈者必以粃母敢以粟倉無粃求易於民二石粟得一石粃吏以為費請以粟食之公曰非爾所知也夫百姓耕耘勤苦豈為鳥獸食哉且汝知小計不知大㑹取倉之粟移之于民此非吾粟乎鳥苟食鄒之粃不害鄒之粟而已粟之在倉與其在民於吾何擇鄒民聞之皆知其私積與公家為一體也楚王欲淫鄒君乃遺之妓樂美女四八穆公朝觀而昔畢以妻死事之孤正輿不衣皮帛御馬不食禾穀無淫僻之事無驕逸之行食不衆味衣不雜采自刻以廣民親賢以定國親民如子鄒國之治路不拾遺臣下頥從故以鄒子之細魯衛不能輕齊楚不能脅穆公死鄒之百姓若失慈父行哭三日四境之鄰於鄒者士民嚮方而道哭酤家不售酒屠者罷列肆童不歌舂築不相杵婦女抶珠瑱丈夫釋玦軒琴瑟無音朞年而後復一出新序同此履祥按孟子所言行之必效以鄒滕之小國而敬信服行其言以齊梁之大國而終莫聽納其說此真世道之不幸也滕國名姬姓之國在今徐州北一百九十里滕縣古滕城尚在間於齊楚是時楚地東得彭城而齊自濟鄆以南至薛則滕西南迫於楚東北迫於齊是謀非吾所能及小事大孟子嘗以為智而今乃云然人鮮不以為迂然考之當時事勢則非迂也蓋迫於二大國之間兼事則力不給偏事則一必怒又况事齊則必為齊所并齊豈徒為滕而拒楚事楚亦必為楚所并楚豈徒為滕而却齊以事理言之不若保民固國與之死守則是為可爾其後不三十年滕不亡於文公不滅於齊楚而卒滅於宋則事齊楚之策誠不若自治之為得也薛國名任姓之國奚仲仲虺之後今徐州滕城薛城仲虺城皆相近仲虺城即薛舊城也是時已為齊地封靖郭君矣邠本幽唐明皇以其字似幽改從邠在今邠州此章入要略三之十七梁山岐山程泰之雍録曰邠在岐西北二百五十里自邠而南一百三十里為奉天縣有梁山即所謂踰梁山也渭水在梁山之南循水西上可以達岐所謂率西水滸至於岐下也太王都岐在今鳯翔府西五十里是為岐周岐水之南今有周原南五十里有周城義也朱子嘗因潘恭叔之請欲改作經字王文憲曰孟子太王去邠兩段見周家王業之本魯平公魯自哀公以後歷悼元穆共康景六公至周慎靚王五年平公旅立凡二十年而薨時周赧王十八年也孟子以周顯王三十三年至梁時已稱叟慎靚王五年孟子仕於齊凡三年當赧王元年致為臣而歸明年孟子又之宋滕不知魯平公欲見孟子當是何時計是喪母歸葬之後前喪孟子幼喪父三鼎五鼎古者祭祀烹牲於廟每物一鼎如羊鼎豕鼎犬鼎雞鼎魚鼎之類是也三鼎士禮則用三物五鼎大夫禮則用五物故鼎數如之沮慈吕反此章入要略三之十五孟子集注考證卷一
