body:
  text: 欽定四庫全書論語集注考證卷三元金履祥撰公冶長公冶長弟子傳曰公冶長名萇字子長史記齊人家語魯人范寧曰字子芝左氏釋例及路史皆云公冶氏魯公族也則當是魯人張華曰公冶長墓在城陽姑幕城東南五里墓極高雖在集注雖字下入嘗字子謂公冶長可妻也謂其才行之可妻也雖在縲絏之中非其罪也謂其雖嘗一陷於囚辱而實非其罪則固不妨也蓋古者有罪之人不齒於鄉嫁娶無所售長無罪而嘗被囚夫子不以是為妨且明言以解內外之惑於以見聖人取人在其立心制行之實初不以自外至者為取捨也夫縲絏而無罪者不足為辱則富貴而無德者亦不足為榮矣此論昏姻者所當知也兄孔子庶兄孟皮也叔梁紇前娶施氏生九女其妾生孟皮後字伯尼有足病古者庶長字孟嫡長字伯此必孔子伯之也其男子孔忠字子蔑在七十子之列南容南宫括字子容家語作南宫縚是孟僖子之子居南宫因氏焉程子叔子子賤姓宓當作虙房六反楚詞辨證云補注引顔之推説虙子賤即伏羲之後而其碑説伏生又子賤之後古字伏慮通用弟子傳曰子賤少孔子四十九嵗家語曰子賤少孔子三十嵗子賤為單父宰所父事者三人兄事者七人所交者十一人又曰此地有賢於不齊者五人不齊事之而稟受皆教不齊以道孔子嘆曰其大者於此乎冇矣新序舉此語乃在掣肘章下蓋舉此語為斷耳當考君子哉若人語凡二出是大綱説意思氣象朱子謂論語中説君子處有説得最高者有大概説者大概説者此類是也夏曰瑚商曰璉周曰簠簋爾雅釋器文佞朱子曰佞只是捷給辨口者古人説佞皆如此後世方以諂字解之全體而不息仁道至大全體者謂全體此仁無一事非仁也不息謂無所間斷無一時非仁也全體橫説不息竪説吾斯之未能信集注指所知而言此程子所謂己見大意也大意謂大綱意思只見得未徹底耳謝氏指所存而言此程子所謂見道分明也故謝氏之意猶云見得如此只是於心做得未徹底耳程子已見大意指全句見道分明指斯字集注斯字重謝氏信字重程子上條伯子下條未詳乘桴章程子叔子由求赤不知其仁朱子曰渾然天理便是仁有一毫私欲便不是仁了三子之心不是都不仁但是不純故夫子以不知答之或問夫子稱由也可治賦求可為宰其後求乃為季氏聚斂由不得其死聖人容有不能盡知者曰大綱亦稱其才堪如此耳未論到心德處看不知其仁之語其中固有意也聞一聞一知十是道頭知尾聞一知二是一步進步十與二取數為喻不曰而知乃曰以知以字用工字當看明睿所照明道答橫梁曰非明睿所照而考索至此晝寢何文定曰糞土朽木諸家以為質不美之譬朱子嘗破其説看來只是譬學者志不立則學無其本而教無所施爾大抵人之氣體固有強弱而其勤怠則在於志之立不立志茍立則口進於精明雖弱而必強志不立則日入於昏惰雖強而亦弱是故君子為學必先立志此志既立則如木有質如牆有基而後雕杇之功可加矣申棖史記有申黨字周家語有申績字子周而無棖名豈棖三千之徒歟剛何文定曰強毅不屈者本於有志而強梁悻直者則氣之為爾二者自外視之均可謂之剛此疑似之難辨而棖之所以得是名也及夫子斷以欲之一言則棖之不得為剛斯曉然矣蓋能勝欲之謂剛屈於物之為欲二者不容並立今謂之剛而多嗜欲則是其剛非真剛不過出於意氣崛強之為欲一牽之方且化為欲察其微也程子二語簡直明切固己盡此章之旨謝氏又能究其曲折進德者可以是而藥其未至觀人者可以是而察其所安也程子叔子自古有志者少有志則剛悻悻自好尚氣是欲欲非一端此特指其似剛之類言之爾無加諸人何文定曰子貢地位語恕固可勉為論仁則非所及而遽以此自任論道既為蠟等省已則亦太疏夫子恐其便如此擔當了不自醒覺則無復勉強充廣之功故折而教之欲其且退一步做工夫而所以進之者逺矣程子曰叔子也朱子曰程子晚年方看得如此分明性與天道王文憲曰此理在天未賦於物故曰天道此理具於人心未應於事故曰性此理至微而難言文章至顯而易見張宣公曰夫子雖未嘗明言性而子貢蓋嘗識之曰夫子之言性與天道不可得而聞也豈是真不可得而聞哉蓋夫子之言無非天道性命之流行也至孟子時異説並興孟子懼學者之惑則指示大本使知所止今之異端則又異乎古自謂識心見性其説開廣故高明之士往往樂聞而喜趨之一遊其間則喪其本心隳弛萬事毫釐之差霄壤之謬其禍可勝言哉諸先生於此又烏得而忘言也躐等躐越也等階之級也謂不歷下級而遽越上級也程子叔子子路有聞何文定曰未能行而恐有聞非以行不給而倦於聞也此特形容其汲汲於行而惟恐有留善之意夫行之速惟恐其善之或遺聞之多又慮其力之不足自勵若此進善豈有窮乎夫勇者氣質之偏多務勝人而子路則用以自治而功百倍於人此范氏所謂善用其勇也大叔疾大音泰遺名孔姞孔氏姞姓女以姓行諡法周公所作見逸周書義王文憲曰子産精神全在義字上孟子之言未盡僑音喬都鄙有章上下有服田有封洫廬井有伍語見左氏襄公三十年都鄙冇章杜氏謂自國都及邊鄙車服尊卑各有分部朱子謂有章程條法按都鄙如大都三國之一中五之一小九之一又師都建旗縣鄙建旐當時鄭國多是強族其分食都鄙必有侈僣故子産限之使其城郭車旗章服各有尊卑也上下有服者謂使貴賤衣冠各有等殺不得踰侈當時鄭國衣冠踰制者藏而不敢服故有取我衣冠而禇之之誦田有封洫者封疆溝洫此水陸之路所以限井田之界當時井田制壞漸有開阡陌相侵越兼并之患故使民封土為疆通水為洫以正經界止侵并復田制一時使民力為之所以有作封洫之譏有取我田疇而伍之之謗廬井有伍者廬田間民舍井九夫為井所謂夫三為屋三屋為井伍蓋伍家為伍使之相親相愛鄉田同井使之相友相助而其中間有罪竒邪則相及慶賞相共以此節觀之則子産治國之才非當世所可及惟夫子斷之明而集注取得其要臧文仲不仁者三不知者三左氏文二年仲尼曰臧文仲不仁者三不知者三下展禽廢六關妾織蒲三不仁也作虛器縱逆祀祀爰居三不知也晏平仲章程子叔子居蔡家語漆雕平對孔子云臧氏有守龜其名蔡文仲三年而為一兆武仲三年而為二兆山節藻梲按禮記管仲山節藻梲君子以為濫以此例之則山節藻梲似指宫廟之僭侈與居蔡各一事同歸不知爾當考祀爰居之義爰居海鳥也大如馬駒故曰爰居亦作鶢鶋國語曰海鳥曰爰居止於魯東門之外三日臧文仲使國人祭之展禽曰越哉臧孫之為政也今兹海其有災乎夫廣川之鳥獸恆知避其災也是嵗也海多大風冬暖又祀爰居事亦見莊子子文姓鬬名穀於菟榖奴口反於音鳥菟音徒左氏傳曰初若敖娶於鄖生關伯比若敖卒從其母畜於鄖淫於鄖子之女生子文鄖夫人使棄諸夢中虎乳之鄖子田見之懼而歸夫人以告遂使收之楚人謂乳穀謂虎於莬故命之鬬穀於莬三仕三已左氏莊公三十年楚申公鬬班殺子元鬭穀於莬為令尹至僖公二十三年子玉為令尹二十八年子玉死蒍吕臣為令尹三十三年子上為令尹其後子文之死傳又曰令尹子文卒鬬般為令尹則是卒之時又為令尹也卒而子繼之三仕三已别無所考子玉之為令尹也子文先為之治兵而子玉復治之子玉死蒍吕臣為令尹其後子上又為令尹子玉吕臣子上之間子文大率執其政以代其缺歟而告新令尹者至私也左氏僖公二十三年秋楚成得臣帥師伐陳討其二於宋也遂取焦夷城頓而還子文以為之功使為令尹叔伯曰子若國何曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾二十七年楚子將圍宋子文治兵於睽不戮一人子玉復治兵於蒍杜氏謂子文欲委重於子玉故略其事蒍賈曰子之傳政於子玉以靖國也靖諸內而敗諸外所獲幾何按此傳政之説亦舊政告新之證但子文之傳政子玉乃以令尹賞戰功城濮之役又重其事權以行此所以啓子玉好戰以致敗也其他事蓋可想矣崔子弒齊君春秋襄二十五年齊崔杼弒其君詳見左氏傳陳文子有馬十乘古者車馬出於田賦每甸出車一乘馬四匹則十乘乃十甸之田其田邑之大可知矣違之三違之絶句上章不知其仁仁道至大非全體而不息者不足以當之後篇仁則吾不知仁則天理渾然三仁同出於惻怛至誠之意故不拂乎愛之理而有以全其心之德各得其本心夷齊皆求所以合乎天理之正而即乎人心之安所謀者無非僭王猾夏之事楚自熊通僭號是為楚武王至魯莊之三十年子文為令尹僖元年楚人伐鄭與齊桓公爭諸侯連年侵伐於是齊為陽榖之會僖之四年齊桓公有次陘之師雖受盟於召陵而明年子文身有威弦之師以撼江黃道柏又明年楚人圍許與齊桓公爭鄭僖之十一年伐黃明年滅之十五年伐徐齊桓公救徐而楚卒敗徐於婁林及齊桓公卒僖之二十年子文身有伐隨之師以爭漢東諸侯二十一年宋襄公為盂之會而楚執宋公以伐宋又明年敗宋師於泓取鄭二姬以歸子文無諫也二十三年得臣伐陳取焦夷城頓而子文以令尹賞之及晉文公立而楚伐宋伐齊子文又重子玉之權以遣之卒以致敗然猶爭霸不已凡此皆僭王猾夏之事也朱子曰只緣他大體既不是了故其小節有不足取如管仲之三歸反坫聖人却與其仁之功者以其立義正也故管仲是天下之大義子文是一人之私行耳正君討賊崔杼之弒君申鮮虞責閭丘嬰曰君昏不能正危不能救死不能死申鮮虞尚以責嬰况陳文子為大夫其不能正君討賊安得無罪復反於齊按陳文子出入皆不見於春秋經傳史記亦不載襄二十五年夏經書齊崔杼弒其君光不書陳須無出奔傳書莊公諸嬖臣或死或奔而不及陳文子之出其二十七年宋向戍請弭諸侯之兵齊人弗許陳文子請許之其六月齊慶封陳須無皆至會則是崔子弒君之三年文子已復反於齊預其大政而傳不明言其反也其九月崔氏內亂慶封為杼攻崔氏盡俘其家杼至無所歸縊而死傳不言陳文子與謀與否二十八年文子又主朝晉之謀其冬文子父子始與謀攻慶氏於廟須無以公歸慶封奔吳齊盡召羣公子改殯莊公尸崔杼於市焉其後文子卒其子無字用事至其孫乞厚施於國至恆弒簡公子張學於聖門不知仁體乃以二大夫之仁為問二子不足責子張識見可謂低小矣昔張宣公學於五峯胡子首以此章令公思之遂有所見季文子使晉左氏文六年季文子將聘於晉使求遭喪之禮以行其人曰將焉用之文子曰備豫不虞求而無之實難過求何害八月晉襄公卒蓋其時晉侯久疾故文子求遭喪之禮以行也程子未詳宣公篡立至納賂左氏文公十八年公薨文公二妃敬嬴生宣公敬嬴私事襄仲襄仲欲立宣公叔仲不可仲見於齊侯而請許之仲弒惡及視而立宣公殺叔仲惠伯夫人薑氏歸於齊哭而過市曰天乎仲為不道殺適立庶市人皆哭宣公元年季文子如齊納賂以請會會於平州以定公位宣公十八年公孫歸父以襄仲立公故有寵與公謀而聘晉欲去三桓公薨季文子言於朝曰使我殺適立庶以失大援者仲也臧宣叔怒曰當其時不能治後之人何罪子欲去之遂逐東門氏私意起而反惑之驗季文子縱襄仲殺嫡立庶於是瞷宣公之短黜莒濮之賞以奪其權賂齊侯之會以固己位其後宣公患其專與公孫歸父謀去之宣公薨季文子惡歸父而恨宣公又假立庶之罪而逐之始終無非私意矣務窮理未思之前貴果斷既思之後窮理則不待三思果斷則不必三思惟窮理則可以果斷不窮理而務果斷不幾於率意妄作乎不窮理而徒三思則私意起而反惑矣愚此章重在愚字愚謂其迹之似愚也患難不巧避沈晦不招禍而能委曲以濟君此其不可及也成公無道而武子周旋其間至以濟其君左氏晉文公之為亡公子也過衛衛文公不禮焉僖之二十七年楚及諸侯圍宋宋告急於晉晉以楚新昏於衛明年伐衛以救宋取五鹿衛成公請盟弗許衛侯欲與楚國人不欲故出其君以説於晉衛成公出居襄牛晉楚戰於城濮楚師敗績衛侯懼適陳使元喧奉叔武以受盟於踐土或欣元喧於衛侯曰立叔武矣衛侯殺其子角咺不廢命晉人復衛侯寧武子與衛人盟於宛濮衛侯先期入寧子先叔武聞君至喜走出公前驅顓犬射殺之元喧出奔晉冬衛侯與元喧訟寧武子為輔針莊子為坐士榮為大士衛侯不勝晉殺士榮刖針莊子謂寧俞忠而免之執衛侯歸於京師置諸深室寧子職納槖饘焉三十年晉侯使醫衍鴆衛侯寧俞貨醫薄其鴆不死秋魯為之請納玉於王與晉侯乃釋衛侯衛侯使賂周歂冶厪殺元喧及公子瑕復歸於衛程子曰未詳王文憲曰程子免患二字未見其不可及必如朱子本注所言方見其不可及比干是也比干説見微子篇程子此段又是章外之意蓋比干是王族少師寧武子是九世公族於邦無道之時皆當正救維持寧子以沈晦維持迄能有濟而且免患但衛侯出入始終以亂亦是寧子欠正救之功不無失諫之過蓋衛文公不禮重耳之時寧已自失諌成公背華從楚又失諌其疑叔武又失諫已盟而疑先期而入又失諌其再入也賂殺元喧及子瑕又失諌夫君無道而不諌但務沈默以兩全之雖不可及然君子濟世而一以愚為尚亦有所不當者故又出比干一條以補此章之意朱子曰世間事一律看不得聖人非欲人人學寧武子但如寧子亦自可為法人當武子之時則為武子當比干之時則為比干執一不可也子在陳按夫子凡三至陳始適陳有匡人之難反衛再適陳蓋經宋魋之難主司城貞子家後又自陳適蔡有絶糧之厄遂如葉楚昭將用孔子子西止之會卒三則又自葉反適陳在陳久之反衛明年即自衛反魯此言蓋發於三在陳之時也明年即歸魯矣此章當連後篇中行章及孟子末篇之意觀之則意極明備矣伯夷叔齊孤竹君之二子孤竹一作觚竹湯所封墨胎氏今北平之盧龍東有古孤竹城地道記云在肥如南十二里漢為令支縣今營州亦皆其地孤竹君名初字子朝路史云孤竹炎帝後薑姓之國一云墨氏蓋營州柳城縣古墨姓之國地相近故云然史記索隱云伯夷名元字公信叔齊名致字公達此出春秋少陽篇古無此名字之例蓋緯書附會也不念舊惡朱子曰此與顔子不遷怒一般其所惡者因其人之可惡而惡之而所惡不在我及其能改又只見他箇善處聖賢之心皆是如此但伯夷平日以隘聞故特明之惡如字所惡去聲程子二條叔子微生高莊子尾生一本作微生戰國䇿作尾生髙高誘注魯人未詳是否程子叔子范氏曰朱子曰范氏又曰所以害其心術者不在大此言尤痛切日用間不可不警省也然集注却不收入程子曰左丘明古之聞人叔子也此章文意左丘明年輩蓋前乎夫子後世以孔子修春秋左氏作傳遂以左氏為左丘明巧言令色足恭左丘明所耻而左氏傳不無浮辭誇勢之失或問引啖助趙伯循陸德明春秋釋例已嘗辨之且引鄧名世考姓氏書謂此乃左丘姓而明名非左氏也語録意左氏蓋左史之後云朱子曰門人記此二章相連見聖人欲學者以此為戒而立心以直若微生高之心久之便做此等可耻事來盍各言爾志此章與第十一篇之末皆為言志十一篇言志是問所用之能此章言志是言及人之事蓋亦行仁之事也上文必有所因而言者而語不載季路顔淵與夫子之志其精粗大小之等固不待言但學者豈能躐等至孔顔之地哉切己省察則子路之勇於為義豈可以勢利拘之所以程子深重之謂亞於浴沂子路言志亞於浴沂則曾點言志亞於顔子矣但顔子是德行曽點是見趣耳勞勞事據程子説則施勞當從第二説子之志夫子得行其志則人人各得其所綏來動和之妙可知也輔漢卿問老者是已之上朋友己之等少者已之下此三者足以盡天下之人否朱子曰然程子一條三條叔子二條未詳羈靮羈今馬絡靮音的今馬的盧也十室古者九夫為井四井為邑二畞半之宅在田二畞半之宅在邑邑凡三十二家十室之邑甚言其小不滿三十二家也言此以勉人天下豈無天資之美者但習所移而志不立不能好學以充其資耳然但言忠信而不言知睿知睿之資固不易得但聖人之於人尚忠信而不尚知睿終然忠信為基本知睿或難保也世人多以聖人生知之資絶不可及而自棄故聖人以好學勉之雍也莊子所稱子桑户莊子曰子桑户孟子反子琴張三人相與友曰孰能相與於無相與相為與無相為相忘以生無所終窮又子桑雩曰形莫若緣情莫若率緣則不離率則不勞不離不勞則不求文以待形固不待物凡此皆太簡之意許已南面二章各自為章乃引上章而言者以下文冇臨民之説故知因南面之許而問之行簡王文憲曰行簡是於行事上簡居簡是於治己上簡詳見通釋家語記其不衣冠而處楚辭桑扈裸行集注亦引家語為證所行自簡朱子曰非仲弓本意又就裏面説自不相害程子二條叔子不遷怒不二過顔子好學如博文約禮欲罷不能克己復禮請事斯語私足以發語之不惰皆是也而夫子答哀公之問特舉不遷怒不二過為言二事固亦克己之功而未盡顔子好學之事且顔子未當事權有何可怒蓋借是以諫曉哀公也夫子答問之間各切其人之病哀公為人躁妄故夫子答其弟子好學之問而舉顔子不遷怒不二過以曉之即顔子二事之功為哀公對病之藥惜哀公不能繹且改也今也則亡未聞好學者也今也則亡惜辭也未聞好學待辭也會子宜可謂好學而夫子不及之此一時也曾子年最在諸弟子之後其進學當在夫子暮年其成德亦在夫子既殁之後也程子曰一條三條四條叔子二條兼取伯叔子昔叔子少年遊太學安定先生胡翼之主教事以顔子所好何學論試諸生得程子此論大驚集注節入之王文憲曰全自周子來本字指五行之理真指五性靜指未發約是工夫中是凖則知所往諸本或作知所養朱子以往字為是王文憲曰明諸心窮理之事力行踐履之事若顔子之非禮勿視入四勿以備見顔子之工夫程子好學論最為密備因不遷怒一句則推約七情因不二過一句則指説四勿合於中則怒不遷過不二矣子華使於齊原思為之宰張子曰於斯二者見夫子之用財或問通釋已詳但二事前後記不同時大夫無境外之交蘧伯玉使人於孔子問人於他邦此事固有之但此云使齊是使齊君也是必夫子間居時也如先之以子夏申之以冉有之類是也子華使才亞於子貢而其力亦足以有行也使子華而貧則夫子不待請矣子華而富則冉子不必為請也冉子之才好於附益夫子之道無非時中然請粟與秉皆出冉子則是其時為夫子宰財者冉子也如伯高之喪冉子攝束帛乘馬而將之可見也至於原思為之宰則夫子為魯司冦時也以為之宰三字推之二事舊必有上文焉其文當曰子在某子華使於齊下段當曰子為魯司冦原思為之宰語意為順思之為宰也夫子為其貧而仕之也與之粟九百而辭此原思之素狷也以思之安貧九百之粟誠為無用故夫子又教之以用財之義學者觀於此章有數善焉夫子非責冉有之過豫蓋以禮處子華也不許原思之過辭又以義勉原思也君子當補不足不當益有餘也居官無辭祿之禮而居鄉有相周之義也聖人處事無非中庸通釋所謂非徒見夫子之用財而已也程子叔子子謂仲弓句與第九篇子謂顔淵句同程子欲去曰字然以四字為句則是論二子云爾曰字似無嫌犂雜色字書利之反駁文牛也耕犁之犁不同音不違章程子叔子三月不違與日月至焉內外賓主之辨仁者心之德不違仁者心無私欲而能有其德爾但張子之意欲始學者分别三月不違與日月至焉者深淺分明故借內外賓主以譬之而或問有仁在內在外之説於是諸老之説始離矣大抵既是譬喻只取分明固難得義理恰好也今且以張子之喻言之仁譬則屋也心譬則人也其心三月不違仁是人不違屋常在屋內縱三月外有時少違即復歸來必然是主日月至焉者是人每在屋外也雖或日一至月一至然終是客既知其內外賓主如此不同便須勉勉以進於不違循循而莫或違之至於久而熟焉則有非人力所能與者矣康子問章程子叔子季氏使閔子騫為費宰費季氏私邑今費縣汶水名出泰山萊蕪縣原山西北入泲汶上今縣名謝氏之説似若粗厲朱子取其足以立懦然觀閔子本旨善為我辭之言雖似乎婉如有復我者則吾必在汶上矣則不為不峻可謂壁立萬仞氣象矣程子曰仲尼之門能不仕大夫之家者閔子曾子數人而已叔子也子夏嘗為莒父宰子遊為武城宰子賤為單父宰雖夫子亦嘗為中都宰蓋是時三家分魯諸邑雖為三家所有然尚云貢於公室則其名尚𨽻公室也獨費乃季氏私邑夫子嘗欲墮之宜閔子所不屑也德行之科四人獨仲弓嘗為季氏宰此必少年始仕之時觀其焉知賢才之問與夫子稱可使南面之時小大逈不同安知後日所進不自前日所聞得之歟剛則必取禍如子路死於衛輒之難柔則必取辱如冉有為季氏聚斂之類先儒以為癩出淮南子精神篇曰子夏失明伯牛為厲厲即癩也戰國策曰豫讓漆身為厲謂漆身為癩也又曰厲雖癕腫胞疾則字當作厲北牖牖字誤當作墉蓋室中北墉而南牖墉牆也古人室北牆上起柱為壁雖壁間西北角冇小圓窗名厞謂之屋漏然無北牖之名也樂程子曰前一條叔子後二條伯子其字王文憲曰其字是先有此樂是顔子所自得處昔受學於周茂叔周茂叔道州營道縣濓溪里人名敦實後改敦順晚卜築廬山之下取故里之號名其溪曰濓溪學者稱為濓溪先生諡元以零陵伯從祀夫子廟庭初茂叔為南安軍司理時洛人程公昫為通守觀其氣貌非常人因令二子皓頥受學焉故明道先生曰昔受學於周茂叔又曰每令尋顔子仲尼樂處所樂何事本文先説顔子者進學之序也集注引此先説仲尼者師生之序也所樂何事見通書學者但當從事於博文約禮之誨王文憲曰文公為學者切已漏泄七分了君子小人儒儒學者之稱子夏文學故夫子鞭辟其近裏君子儒則務德業小人儒則褲文辭王文憲曰程子於儒上説君子小人固甚平恐於子夏未切謝氏以義利説恐尤甚子夏細密謹嚴病於促狹故以是警之後世託儒為小人者固多矣恐子夏必不至此履祥按語録朱子亦嘗疑此説為初學之時至於言博學篤志切問近思之後則不待為此言矣又曰聖人為萬世立言豈專為子夏設觀此二條則文公固自疑謝氏之説為過矣然汝為二字専為子夏言當如文憲之説泛文公亦嘗言子夏太細密謹嚴又云其促狹於子遊葉賀孫之問亦言其太緊小如此則此君子小人只是以度量規模為言其言君子如大人君子其言小人是野人小人若樊須小人之類蓋對大人君子而言特有小大之分耳非言善否之殊也至為學者切已省察則集注之言自在所深省程子叔子武城魯下邑春秋杜氏注武城在泰山南括地志南武城在兖州子遊為宰者焉爾乎三語助辭氣似繁按字義如是為爾其辭氣必有所指謂汝得人焉有如是者乎謂其可與進於斯道者淡臺姓滅明名按史記弟子傳字子羽武城人少孔子三十九嵗其後南遊至江從弟子三百人漢書亦云夫子之殁弟子散居四方各明夫子之道而淡臺滅明居楚則滅明固高弟也他書載滅明事亦多竒偉飲射讀法飲即鄉飲酒蓋鄉大夫賓興賢能以鄉飲酒之禮禮之黨正嵗時屬民飲酒於序射鄉射也讀法周禮州長正月之吉各屬其州之民而讀法嵗時祭祀州社則屬其民而讀法正嵗則讀教法黨正四時之孟月吉日則屬民而讀邦法族師閭胥皆然朱子曰公事不可知意其鄉飲讀法之類也為政以人才為先薦拔人才此是長民者第一事所以為國興賢所以作興民習也朱子謂古者以士為吏或得人講論亦為政之助正大因二事而可見爾所存甚久所該甚廣苟賤邪媚亦因二事而言由徑苟也私見賤也由徑邪也私見媚也所該甚廣莊周稱孟子反莊子曰子桑户孟子反子琴張三人相與友敗還以後為功兵家所謂斷後也事見哀公十一年十一年齊國書帥師伐我孟孺子帥右師冉求帥左師及齊師戰於郊樊遲請踰溝冉冇用矛於齊師師入齊軍獲甲首八十齊人不能師右師奔齊人從之涉泗孟子側後入以為殿抽矢策其馬不進也王文憲曰聖人提起示人使人知所自克謝氏曰王文憲曰上蔡工夫在於去矜故其言有力祝鮀為人辨博故有口才觀左氏定四年召陵之會可見雖因其言長衛然春秋書法乃長蔡於衛則鮀之口才能變易是非明矣佞本是有才辨之稱故自謙者曰不佞後因有口才者多變易是非故始有諂佞之稱朱子語録焉用佞處略言之而有而字猶與字古書兩事相兼者以而字中遞之遊氏疑而當作不宋朝宋公子朝與南子內亂者宋不罪其究而衛又召之以遂其姦其免於今之世者如此故夫子傷之今之世夫子嘆傷之意在此三字野猶今俗云村人史猶今言文人張文潛謂今之所謂儒者務博記尚文辭乃古之所謂史也學者當損有餘補不足此緊要工夫所以不偏勝而彬彬者也楊氏曰矯世之弊人之生也直二生字詳見或問程子伯子知好樂尹氏等級張説重上中人上下此章本注為教人言張説為中人以下設上下字朱子謂以資質言亦以學力言王元敬王剛仲謂以字似重蓋中人之質固多然能以之上則可以語上以之下則不可以語上矣集注本為教者言此則并為學者言所以使之云云此補文意也不可以語上非終不語也使之以漸進爾樊遲問知仁知者必知幽明之故仁者先辨善利之間明則有禮樂固當務民之義幽則有鬼神則當敬而逺之有則必敬幽則必逺也仁人者正其義不謀其利明其道不計其功故當先難而後獲先獲非仁者之心何以為仁程子上條叔子下條兼取二子知仁夫子以其意象體段效驗分言之令人深體而以類求之爾又不可太拘執通釋以質之所近言仁知有偏重然非偏無也動而不括出易大傳括結也程子曰如此形容叔子也是教學者體認夸詐漢書韓信傳齊夸詐多變程子叔子二國之俗王文憲曰齊之盛時已不如魯魯之衰時尚勝於齊唯夫子為能變之齊自夫子以後亦嘗一變蓋登夫子之門者多其後諸儒與魯相埒如語有齊論詩有齊詩漢時嘗以齊魯並稱其施為緩急之序王文憲曰變齊先革功利變魯先振紀綱稜力層反方角也酒器周禮考工記觚三升考古圖凡瓶杯方角者皆曰觚或曰木簡所謂操觚者是也上觚指其器下觚語其制器既不為觚之制而猶存觚之名觚哉觚哉言不不可復謂之觚也亦以歎失其舊者不止觚也夫子因一物而興歎其所感者深矣程子叔子劉聘君建人白水先生名勉之字致中朱子外舅也嘗以列薦特召詣闕既而秦檜用事令後省給劄試䇿先生謝病歸井有仁焉有仁當作人朱子謂以赴井救人為仁下文可逝不可陷見之宰我此問雖語録亦疑之然此不足怪今人憂道學之蹈害者亦如此曰學道者雖告之曰不夫不婦則為誠不飲不食則為亷坐禪入定則為敬絶世廢事則為高乎如此則忘身絶世而已矣則將應之曰何為其然也學者行人倫之當然耳非可絶人倫以為誠也取舍合於義而已非可吸風飲露以為清也存心遇事主一無適而已非可以坐禪入定為敬也日用當行而已非以絶世廢事為高也君子博學於文何文定曰通釋舉仁字一節蓋是指出博與約親切處以為例尤見分曉因是推之如詩三百篇字字要講究是博文也到得行時一言以蔽之曰思無邪是約禮也如禮儀三百威儀三千件件要講究此博文也至於行時則一言以蔽之曰無不敬是約禮也今觀文公語録有曰博學於文考究時自是頭項多到得行時却只是一句所以為約若博學不約之以禮安知不背畔於道徒知要約而不博學則所謂約者未知是與不是亦或不能不畔於道也按本注兩平程子重下於學者為切此君子是大槩言學者博是廣博聞見約是收束心身廣博聞見於文而收束心身以禮方可得其不畔於道徒博文而不約禮安保其不畔於道哉顔子博約是知行並進此章所重在行程子伯子南子請見史記曰靈公夫人有南子者使人謂孔子曰四方之君子不辱欲與寡君為兄弟者必見寡小君寡小君願見孔子辭謝不得已而見之夫人在絺帷中孔子入門北面稽首夫人自帷中再拜環佩玉聲璆然孔子曰吾鄉為弗見見之禮答馬又説其第九篇未見好德章下有見其小君之禮詳見或問所誓辭如云所不與崔慶者之類語見襄二十五年又所不為忠於君利社稷者是與又或問引所不與舅氏同心者此類非一重言以誓之欲其姑信此而深思聖人道大德全不絶人於善其見惡人固謂在彼有願見之心而在我本有可見之禮則不咎其既往或啓其將來未可知也孔子居是邦不非其大夫况其君夫人乎則又難以明言矣且此行也在聖人則可在他人則不可明言其為可則側媚由徑之人皆可借此説以藉口矣故但重言以誓之其誓之以天何也夫事一也而在聖人則可在他人則不可者亦論其心而已聖人此心光明正大上通乎天故無不可彼無是心而假是事以自文者其如天何哉聖人指天以為質欲學者知反此心也中者無過不及之名此章中庸嘗言之而文少異朱子訓義亦微不同中庸上句無為德二字鮮字下有能字蓋中庸以理言故無為德二字而下文有能字其實下文能字即為德二字也中庸首章兼性情而言故朱子訓義兼言不偏不倚之體此中庸指德行而言故訓義止言無過不及之用程子前四句未詳自世以下叔子語何事於仁程氏遺書言誠與才合章引此語正作何止之意又第八卷曰孔子見子貢問得來事大何止於仁集注本此語録何消得更説仁又何待於仁又豈但於仁何文定曰何止云云何事是當時方言王文憲曰尚何事於為仁履祥按事字似重止字似輕尚作必冇事焉之事謂其用工為仁也以博施濟衆為仁愈逺愈難學者如何下手必也聖乎語録此句語意未歇當急連下文讀仁者此心之天理博施濟衆者聖人行仁之成功夫仁者已欲立而立人已欲達而達人此二句活潑潑地最好玩味程子欲令如是觀仁可以得仁之體正是指此二句體是體段之體猶云意象也能近取譬可謂仁之方程子統連上二句蓋一時之言記録者亦或有缺失語録上説夫仁者則是言仁之道如此下云仁之方是言求仁之方當如此上節仁也下節恕也程子曰伯子醫書曰手足不仁痿音萎顔師古曰人隹反音㽔即痺病也如淳曰兩足不能相過曰痿痺必寐反運動不起不識痛癢之意氣已不貫黃文肅云當於此一句求之又曰叔子王文憲曰子貢以事言故逺而難夫子以心言故近而切孔門諸子問仁夫子各隨其人所至語之以為仁之事而已子貢亦嘗問為仁矣夫子告之事賢友仁至問欲無加諸人而夫子以為非爾所及終未得問仁之要領也至是大為之説曰有能博施於民而能濟衆何如可謂仁乎夫子謂如此則何以從事於仁此乃聖人事功之極雖堯舜亦猶有所不足於以求仁何有涯涘夫仁之體段已欲立而立人已欲達而達人以已及人周流無間下此則以已譬人乃恕之事亦可謂為仁之方也故程伯子曰欲令如是觀仁可以得仁之體夫子答問仁多矣未有若此章之親切者蓋仁固本心之全德終然愛之禮居多子貢之問雖若闊逺終然自愛之一路推來果能自反於己親切求之先推所欲至自然立達人處積而至於聖人雖博施濟衆亦不過此心之流行耳讀此章者多疑何事之訓詁仁聖之異同今述其大意如此以待善觀者論語集注考證卷三
